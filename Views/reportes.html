
<!-- Line chart -->
<div id="line-chart" style="width: 600px; height: 400px;"></div>
<script>
    var myChart = echarts.init(document.getElementById('line-chart'));
    var option = {
        title: { text: 'Evolución de Ventas' },
        tooltip: {},
        xAxis: { data: ['Enero', 'Febrero', 'Marzo', 'Abril'] },
        yAxis: {},
        series: [{ type: 'line', data: [100, 200, 150, 80] }]
    };
    myChart.setOption(option);
</script>

<!-- Bar chart -->

<div id="bar-chart" style="width: 600px; height: 400px;"></div>
<script>
    var myChart = echarts.init(document.getElementById('bar-chart'));
    var option = {
        title: { text: 'Comparativa de Productos' },
        tooltip: {},
        xAxis: { data: ['Producto A', 'Producto B', 'Producto C'] },
        yAxis: {},
        series: [{ type: 'bar', data: [50, 120, 80] }]
    };
    myChart.setOption(option);
</script>

<!-- Pie chart -->

<div id="pie-chart" style="width: 600px; height: 400px;"></div>
<script>
    var myChart = echarts.init(document.getElementById('pie-chart'));
    var option = {
        title: { text: 'Distribución de Ventas' },
        tooltip: { trigger: 'item' },
        series: [{
            type: 'pie',
            radius: '50%',
            data: [
                { value: 335, name: 'Producto A' },
                { value: 234, name: 'Producto B' },
                { value: 154, name: 'Producto C' }
            ]
        }]
    };
    myChart.setOption(option);
</script>


<!-- Gráfico de mapas -->
 <div id="map-chart" style="width: 600px; height: 400px;"></div>
<script>
    var myChart = echarts.init(document.getElementById('map-chart'));
    var option = {
        title: { text: 'Distribución Geográfica' },
        series: [{
            type: 'map',
            mapType: 'world',
            roam: true,
            data: [
                { name: 'USA', value: 100 },
                { name: 'China', value: 200 },
                { name: 'India', value: 300 }
            ]
        }]
    };
    myChart.setOption(option);
</script>

<!-- Gráfico de árbol -->
 <div id="tree-chart" style="width: 600px; height: 400px;"></div>
<script>
    var myChart = echarts.init(document.getElementById('tree-chart'));
    var option = {
        title: { text: 'Jerarquía de la Empresa' },
        series: [{
            type: 'tree',
            data: [{
                name: 'Empresa',
                children: [
                    { name: 'Departamento A' },
                    { name: 'Departamento B', children: [{ name: 'Equipo 1' }, { name: 'Equipo 2' }] }
                ]
            }],
            top: '5%',
            left: '20%',
            bottom: '5%',
            right: '20%'
        }]
    };
    myChart.setOption(option);
</script>

<!-- Gráfico de candlestick -->

        series: [{
            type: 'candlestick',
            data: [
                [820, 932, 901, 934],

</script>
