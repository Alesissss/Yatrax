{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="txt_Pregunta">Pregunta</label>
                        <div class="input-group">
                            <textarea id="txt_Pregunta" class="form-control" rows="3" placeholder="Pregunta"
                                {% if btnId == 'btn_Aceptar' %}disabled{% endif %}>{{ preguntaFrecuente.pregunta }}</textarea>
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-question-circle"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="txt_Respuesta">Respuesta</label>
                        <div class="input-group">
                            <textarea id="txt_Respuesta" class="form-control" rows="4" placeholder="Respuesta"
                                {% if btnId == 'btn_Aceptar' %}disabled{% endif %}>{{ preguntaFrecuente.respuesta }}</textarea>
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-comment-dots"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="cbx_Estado">Estado</label>
                        <div class="input-group">
                            <select id="cbx_Estado" class="form-control" {% if btnId == 'btn_Aceptar' %}disabled{% endif %}>
                                <option disabled>--SELECCIONAR--</option>
                                <option {% if preguntaFrecuente.estado == 1 %}selected{% endif %} value="1">Vigente</option>
                                <option {% if preguntaFrecuente.estado == 0 %}selected{% endif %} value="0">No vigente</option>
                            </select>
                        </div>
                    </div>
                    <div class="text-center">
                        <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de preguntas frecuentes</button>
                        <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(document).ready(function () {
        // BOTÓN “Registrar” (solo aparece cuando btnId = "btn_Registrar")
        $("#btn_Registrar").click(function () {
            let pregunta = $("#txt_Pregunta").val().trim();
            let respuesta = $("#txt_Respuesta").val().trim();
            let estado = $('#cbx_Estado').val();

            if (!pregunta || !respuesta || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará la pregunta frecuente. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar pregunta frecuente",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("pregunta", pregunta);
                    formData.append("respuesta", respuesta);
                    formData.append("estado", estado);

                    $.ajax({
                        url: "/trabajadores/configuracion/RegistrarPreguntaFrecuente",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                setTimeout(() => {
                                    window.location.href = "/trabajadores/configuracion/GestionarPreguntasFrecuentes";
                                }, 500);
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        // BOTÓN “Editar” (solo aparece cuando btnId = "btn_Editar")
        $("#btn_Editar").click(function () {
            const id = Number("{{ preguntaFrecuente.id }}");
            let pregunta = $("#txt_Pregunta").val().trim();
            let respuesta = $("#txt_Respuesta").val().trim();
            let estado = $('#cbx_Estado').val();

            if (!pregunta || !respuesta || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará la pregunta frecuente. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar pregunta frecuente",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("pregunta", pregunta);
                    formData.append("respuesta", respuesta);
                    formData.append("estado", estado);

                    $.ajax({
                        url: `/trabajadores/configuracion/EditarPreguntaFrecuente/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                setTimeout(() => {
                                    window.location.href = "/trabajadores/configuracion/GestionarPreguntasFrecuentes";
                                }, 500);
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        // BOTÓN “Aceptar” (solo aparece cuando btnId = "btn_Aceptar")
        $("#btn_Aceptar").click(function () {
            window.location.href = "/trabajadores/configuracion/GestionarPreguntasFrecuentes";
        });

        // BOTÓN “Volver”
        $("#btn_Volver").click(function () {
            window.location.href = "/trabajadores/configuracion/GestionarPreguntasFrecuentes";
        });
    });
</script>
{% endblock %}
