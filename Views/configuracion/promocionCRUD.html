{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="txt_Nombre">Nombre</label>
                        <input type="text" id="txt_Nombre" class="form-control" placeholder="Nombre"
                            value="{{ promocion.nombre }}" oninput="this.value = this.value.toUpperCase();" {% if
                            btnId=='btn_Aceptar' %}disabled{% endif %}>
                    </div>

                    <div class="mb-3">
                        <label for="txt_Codigo">Código</label>
                        <input type="text" id="txt_Codigo" class="form-control" placeholder="Código de promoción"
                            value="{{ promocion.codigo }}" maxlength="8"
                            oninput="this.value = this.value.toUpperCase();" {% if btnId=='btn_Aceptar' %}disabled{%
                            endif %}>
                    </div>

                    <div class="mb-3">
                        <label for="txt_MontoPromo">Monto de promoción (S/)</label>
                        <input type="number" id="txt_MontoPromo" step="0.01" min="0" class="form-control"
                            placeholder="Monto" value="{{ promocion.monto_promo }}" {% if btnId=='btn_Aceptar'
                            %}disabled{% endif %}>
                    </div>

                    <div class="mb-3">
                        <label for="txt_FechaInicio">Fecha Inicio</label>
                        <input type="date" id="txt_FechaInicio" class="form-control"
                            value="{{ promocion.fecha_inicio }}" {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                    </div>

                    <div class="mb-3">
                        <label for="txt_FechaFin">Fecha Fin</label>
                        <input type="date" id="txt_FechaFin" class="form-control" value="{{ promocion.fecha_fin }}" {%
                            if btnId=='btn_Aceptar' %}disabled{% endif %}>
                    </div>

                    <div class="mb-3">
                        <label for="cbx_Estado">Estado</label>
                        <select id="cbx_Estado" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                            <option disabled>--SELECCIONAR--</option>
                            <option {% if promocion.estado==1 %}selected{% endif %} value="1">Vigente</option>
                            <option {% if promocion.estado==0 %}selected{% endif %} value="0">No vigente</option>
                        </select>
                    </div>

                    <div class="text-center">
                        <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado</button>
                        <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(document).ready(function () {
        function validarCampos() {
            const campos = [
                $("#txt_Nombre").val().trim(),
                $("#txt_Codigo").val().trim(),
                $("#txt_MontoPromo").val().trim(),
                $("#txt_FechaInicio").val().trim(),
                $("#txt_FechaFin").val().trim(),
                $('#cbx_Estado').val()
            ];
            return campos.every(c => c);
        }

        function getFormData() {
            return {
                nombre: $("#txt_Nombre").val().trim(),
                codigo: $("#txt_Codigo").val().trim(),
                monto_promo: $("#txt_MontoPromo").val().trim(),
                fecha_inicio: $("#txt_FechaInicio").val().trim(),
                fecha_fin: $("#txt_FechaFin").val().trim(),
                estado: $('#cbx_Estado').val()
            };
        }

        $("#btn_Registrar").click(function () {
            if (!validarCampos()) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará la promoción. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    const data = getFormData();
                    $.post("/trabajadores/configuracion/RegistrarPromocion", data, function (response) {
                        if (response.Status === "success") {
                            toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                            setTimeout(() => {
                                window.location.href = "/trabajadores/configuracion/GestionarPromociones";
                            }, 600);
                        } else {
                            toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $("#btn_Editar").click(function () {
            const id = Number("{{ promocion.id }}");
            if (!validarCampos()) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción actualizará la promoción. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    const data = getFormData();
                    $.post(`/trabajadores/configuracion/EditarPromocion/${id}`, data, function (response) {
                        if (response.Status === "success") {
                            toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                            setTimeout(() => {
                                window.location.href = "/trabajadores/configuracion/GestionarPromociones";
                            }, 600);
                        } else {
                            toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $("#btn_Aceptar, #btn_Volver").click(function () {
            window.location.href = "/trabajadores/configuracion/GestionarPromociones";
        });
    });
</script>
{% endblock %}
