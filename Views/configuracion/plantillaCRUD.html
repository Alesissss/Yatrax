{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid p-4">
    <div class="row">
        <!-- Formulario de edición -->
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="nombrePlantilla" class="form-label">Nombre de la plantilla</label>
                        <div class="input-group">
                            <input type="text" id="txt_Nombre" class="form-control" placeholder="Nombre"
                                value="{{ plantilla.nombre }}" {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="colorHeader" class="form-label">Color del encabezado</label>
                        <div class="input-group">
                            <input type="color" id="txt_ColorHeader" class="form-control form-control-color"
                                value="{{ plantilla.color_header }}" {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="colorFooter" class="form-label">Color del pie de página</label>
                        <div class="input-group">
                            <input type="color" id="txt_ColorFooter" class="form-control form-control-color"
                                value="{{ plantilla.color_footer }}" {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="file_Imagen">Logo</label>
                        <div class="col-12 text-left">
                            <label class="btn btn-warning {% if btnId == 'btn_Aceptar' %}disabled{% endif %}"
                                for="file_Imagen">
                                <i class="bi bi-file-earmark-arrow-up-fill"></i> Subir archivo
                            </label>
                            <input type="file" class="d-none" id="file_Imagen" accept=".jpg, .jpeg, .png" {% if
                                btnId=='btn_Aceptar' %}disabled{% endif %}>
                            <span id="checkIcon" class="d-none text-success ml-2">
                                <i class="bi bi-check-circle-fill"></i> Archivo subido
                            </span>
                        </div>
                    </div>
                    <div class="text-center">
                        <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de
                            plantillas</button>
                        <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Previsualización -->
        <div class="col-md-8">
            <div class="card h-100">
                <div class="card-header text-white d-flex align-items-center" id="previewHeader"
                    style="max-height: 20vh; overflow: hidden;">
                    <img class="img-fluid" src="{{ plantilla.logo if plantilla.logo else '#' }}" id="previewImage"
                        alt="Logo" style="height: 100%">
                    <h2 class="mx-auto text-center mb-0" id="previewName">Previsualización</h2>
                </div>
                <div class="card-body" id="previewContent"></div>
                <div class="card-footer text-center" id="previewFooter"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function updatePreview() {
        const name = document.getElementById('txt_Nombre').value;
        const headerColor = document.getElementById('txt_ColorHeader').value;
        const footerColor = document.getElementById('txt_ColorFooter').value;
        const fileInput = document.getElementById('file_Imagen');
        const previewName = document.getElementById('previewName');
        const previewHeader = document.getElementById('previewHeader');
        const previewFooter = document.getElementById('previewFooter');
        const previewImage = document.getElementById('previewImage');
        const checkIcon = document.getElementById('checkIcon');

        previewName.innerText = name || 'Previsualización';

        previewHeader.style.backgroundColor = headerColor;

        previewFooter.style.backgroundColor = footerColor;

        if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function (e) {
                previewImage.src = e.target.result;
                checkIcon.classList.remove('d-none');
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            previewImage.src = "{{ plantilla.logo if plantilla.logo else '#' }}";
            checkIcon.classList.add('d-none');
        }
    }

    document.getElementById('txt_Nombre').addEventListener('input', updatePreview);
    document.getElementById('txt_ColorHeader').addEventListener('input', updatePreview);
    document.getElementById('txt_ColorFooter').addEventListener('input', updatePreview);
    document.getElementById('file_Imagen').addEventListener('change', updatePreview);

    $(document).ready(function () {
        updatePreview();

        $('#btn_Registrar').click(function () {
            let nombre = $("#txt_Nombre").val().trim();
            let colorHeader = $("#txt_ColorHeader").val().trim();
            let colorFooter = $("#txt_ColorFooter").val().trim();
            let logo = $("#file_Imagen")[0].files[0];

            if (!nombre || !colorHeader || !colorFooter || !logo) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará la plantilla. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar plantilla",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("colorHeader", colorHeader);
                    formData.append("colorFooter", colorFooter);
                    formData.append("logo", logo);
                    $.ajax({
                        url: "/trabajadores/configuracion/RegistrarPlantilla",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/configuracion/GestionarPlantillas";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $('#btn_Editar').click(function () {
            const id = Number("{{ plantilla.id }}");

            let nombre = $("#txt_Nombre").val().trim();
            let colorHeader = $("#txt_ColorHeader").val().trim();
            let colorFooter = $("#txt_ColorFooter").val().trim();
            let logo = $("#file_Imagen")[0].files[0];

            if (!nombre || !colorHeader || !colorFooter) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará la plantilla. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar plantilla",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("colorHeader", colorHeader);
                    formData.append("colorFooter", colorFooter);

                    if (logo) {
                        formData.append("logo", logo);
                    }

                    $.ajax({
                        url: `/trabajadores/configuracion/EditarPlantilla/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                setTimeout(() => {
                                    window.location.href = "/trabajadores/configuracion/GestionarPlantillas";
                                }, 500);
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $('#btn_Aceptar').click(function () {
            window.location.href = '/trabajadores/configuracion/GestionarPlantillas';
        });

        $('#btn_Volver').click(function () {
            window.location.href = '/trabajadores/configuracion/GestionarPlantillas';
        });
    });
</script>
{% endblock %}
