{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="cbx_TipoDocumento">Tipo de documento</label>
                            <div class="input-group">
                                <select id="cbx_tipoDocumento" class="form-control" {% if btnId=='btn_Aceptar'
                                    %}disabled{% endif %}>
                                    <option value=" {{ cliente.abreviatura }}" disabled selected>--SELECCIONAR--
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="txt_NumeroDocumento">Número de documento</label>
                            <div class="input-group">
                                <input type="number" id="txt_NumeroDocumento" class="form-control"
                                    value="{{ cliente.numero_documento }}" {% if btnId=='btn_Aceptar' %}disabled{% endif
                                    %} placeholder="Número de documento">
                                <div class="input-group-append">
                                    <div class="input-group-text"><i class="fas fa-id-card"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="cbx_Pais">País</label>
                            <div class="input-group">
                                <select id="cbx_Pais" class="form-control" value="{{ cliente.nombre_pais }}" {% if
                                    btnId=='btn_Aceptar' %}disabled{% endif %}>
                                    <option disabled selected>--SELECCIONAR--</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="cbx_Sexo">Sexo</label>
                            <div class="input-group">
                                <select id="cbx_Sexo" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{% endif
                                    %}>
                                    <option value="" {% if cliente.sexo is none %}selected{% endif %}>--SELECCIONAR--
                                    </option>
                                    <option value="1" {% if cliente.sexo==1 %}selected{% endif %}>Masculino</option>
                                    <option value="0" {% if cliente.sexo==0 %}selected{% endif %}>Femenino</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="ape_pat">Apellido paterno</label>
                            <div class="input-group">
                                <input type="text" id="ape_pat" class="form-control" placeholder="Apellido paterno"
                                    value="{{ cliente.apellidos.split(' ')[0] if cliente.apellidos else '' }}" {% if
                                    btnId=='btn_Aceptar' %}disabled{% endif %}
                                    oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1).toLowerCase();">
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="ape_mat">Apellido materno</label>
                            <div class="input-group">
                                <input type="text" id="ape_mat" class="form-control" placeholder="Apellido materno"
                                    value="{{ cliente.apellidos.split(' ')[1] if cliente.apellidos else '' }}" {% if
                                    btnId=='btn_Aceptar' %}disabled{% endif %}
                                    oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1).toLowerCase();">
                            </div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="nombre">Nombre</label>
                            <div class="input-group">
                                <input type="text" id="nombre" class="form-control" placeholder="Nombres"
                                    value="{{ cliente.nombre }}" {% if btnId=='btn_Aceptar' %}disabled{% endif %}
                                    oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1).toLowerCase();">
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="txt_FechaNacimiento">Fecha de nacimiento</label>
                            <div class="input-group">
                                <input type="date" id="txt_FechaNacimiento" class="form-control"
                                    value="{{ cliente.f_nacimiento }}" {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                                <div class="input-group-append">
                                    <div class="input-group-text"><i class="fas fa-calendar-alt"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="telefono">Teléfono</label>¿
                            <div class="input-group">
                                <input type="number" id="telefono" class="form-control" placeholder="Teléfono"
                                    value="{{ cliente.telefono }}" {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                                <div class="input-group-append">
                                    <div class="input-group-text"><i class="fas fa-phone"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="correo">Correo electrónico</label>
                            <div class="input-group">
                                <input type="email" id="correo" class="form-control" placeholder="Correo electrónico"
                                    value="{{ cliente.email }}" {% if btnId=='btn_Aceptar' %}disabled{% endif %}
                                    oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1).toLowerCase();">
                                <div class="input-group-append">
                                    <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="contraseña">Contraseña</label>
                            <div class="input-group">
                                <input type="password" id="contraseña" class="form-control" placeholder="Contraseña"
                                    value="{{ cliente.password }}" {% if btnId=='btn_Aceptar' or btnId=='btn_Editar' %}disabled{% endif %}>
                                <div class="input-group-append">
                                    <div class="input-group-text"><i class="fas fa-lock"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="direccion">Dirección</label>
                            <div class="input-group">
                                <input type="text" id="direccion" class="form-control" placeholder="Dirección"
                                    value="{{ cliente.direccion }}" {% if btnId=='btn_Aceptar' %}disabled{% endif %}
                                    oninput="this.value = this.value.charAt(0).toUpperCase() + this.value.slice(1).toLowerCase();">
                                <div class="input-group-append">
                                    <div class="input-group-text"><i class="fas fa-map-marker-alt"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="cbx_estado">Estado</label>
                            <div class="input-group">
                                <select id="cbx_estado" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{%
                                    endif %}>
                                    <option value="" {% if cliente.estado is none %}selected{% endif %}>--SELECCIONAR--
                                    </option>
                                    <option value="1" {% if cliente.estado==1 %}selected{% endif %}>Vigente</option>
                                    <option value="0" {% if cliente.estado==0 %}selected{% endif %}>No vigente</option>
                                </select>
                            </div>
                        </div>
                        <!-- Botón de acción -->
                        <div class="col-md-12 text-center">
                            <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de
                                clientes</button>
                            <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function fct_cambiarInputs() {
        // Obtén el texto seleccionado (abreviatura) del combo
        let abreviatura = $('#cbx_tipoDocumento option:selected').text().trim().toUpperCase();

        if (abreviatura === 'RUC') {
            // Oculta los campos para RUC
            $('#txt_FechaNacimiento').closest('.col-md-6').hide();
            $('#cbx_Sexo').closest('.col-md-6').hide();
            $('#ape_pat').closest('.col-md-4').hide();
            $('#ape_mat').closest('.col-md-4').hide();

            // Cambia nombre y contraseña a col-12
            $('#nombre').closest('.col-md-4').removeClass('col-md-4').addClass('col-md-6');
            $('#contraseña').closest('.col-md-6').removeClass('col-md-6').addClass('col-md-12');

            // Cambia el label de nombre a "Razón social"
            $("label[for='nombre']").text("Razón social");
        } else {
            // Muestra los campos para otros documentos
            $('#txt_FechaNacimiento').closest('.col-md-6').show();
            $('#cbx_Sexo').closest('.col-md-6').show();
            $('#ape_pat').closest('.col-md-4').show();
            $('#ape_mat').closest('.col-md-4').show();

            // Restaura nombre y contraseña a sus tamaños originales
            $('#nombre').closest('.col-md-6').removeClass('col-md-6').addClass('col-md-4');
            $('#contraseña').closest('.col-md-12').removeClass('col-md-12').addClass('col-md-6');

            // Restaura el label de nombre a "Nombre"
            $("label[for='nombre']").text("Nombre");
        }
    }

    function fct_GetPaises() {
        $.getJSON('/trabajadores/ventas/GetData_Paises', function (response) {
            if (response.Status === 'success') {
                let paises = [];

                $.each(response.data, function (index, item) {
                    let option = {
                        id: item.id,
                        text: item.iso3 + " - " + item.nombre,
                        phone_code: item.phone_code
                    };

                    paises.push(option);
                });

                $('#cbx_Pais').select2({
                    theme: 'bootstrap4',
                    placeholder: "Buscar...",
                    data: paises,
                    language: {
                        noResults: function () {
                            return "No se encontraron resultados";
                        }
                    },
                    allowClear: true
                });
                // Buscar el país por nombre y seleccionarlo si existe
                let paisCliente = "{{ cliente.nombre_pais }}";
                if (paisCliente) {
                    let paisOption = $('#cbx_Pais option').filter(function () {
                        // El texto de la opción es "ISO3 - Nombre"
                        return $(this).text().toLowerCase().includes(paisCliente.toLowerCase());
                    }).first();
                    if (paisOption.length) {
                        $('#cbx_Pais').val(paisOption.val()).trigger('change');
                    }
                }
            }
        });
    }

    function fct_GetTipoDocumento() {
        $.getJSON('/trabajadores/ventas/GetData_TipoDocumento', function (response) {
            if (response.Status === 'success') {
                let $combo = $('#cbx_tipoDocumento');
                $combo.empty();
                $combo.append('<option value="" disabled selected>--SELECCIONAR--</option>');
                $.each(response.data, function (index, item) {
                    $combo.append(
                        $('<option>', {
                            value: item.id, // El value es el ID
                            text: item.abreviatura // Lo que se muestra es la abreviatura
                        })
                    );
                });

                // Buscar la opción cuyo texto coincida con la abreviatura del cliente y seleccionarla
                let abreviaturaCliente = "{{ cliente.abreviatura }}";
                if (abreviaturaCliente) {
                    let optionToSelect = $combo.find('option').filter(function () {
                        return $(this).text().trim().toLowerCase() === abreviaturaCliente.trim().toLowerCase();
                    }).first();
                    if (optionToSelect.length) {
                        $combo.val(optionToSelect.val()).trigger('change');
                    }
                }
            }
        });
    }

    function buscarPersona() {
        const $tipoDoc = $('#cbx_tipoDocumento');
        const $numDoc = $('#txt_NumeroDocumento').val().trim();
        const seleccionado = $tipoDoc.find('option:selected').text().trim();

        if (!seleccionado || seleccionado === '--SELECCIONAR--') {
            toastr.warning("El tipo de documento es obligatorio", "MENSAJE DE SISTEMA");
            return;
        }
        if (!$numDoc) {
            toastr.warning("El número de documento es obligatorio", "MENSAJE DE SISTEMA");
            return;
        }

        if (seleccionado === "DNI" && $numDoc.length === 8) {
            fetch(`/ecommerce/home/api/get_persona_data?tipoDoc=${encodeURIComponent(seleccionado)}&numDoc=${encodeURIComponent($numDoc)}`)
                .then(r => r.json())
                .then(json => {
                    if (json.Status === "success") {
                        const d = json.data;
                        // Siempre asigna aunque esté vacío, pero no pongas el texto por defecto si viene vacío
                        $('#nombre').val(d.nombres !== undefined && d.nombres !== null ? d.nombres : "");
                        $('#ape_pat').val(d.apellidoPaterno !== undefined && d.apellidoPaterno !== null ? d.apellidoPaterno : "");
                        $('#ape_mat').val(d.apellidoMaterno !== undefined && d.apellidoMaterno !== null ? d.apellidoMaterno : "");
                        if (json.Msj && json.Msj !== "OK") {
                            toastr.success(json.Msj, "MENSAJE DE SISTEMA");
                        }
                    } else {
                        $('#nombre').val("");
                        $('#ape_pat').val("");
                        $('#ape_mat').val("");
                        toastr.warning("No se encontró el DNI o no existe", "Alerta de sistema");
                    }
                })
                .catch(() => toastr.error("No se ha podido conectar con el servidor", "ERROR"));
            return;
        }

        if (seleccionado === "RUC" && $numDoc.length === 11) {
            fetch(`/ecommerce/home/api/get_persona_data?tipoDoc=${encodeURIComponent(seleccionado)}&numDoc=${encodeURIComponent($numDoc)}`)
                .then(r => r.json())
                .then(json => {
                    if (json.Status === "success") {
                        const d = json.data;
                        $('#nombre').val(d.razonSocial ? d.razonSocial : "RAZONSOCIAL");
                    } else {
                        $('#nombre').val("RAZONSOCIAL");
                        toastr.error(json.Msj, "ERROR");
                    }
                })
                .catch(() => toastr.error("No se ha podido conectar con el servidor", "ERROR"));
            return;
        }
    }

    function fct_ValidarNumeroDocumento() {
        let tipoDocumento = $('#cbx_tipoDocumento').val();
        let $numeroDocumento = $('#txt_NumeroDocumento');
        let numeroDocumento = $numeroDocumento.val().trim();
        let telefono = $('#telefono').val().trim();
        let correo = $('#correo').val().trim();
        let fechaNacimiento = $('#txt_FechaNacimiento').val();

        // Definir longitudes máximas y mínimas según el tipo de documento
        let maxLength = null;
        let minLength = null;

        if (tipoDocumento === "1") { // DNI
            maxLength = 8;
            minLength = 8;
        } else if (tipoDocumento === "2") { // RUC
            maxLength = 11;
            minLength = 11;
        } else if (tipoDocumento === "3") { // Carnet de Extranjería
            maxLength = 20;
            minLength = 9;
        }

        // Limitar la longitud máxima en el input
        if (maxLength !== null) {
            $numeroDocumento.attr('maxlength', maxLength);
        } else {
            $numeroDocumento.removeAttr('maxlength');
        }

        // Validación de longitud exacta para 1 y 2, rango para 3
        if (tipoDocumento === "1" && numeroDocumento.length !== 8) {
            toastr.warning("El número de documento (DNI) debe tener exactamente 8 dígitos", "MENSAJE DE SISTEMA");
            return false;
        }
        if (tipoDocumento === "2" && numeroDocumento.length !== 11) {
            toastr.warning("El número de documento (RUC) debe tener exactamente 11 dígitos", "MENSAJE DE SISTEMA");
            return false;
        }
        if (tipoDocumento === "3" && (numeroDocumento.length < 9 || numeroDocumento.length > 20)) {
            toastr.warning("El número de documento (Carnet de Extranjería) debe tener entre 9 y 20 dígitos", "MENSAJE DE SISTEMA");
            return false;
        }

        // Validar teléfono: exactamente 9 dígitos
        // Limitar el teléfono a máximo 9 dígitos en tiempo real
        $('#telefono').on('input', function () {
            let value = $(this).val();
            if (value.length > 9) {
            $(this).val(value.slice(0, 9));
            }
        });
        if (telefono && !/^\d{9}$/.test(telefono)) {
            toastr.warning("El teléfono debe tener exactamente 9 dígitos", "MENSAJE DE SISTEMA");
            return false;
        }

        // Validar correo: debe terminar en @example.com (puedes cambiar example.com por el dominio deseado)
        // Validar correo: debe terminar en @loquesea.com
        let correoRegex = /^[^@]+@[^@]+\.com$/i;
        if (correo && !correoRegex.test(correo)) {
            toastr.warning("Ingrese un correo válido", "MENSAJE DE SISTEMA");
            return false;
        }

        // Validar fecha de nacimiento: mayor de 18 años
        if (fechaNacimiento) {
            let fechaNac = new Date(fechaNacimiento);
            let hoy = new Date();
            let edad = hoy.getFullYear() - fechaNac.getFullYear();
            let m = hoy.getMonth() - fechaNac.getMonth();
            if (m < 0 || (m === 0 && hoy.getDate() < fechaNac.getDate())) {
                edad--;
            }
            if (edad < 18) {
                toastr.warning("El cliente debe ser mayor de 18 años", "MENSAJE DE SISTEMA");
                return false;
            }
        }

        return true;
    }

    // Limitar en tiempo real la cantidad de caracteres permitidos según el tipo de documento
    $(document).on('input', '#txt_NumeroDocumento', function () {
        let tipoDocumento = $('#cbx_tipoDocumento').val();
        let $this = $(this);
        let maxLength = null;

        if (tipoDocumento === "1") {
            maxLength = 8;
        } else if (tipoDocumento === "2") {
            maxLength = 11;
        } else if (tipoDocumento === "3") {
            maxLength = 20;
        }

        if (maxLength !== null) {
            let value = $this.val();
            if (value.length > maxLength) {
                $this.val(value.slice(0, maxLength));
            }
        }
    });

    // Cambiar maxlength cuando cambia el tipo de documento
    $(document).on('change', '#cbx_tipoDocumento', function () {
        let tipoDocumento = $(this).val();
        let $numeroDocumento = $('#txt_NumeroDocumento');
        let maxLength = null;

        if (tipoDocumento === "1") {
            maxLength = 8;
        } else if (tipoDocumento === "2") {
            maxLength = 11;
        } else if (tipoDocumento === "3") {
            maxLength = 20;
        }

        if (maxLength !== null) {
            $numeroDocumento.attr('maxlength', maxLength);
            // Truncar si ya hay más caracteres
            let value = $numeroDocumento.val();
            if (value.length > maxLength) {
                $numeroDocumento.val(value.slice(0, maxLength));
            }
        } else {
            $numeroDocumento.removeAttr('maxlength');
        }
    });

    $(document).ready(function () {

        fct_GetPaises();
        fct_GetTipoDocumento();
        fct_ValidarNumeroDocumento();
        fct_cambiarInputs();
        $('#cbx_tipoDocumento').change(function () {
            fct_cambiarInputs();
        });

        $('#txt_NumeroDocumento').on('focusout', function () {
            buscarPersona();
        });

        $("#btn_Registrar").click(function () {
            let tipo_documento = $('#cbx_tipoDocumento').val();
            let numero_documento = $('#txt_NumeroDocumento').val().trim();
            let pais = $('#cbx_Pais').val();
            let sexo = $('#cbx_Sexo').val();
            sexo = (sexo === "" || sexo === null || sexo === undefined) ? null : Number(sexo);
            let ape_pat = $('#ape_pat').val().trim();
            let ape_mat = $('#ape_mat').val().trim();
            let nombre = $('#nombre').val().trim();
            let fecha_nac = $('#txt_FechaNacimiento').val();
            let telefono = $('#telefono').val().trim();
            let correo = $('#correo').val().trim();
            let contraseña = $('#contraseña').val().trim();
            let direccion = $('#direccion').val().trim();
            let estado = $('#cbx_estado').val();

            if (tipo_documento === null || tipo_documento === undefined) {
                toastr.warning("El tipo de documento es obligatorio", "MENSAJE DE SISTEMA");
                return;
            }
            // Validar número de documento antes de continuar
            if (!fct_ValidarNumeroDocumento()) {
                return;
            }

            if (tipo_documento === "1") {
                if (
                    !tipo_documento ||
                    !numero_documento ||
                    !pais ||
                    sexo === null ||
                    sexo === "" ||
                    sexo === undefined ||
                    !ape_pat ||
                    !ape_mat ||
                    !nombre ||
                    !fecha_nac ||
                    !telefono ||
                    !direccion ||
                    !correo ||
                    !contraseña ||
                    !estado
                ) {
                    toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                    return;
                }
            } else if (tipo_documento === "2") {
                if (!tipo_documento || !numero_documento || !pais || !nombre || !telefono || !direccion || !correo || !contraseña || !estado) {
                    toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                    return;
                }
            } else {
                if (
                    !tipo_documento ||
                    !numero_documento ||
                    !pais ||
                    sexo === null ||
                    sexo === "" ||
                    sexo === undefined ||
                    !ape_pat ||
                    !ape_mat ||
                    !nombre ||
                    !fecha_nac ||
                    !telefono ||
                    !direccion ||
                    !correo ||
                    !contraseña ||
                    !estado
                ) {
                    toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                    return;
                }
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará al cliente. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar cliente",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("tipo_documento", tipo_documento);
                    formData.append("numero_documento", numero_documento);
                    formData.append("pais", pais);
                    formData.append("Sexo", sexo);
                    formData.append("ape_pat", ape_pat);
                    formData.append("ape_mat", ape_mat);
                    formData.append("nombre", nombre);
                    formData.append("fecha_nac", fecha_nac);
                    formData.append("telefono", telefono);
                    formData.append("correo", correo);
                    formData.append("contraseña", contraseña);
                    formData.append("direccion", direccion);
                    formData.append("estado", estado);

                    $.ajax({
                        url: "/trabajadores/ventas/RegistrarCliente",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/ventas/GestionarClientes";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Editar").click(function () {
            const id = Number("{{ cliente.ID }}");

            let tipo_documento = $('#cbx_tipoDocumento').val();
            let numero_documento = $('#txt_NumeroDocumento').val().trim();
            let pais = $('#cbx_Pais').val();
            let sexo = $('#cbx_Sexo').val();
            sexo = (sexo === "" || sexo === null || sexo === undefined) ? null : Number(sexo);
            let ape_pat = $('#ape_pat').val().trim();
            let ape_mat = $('#ape_mat').val().trim();
            let nombre = $('#nombre').val().trim();
            let fecha_nac = $('#txt_FechaNacimiento').val();
            let telefono = $('#telefono').val().trim();
            let correo = $('#correo').val().trim();
            let contraseña = $('#contraseña').val().trim();
            let direccion = $('#direccion').val().trim();
            let estado = $('#cbx_estado').val();

            if (!fct_ValidarNumeroDocumento()) {
                return;
            }

            if (tipo_documento === "1") {
                if (
                    !tipo_documento ||
                    !numero_documento ||
                    !pais ||
                    sexo === null ||
                    sexo === "" ||
                    sexo === undefined ||
                    !ape_pat ||
                    !ape_mat ||
                    !nombre ||
                    !fecha_nac ||
                    !telefono ||
                    !direccion ||
                    !correo ||
                    !contraseña ||
                    !estado
                ) {
                    toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                    return;
                }
            } else if (tipo_documento === "2") {
                if (!tipo_documento || !numero_documento || !pais || !nombre || !telefono || !direccion || !correo || !contraseña || !estado) {
                    toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                    return;
                }
            } else {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará al cliente. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar cliente",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("tipo_documento", tipo_documento);
                    formData.append("numero_documento", numero_documento);
                    formData.append("pais", pais);
                    formData.append("Sexo", sexo);
                    formData.append("ape_pat", ape_pat);
                    formData.append("ape_mat", ape_mat);
                    formData.append("nombre", nombre);
                    formData.append("fecha_nac", fecha_nac);
                    formData.append("telefono", telefono);
                    formData.append("correo", correo);
                    formData.append("contraseña", contraseña);
                    formData.append("direccion", direccion);
                    formData.append("estado", estado);

                    $.ajax({
                        url: `/trabajadores/ventas/EditarCliente/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/ventas/GestionarClientes";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $("#btn_Aceptar").click(function () {
            window.location.href = "/trabajadores/ventas/GestionarClientes";
        });

        $("#btn_Volver").click(function () {
            window.location.href = "/trabajadores/ventas/GestionarClientes";
        });
    });
</script>
{% endblock %}
