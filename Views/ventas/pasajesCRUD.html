{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<style>
    .row {
        margin-left: 0px;
        margin-right: 0px;
    }

    :root {
        --primary-color: #003b8b;
        --secondary-color: #315CAC;
        --light-blue: #2196f3;
        --success-color: #4caf50;
        --danger-color: #c62828;
        --border-radius: 10px;
        --transition: all 0.3s ease;
    }

    .seat {
        width: 35px;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        transition: var(--transition);
        border: 2px solid transparent;
        font-size: 12px;
    }

    .available {
        background-color: #e8f5e9;
        border-color: var(--success-color);
        color: #2e7d32;
    }

    .available:hover {
        transform: scale(1.1);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .selected {
        background-color: var(--light-blue);
        color: white;
        border-color: #0d47a1;
    }

    .occupied {
        background-color: #ffcdd2;
        color: var(--danger-color);
        border-color: #b71c1c;
        cursor: not-allowed;
    }

    /* .primero {
    border-radius: 0 0 var(--border-radius) var(--border-radius);
  } */



    .azul {
        background: var(--primary-color);
        color: white;
    }

    .blanco {
        background: #f4f4f4;
        color: var(--primary-color);
    }

    .accordion-header button {
        font-weight: bold;
        color: var(--primary-color);
    }

    .accordion-item.active .accordion-header button {
        background-color: var(--primary-color);
        color: white;
    }

    .accordion-collapse {
        min-width: 100%;
        /* o ancho fijo en px */
        max-width: 100%;
        width: 100%;
    }

    #accordionExample {
        width: 100%;
    }

    #accordionExample .accordion-item {
        width: 100%;
    }

    #accordionExample .accordion-button {
        width: 100%;
        text-align: left;
        /* para que el texto quede alineado a la izquierda */
    }

    #accordionExample .accordion-button>.px-3 {
        flex-grow: 1;
    }

    .progreso-contacto-pago {
        position: relative;
    }



    /* .accordion-button.collapsed {
    background-color: #f8f9fa;
    color: var(--primary-color);
  }

  .accordion-button:not(.collapsed) {
    background-color: var(--primary-color);
    color: white;
  } */

    .itinerario-item {
        border: 1px solid #ccc;
        border-radius: 0.5rem;
        margin-bottom: 1rem;
        overflow: hidden;
    }

    .itinerario-body {
        padding: 1rem;
    }

    .badge-directo {
        background-color: #aaa;
        color: white;
    }

    .badge-escala {
        background-color: #fbc02d;
        color: black;
    }

    .nivel-label {
        font-weight: bold;
    }
</style>

{{ datos.contenido_venta | safe }}

{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/ventaPasajes.js') }}"></script>
{% endblock %}
