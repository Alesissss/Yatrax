{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="txt_Nombre">Tipo de cliente</label>
                        <div class="input-group">
                            <input type="text" id="txt_Nombre" class="form-control" placeholder="Tipo de cliente"
                                {% if btnId == 'btn_Aceptar' %}disabled{% endif %}
                                value="{{ tipo_cliente.nombre if tipo_cliente else '' }}">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-user"></i></div>
                            </div>
                        </div>
                    </div>

                    {% if btnId == 'btn_Editar' %}
                    <div class="mb-3">
                        <label for="select_Estado">Estado</label>
                        <select id="select_Estado" class="form-control">
                            <option value="1" {% if tipo_cliente.estado == 1 %}selected{% endif %}>Activo</option>
                            <option value="0" {% if tipo_cliente.estado == 0 %}selected{% endif %}>Inactivo</option>
                        </select>
                    </div>
                    {% endif %}

                    <div class="text-center">
                        <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado</button>
                        <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(document).ready(function () {
        const idTipoCliente = Number("{{ tipo_cliente.idTipoCliente if tipo_cliente else '0' }}");

        $("#btn_Registrar").click(function () {
            let nombre = $("#txt_Nombre").val().trim();

            if (!nombre) {
                toastr.warning("El nombre del tipo de cliente es obligatorio.", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará el tipo de cliente.",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("nombre", nombre);

                    $.ajax({
                        url: "/trabajadores/ventas/RegistrarTipoCliente",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/ventas/GestionarTipoCliente";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function () {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $("#btn_Editar").click(function () {
            let nombre = $("#txt_Nombre").val().trim();
            let estado = $("#select_Estado").val();

            if (!nombre || (estado !== "0" && estado !== "1")) {
                toastr.warning("Todos los campos son obligatorios y válidos.", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará el tipo de cliente.",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, modificar",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("estado", estado);

                    $.ajax({
                        url: `/trabajadores/ventas/EditarTipoCliente/${idTipoCliente}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                setTimeout(() => {
                                    window.location.href = "/trabajadores/ventas/GestionarTipoCliente";
                                }, 500);
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function () {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $("#btn_Aceptar, #btn_Volver").click(function () {
            window.location.href = "/trabajadores/ventas/GestionarTipoCliente";
        });
    });
</script>
{% endblock %}
