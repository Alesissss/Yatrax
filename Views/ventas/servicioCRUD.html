{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="txt_nombre">Nombre del servicio</label>
                            <input type="text" name="txt_nombre" id="txt_nombre" class="form-control"
                                placeholder="Nombre del servicio" value="{{ servicio.nombre }}" {% if
                                btnId=="btn_Regresar" %} disabled {% endif %}>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="colorHeader" class="form-label">Color del servicio</label>
                            <div class="input-group">
                                <input type="color" id="txt_color" class="form-control form-control-color"
                                    value="{{ servicio.color }}" {% if btnId=='btn_Regresar' %}disabled{% endif
                                    %}>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="txt_descripcion">Descripción del servicio</label>
                            <input type="text" name="txt_descripcion" id="txt_descripcion" class="form-control"
                                placeholder="Descripción del servicio" value="{{ servicio.descripcion }}" {% if
                                btnId=="btn_Regresar" %} disabled {% endif %}>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="cbx_Estado">Estado</label>
                            <div class="input-group">
                                <select id="cbx_Estado" class="form-control" {% if btnId=='btn_Regresar' %}disabled{%
                                    endif %}>
                                    <option disabled>--SELECCIONAR--</option>
                                    <option {% if servicio.estado==1 %}selected{% endif %} value="1">Vigente</option>
                                    <option {% if servicio.estado==0 %}selected{% endif %} value="0">No vigente</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="cbx_Microservicios">Microservicios</label>
                            <div class="input-group">
                                <select id="cbx_Microservicios" class="form-control" multiple="multiple" {% if
                                    btnId=='btn_Regresar' %}disabled{% endif %}>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="file_Imagen">Imagen</label>
                            <div class="col-12 text-left">
                                <label class="btn btn-warning {% if btnId=='btn_Regresar' %}disabled{%
                                    endif %} " for="file_Imagen">
                                    <i class="bi bi-file-earmark-arrow-up-fill"></i> Subir archivo
                                </label>
                                <input type="file" class="d-none" id="file_Imagen" name="logo"
                                    accept=".jpg, .jpeg, .png" {% if btnId=='btn_Regresar' %}disabled{% endif %}>
                                <span id="checkIcon" class="d-none text-success ml-2">
                                    <i class="bi bi-check-circle-fill"></i> Archivo subido
                                </span>
                            </div>
                            <!-- Vista previa de la imagen seleccionada -->
                            <div id="logoPreview" class="mt-3" style="display: none;">
                                <label>Vista previa:</label>
                                <img id="logoPreviewImage" class="img-thumbnail" style="width: 100px;">
                            </div>
                        </div>
                        <div class="col-md-12 text-center pt-4">
                            <button id="btn_Listado" type="button" class="btn btn-danger">Volver al listado de
                                servicios</button>
                            <button id="{{ btnId }}" type="submit" class="btn btn-primary">Aceptar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>

    function fct_CargarMicroservicios() {
        $.getJSON('/trabajadores/ventas/Get_Microservicios_Servicio', function (response) {
            if (response && response.Status === "success") {
                let items = [];

                // Armar los items para select2
                $.each(response.data, function (index, item) {
                    items.push({ id: item.id, text: item.nombre });
                });

                // Inicializar select2
                $('#cbx_Microservicios').select2({
                    theme: 'bootstrap4',
                    placeholder: "Buscar...",
                    data: items,
                    language: {
                        noResults: function () {
                            return "No se encontraron resultados";
                        }
                    },
                    allowClear: true
                });

                let microserviciosRecibidos = JSON.parse('{{ microservicios | tojson }}')
                let idsSeleccionados = microserviciosRecibidos.map(function (m) {
                    return m.id;
                });

                $('#cbx_Microservicios').val(idsSeleccionados).trigger('change');

            } else {
                console.error('Error al obtener los microservicios: ' + response.Msj);
            }
        });
    }

    // Aquí puedes agregar cualquier script que necesites
    $(document).ready(function () {
        fct_CargarMicroservicios();

        // Mostrar imagen actual si se está editando y existe imagen
        const imagenGuardada = "{{ servicio.imagen or '' }}";
        if (imagenGuardada && "{{ btnId }}" !== "btn_Registrar") {
            $('#logoPreviewImage').attr('src', `${imagenGuardada}`);
            $('#logoPreview').show();
        }

        // Mostrar vista previa de la imagen
        $('#file_Imagen').on('change', function (e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();

                reader.onload = function (e) {
                    $('#logoPreviewImage').attr('src', e.target.result);
                    $('#logoPreview').show();
                    $('#checkIcon').removeClass('d-none');
                };

                reader.readAsDataURL(file);
            } else {
                $('#logoPreviewImage').attr('src', '');
                $('#logoPreview').hide();
                $('#checkIcon').addClass('d-none');
            }
        });

        $("#btn_Registrar").click(function () {
            let nombre = $("#txt_nombre").val().trim();
            let descripcion = $('#txt_descripcion').val();
            let estado = $('#cbx_Estado').val();
            let color = $('#txt_color').val();
            let imagen = $('#file_Imagen')[0].files[0];
            let ids = $('#cbx_Microservicios').val();
            let microservicios = ids.map(id => ({ id: parseInt(id, 10) }));

            if (!nombre || !descripcion || !color || !estado || microservicios.length <= 0 || !imagen) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará al servicio. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar servicio",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();

                    formData.append("nombre", nombre);
                    formData.append("descripcion", descripcion);
                    formData.append("estado", estado);
                    formData.append("color",color);
                    formData.append("microservicios", JSON.stringify(microservicios));
                    if (imagen) formData.append("imagen", imagen);

                    $.ajax({
                        url: '/trabajadores/ventas/registrarServicio',
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== null && response.Msj2 !== '') {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/ventas/GestionarServicio"
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error("Error:" + error);
                        }
                    });
                }
            });
        });

        $("#btn_Actualizar").click(function () {
            const id = Number('{{ servicio.id }}');
            let nombre = $("#txt_nombre").val().trim();
            let descripcion = $('#txt_descripcion').val();
            let estado = $('#cbx_Estado').val();
            let color = $('#txt_color').val();
            let imagen = $('#file_Imagen')[0].files[0];
            let ids = $('#cbx_Microservicios').val();
            let microservicios = ids.map(id => ({ id: parseInt(id, 10) }));

            if (!nombre || !descripcion || !color || !estado || microservicios.length <= 0) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará al servicio. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar servicio",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();

                    formData.append("nombre", nombre);
                    formData.append("descripcion", descripcion);
                    formData.append("estado", estado);
                    formData.append("color",color)
                    formData.append("microservicios", JSON.stringify(microservicios));
                    if (imagen) formData.append("imagen", imagen);

                    $.ajax({
                        url: `/trabajadores/ventas/editarServicio/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== null && response.Msj2 !== '') {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/ventas/GestionarServicio"
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Listado").click(() => {
            window.location.href = "/trabajadores/ventas/GestionarServicio"
        })

        $("#btn_Regresar").click(() => {
            window.location.href = "/trabajadores/ventas/GestionarServicio"
        })
    });
</script>
{% endblock %}
