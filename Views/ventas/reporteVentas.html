{% extends "index.html" %}

{% block title %}YATRAX - Reporte de ventas{% endblock %}

{% block content %}
<div class="card d-none" id="efec-cargando">
    <div class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center overlay dark">
        <i class="fas fa-3x fa-sync-alt fa-spin text-white"></i>
    </div>
</div>
<div class="container-fluid p-4">
    <div class="panel-heading">
        <div class="row">
            <div class="col-md-12">
                <h1>Reporte de ventas</h1>
            </div>
            <div class="col-md-12">
                <div class="row justify-content-end">
                    <div class="col-md-10"></div>
                    <div class="col-md-2">
                        <button class="btn btn-success">Generar reporte</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div class="row mt-3">
            <div class="col-md-12">
                <div class="row">
                    <div class="col-md-12">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="small-box bg-primary">
                                    <div class="inner">
                                        <h3 id="totalVentas">0</h3>
                                        <p>Total de ventas</p>
                                    </div>
                                    <div class="icon">
                                        <i class="fas fa-shopping-cart"></i>
                                    </div>
                                    <!-- <a href="#" class="small-box-footer">
                                More info <i class="fas fa-arrow-circle-right"></i>
                            </a> -->
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="small-box bg-info">
                                    <div class="inner">
                                        <h3 id="cantidadPasajes">0</h3>
                                        <p>Cantidada de pasajes vendidos</p>
                                    </div>
                                    <div class="icon">
                                        <i class="fas fa-shopping-cart"></i>
                                    </div>
                                    <!-- <a href="#" class="small-box-footer">
                                More info <i class="fas fa-arrow-circle-right"></i>
                            </a> -->
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-body">
                                <div id="graficoPrincipal" style="width: 100%; height: 400px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/theme/dark.min.js"></script>
<script>
    $(document).ready(function () {
        let isDarkMode = document.body.classList.contains('dark-mode');

        $.getJSON("/trabajadores/ventas/ObtenerReporteVentas", { fechaInicio: 2, fechaFin: 2 }, function (response) {
            HideSpinner();

            if (response.Status !== "success") {
                console.error("Ocurrió un error: ", response.Msj);
                return;
            }

            const datos = response.data;

            // Meses en español
            const meses = [
                'Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'
            ];

            // Inicializo totales por mes y contador de pasajes
            const totalesPorMes = new Array(12).fill(0);
            let totalPasajes = 0;

            datos.forEach(item => {
                const fecha = new Date(item.fecha);
                const mesIdx = fecha.getMonth();
                const suma = parseFloat(item["sum(subtotal + igv)"]) || 0;
                const cantidad = parseInt(item["count(p.id)"]) || 0;

                totalesPorMes[mesIdx] += suma;
                totalPasajes += cantidad;
            });

            // Lleno los infobox
            const totalVentas = totalesPorMes.reduce((a, v) => a + v, 0);
            document.getElementById('totalVentas').innerText =
                'S/. ' + formatearNumero(totalVentas);
            // Sin símbolo de soles y sin decimales
            document.getElementById('cantidadPasajes').innerText =
                totalPasajes.toLocaleString('en-US');

            // Preparo la serie para el gráfico
            const serieVentas = totalesPorMes;

            // Inicializo ECharts
            const chartDom = document.getElementById('graficoPrincipal');
            const myChart = echarts.init(chartDom, isDarkMode ? 'dark' : '');

            const option = {
                title: {
                    text: 'Ventas por mes',
                    left: 'center'
                },
                tooltip: {
                    trigger: 'axis',
                    formatter: params => {
                        const p = params[0];
                        return `
              ${p.seriesName}<br/>
              ${p.axisValue} : S/. ${formatearNumero(p.value)}
            `;
                    }
                },
                toolbox: {
                    show: true,
                    feature: {
                        magicType: {
                            type: ['line', 'bar'],
                            title: { line: 'Línea', bar: 'Barras' },
                            selected: { line: false, bar: true }
                        },
                        saveAsImage: { title: 'Descargar como imagen' }
                    },
                    right: 20,
                    top: 10
                },
                xAxis: {
                    type: 'category',
                    data: meses
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {
                        formatter: value => formatearNumero(value)
                    }
                },
                series: [{
                    name: 'Monto vendido',
                    type: 'bar',          // comienza en barras
                    data: serieVentas,
                    smooth: true,
                    barMaxWidth: '40%',
                    areaStyle: {}         // sombra bajo la línea si cambias a 'line'
                }]
            };

            myChart.setOption(option);
            window.addEventListener('resize', () => myChart.resize());
        }
        );
    });

    function ShowSpinner() {
        $('#efec-cargando').removeClass('d-none');
    }

    function HideSpinner() {
        $('#efec-cargando').addClass('d-none');
    }

    function formatearNumero(numero) {
        let numeroRedondeado = Math.round(numero * 100) / 100;
        return new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(numeroRedondeado);
    }
</script>
{% endblock %}
