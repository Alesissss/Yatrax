    function fct_GetRutas() {
        $.getJSON('/trabajadores/viajes/GetData_RutasViajes', function (response) {
            if (response && response.Status === "success") {
                let items = '<option disabled selected>--SELECCIONAR--</option>';
                let rutas = response.data;

                $.each(rutas, function (_, item) {
                    items += `<option value="${item.id}">${item.nombre} - ${item.tipo}</option>`;
                });

                $('#cbx_Ruta').html(items);

                $('#cbx_Ruta').off('change').on('change', function () {
                    let rutaId = $(this).val();
                    let ruta = rutas.find(r => r.id == rutaId);
                    if (!ruta || ruta.escalas.length < 2) return;

                    const escalas = ruta.escalas.sort((a, b) => a.nro_orden - b.nro_orden);
                    let filas = '';

                    for (let i = 0; i < escalas.length; i++) {
                        for (let j = i + 1; j < escalas.length; j++) {
                            const origen = escalas[i];
                            const destino = escalas[j];

                            // Calcular tiempo total entre i y j
                            let tiempoTotal = 0;
                            for (let k = i + 1; k <= j; k++) {
                                tiempoTotal += parseFloat(escalas[k].tiempo_estimado || '0');
                            }

                            const isPrimeraSubruta = (i === 0 && j === 1);
                            const inputSalida = isPrimeraSubruta
                                ? `<input type="datetime-local" class="form-control input-salida" data-tiempo="${tiempoTotal}" onchange="calcularLlegadas()">`
                                : `<span class="fecha-salida"></span>`;

                            filas += `
                            <tr data-i="${i}" data-j="${j}" data-tiempo="${tiempoTotal}">
                                <td class="text-center">Subruta ${origen.nro_orden} - ${destino.nro_orden}</td>
                                <td class="text-center">${origen.nombre}</td>
                                <td class="text-center">${destino.nombre}</td>
                                <td class="text-center">${inputSalida}</td>
                                <td class="text-center"><span class="fecha-llegada"></span></td>
                                <td class="text-center">
                                    <input type="number" step="0.01" min="0" class="form-control precio-input">
                                </td>
                            </tr>
                        `;
                        }
                    }

                    $('#tbl_Escalas tbody').html(filas);
                });
            } else {
                console.error('Error al obtener rutas:', response.Msj);
            }
        });
    }

    function calcularLlegadas() {
        const salidaInput = document.querySelector('.input-salida');
        if (!salidaInput || !salidaInput.value) return;

        const filas = Array.from(document.querySelectorAll('#tbl_Escalas tbody tr'));
        const salidaInicial = moment(salidaInput.value);
        if (!salidaInicial.isValid()) return;

        // Mapa para guardar hora llegada por índice de destino
        const horaLlegadaPorEscala = new Map();

        filas.forEach((fila) => {
            const i = parseInt(fila.dataset.i);
            const j = parseInt(fila.dataset.j);
            const tiempoMin = parseFloat(fila.dataset.tiempo || '0');

            let horaSalida;

            // Si es la primera subruta (1-2), usar input
            if (i === 0 && j === 1) {
                horaSalida = salidaInicial.clone();
            }
            // Si la subruta empieza desde E1 (1–3, 1–4…), usar también la hora inicial
            else if (i === 0) {
                horaSalida = salidaInicial.clone();
            }
            // Si no, usamos la llegada de la subruta anterior como hora de salida
            else {
                horaSalida = horaLlegadaPorEscala.get(i);
            }

            const horaLlegada = moment(horaSalida).add(tiempoMin, 'minutes');

            const salidaCell = fila.querySelector('.fecha-salida');
            if (salidaCell && salidaCell.tagName === 'SPAN') {
                salidaCell.textContent = horaSalida.format('YYYY-MM-DD HH:mm:ss');
            }

            const llegadaCell = fila.querySelector('.fecha-llegada');
            if (llegadaCell) {
                llegadaCell.textContent = horaLlegada.format('YYYY-MM-DD HH:mm:ss');
            }

            // Guardamos hora de llegada para posibles usos futuros
            horaLlegadaPorEscala.set(j, horaLlegada);
        });
    }

    function fct_GetPersonal() {
        $.getJSON('/trabajadores/viajes/GetData_PersonalViajes', function (response) {
            if (response && response.Status === "success") {
                const personal = response.data;

                const choferes = personal.filter(p => p.id_tipopersonal == 1);
                const tripulantes = personal.filter(p => p.id_tipopersonal == 2);

                // Formatear para Select2
                const dataChoferes = choferes.map(c => ({
                    id: c.id,
                    text: c.nombre,
                    data: c  // guardamos toda la info del objeto
                }));

                const dataTripulantes = tripulantes.map(t => ({
                    id: t.id,
                    text: t.nombre,
                    data: t
                }));

                $('#cbx_Chofer').empty().select2({
                    theme: 'bootstrap4',
                    data: dataChoferes,
                    placeholder: "Buscar chofer(es)...",
                    allowClear: true,
                    language: {
                        noResults: function () {
                            return "No se encontraron resultados";
                        }
                    }
                });

                $('#cbx_Tripulante').empty().select2({
                    theme: 'bootstrap4',
                    data: dataTripulantes,
                    placeholder: "Buscar tripulante(s)...",
                    allowClear: true,
                    language: {
                        noResults: function () {
                            return "No se encontraron resultados";
                        }
                    }
                });

                // idsChoferes = [1];
                // idsTripulantes = [4];

                // $('#cbx_Chofer').val(idsChoferes.map(String)).trigger('change');
                // $('#cbx_Tripulante').val(idsTripulantes.map(String)).trigger('change');

            } else {
                console.error('Error al obtener al personal:', response.Msj);
            }
        });
    }

    function fct_LlenarCombos() {
        let idVehiculo = null;

        $.getJSON('/trabajadores/viajes/GetData_ServiciosViajes', function (resServicios) {
            if (resServicios.Status === "success") {
                const servicios = resServicios.data;
                $.getJSON('/trabajadores/viajes/GetData_TipoVehiculosViajes', function (resTipos) {
                    if (resTipos.Status === "success") {
                        const tiposVehiculos = resTipos.data;
                        $.getJSON('/trabajadores/viajes/GetData_VehiculosViajes', function (resVehiculos) {
                            if (resVehiculos.Status === "success") {
                                const vehiculos = resVehiculos.data;

                                const vehiculoSeleccionado = vehiculos.find(v => v.id == idVehiculo);
                                const tipoSeleccionado = tiposVehiculos.find(tv => tv.id == vehiculoSeleccionado?.id_tipo_vehiculo);
                                const idServicio = tipoSeleccionado?.id_servicio;
                                const idTipo = tipoSeleccionado?.id;

                                let htmlServicios = '<option disabled selected value="">--SELECCIONAR--</option>';
                                servicios.forEach(s => {
                                    const selected = s.id == idServicio ? 'selected' : '';
                                    htmlServicios += `<option value="${s.id}" ${selected}>${s.nombre}</option>`;
                                });
                                $('#cbx_Servicio').html(htmlServicios);

                                const tiposFiltrados = tiposVehiculos.filter(tv => tv.id_servicio == idServicio);
                                let htmlTipos = '<option disabled selected value="">--SELECCIONAR--</option>';
                                tiposFiltrados.forEach(tv => {
                                    const selected = tv.id == idTipo ? 'selected' : '';
                                    htmlTipos += `<option value="${tv.id}" ${selected}>${tv.nombre}</option>`;
                                });
                                $('#cbx_TipoVehiculo').html(htmlTipos);

                                const vehiculosFiltrados = vehiculos.filter(v => v.id_tipo_vehiculo == idTipo);
                                let htmlVehiculos = '<option disabled selected value="">--SELECCIONAR--</option>';
                                vehiculosFiltrados.forEach(v => {
                                    const selected = v.id == idVehiculo ? 'selected' : '';
                                    htmlVehiculos += `<option value="${v.id}" ${selected}>${v.placa}</option>`;
                                });
                                $('#cbx_Vehiculo').html(htmlVehiculos);

                                $('#cbx_Servicio').on('change', function () {
                                    const idServicio = $(this).val();
                                    const tiposFiltrados = tiposVehiculos.filter(tv => tv.id_servicio == idServicio);

                                    let htmlTipos = '<option disabled selected value="">--SELECCIONAR--</option>';
                                    tiposFiltrados.forEach(tv => {
                                        htmlTipos += `<option value="${tv.id}">${tv.nombre}</option>`;
                                    });

                                    $('#cbx_TipoVehiculo').html(htmlTipos);
                                    $('#cbx_Vehiculo').html('<option disabled selected value="">--SELECCIONAR--</option>');
                                });

                                $('#cbx_TipoVehiculo').on('change', function () {
                                    const idTipo = $(this).val();
                                    const vehiculosFiltrados = vehiculos.filter(v => v.id_tipo_vehiculo == idTipo);

                                    let htmlVehiculos = '<option disabled selected value="">--SELECCIONAR--</option>';
                                    vehiculosFiltrados.forEach(v => {
                                        htmlVehiculos += `<option value="${v.id}">${v.placa}</option>`;
                                    });

                                    $('#cbx_Vehiculo').html(htmlVehiculos);
                                });

                                $('#cbx_Vehiculo').on('change', function () {
                                    $.getJSON('/trabajadores/viajes/GetData_AsientosViajes', { id: $(this).val(), idTipo: $('#cbx_TipoVehiculo').val() }, function (response) {
                                        if (response && response.Status === "success") {
                                            let data = response.data[0];
                                            $("#txt_Niveles").val(data.niveles);
                                            $("#txt_Asientos").val(data.asientos);
                                        } else {
                                            console.error("Error:", response.Msj);
                                        }
                                    });
                                });

                            } else {
                                console.error('Error al obtener vehículos:', resVehiculos.Msj);
                            }
                        });
                    } else {
                        console.error('Error al obtener tipos de vehículos:', resTipos.Msj);
                    }
                });
            } else {
                console.error('Error al obtener servicios:', resServicios.Msj);
            }
        });
    }

    $(document).ready(function () {
        fct_GetRutas();
        fct_GetPersonal();
        fct_LlenarCombos();

        $("#btn_Registrar").click(function () {
            let fechaHoraSalida = moment($('#txt_hora_salida').val()).format('YYYY-MM-DD HH:mm:ss');
            let fechaHoraLlegada = moment($('#txt_hora_llegada').val()).format('YYYY-MM-DD HH:mm:ss');
            let idRuta = $('#cbx_Ruta').val();
            let idVehiculo = $('#cbx_Vehiculo').val();
            let choferesSeleccionados = $('#cbx_Chofer').select2('data').map(item => item.data);
            let tripulantesSeleccionados = $('#cbx_Tripulante').select2('data').map(item => item.data);

            let estado = $('#cbx_Estado').val();

            if (!fechaHoraSalida || !fechaHoraLlegada || !idRuta || !idVehiculo || !choferesSeleccionados || !tripulantesSeleccionados) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará al viaje. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar viaje",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("fechaHoraSalida", fechaHoraSalida);
                    formData.append("fechaHoraLlegada", fechaHoraLlegada);
                    formData.append("idRuta", idRuta);
                    formData.append("idVehiculo", idVehiculo);
                    formData.append("choferes", JSON.stringify(choferesSeleccionados));
                    formData.append("tripulantes", JSON.stringify(tripulantesSeleccionados));
                    formData.append("estado", estado);

                    $.ajax({
                        url: "/trabajadores/viajes/RegistrarViaje",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/viajes/ProgramarViaje";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Volver").click(function () {
            window.location.href = "/trabajadores/viajes/ProgramarViaje";
        });
    });
</script>
