{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="txt_nombre">Nombre</label>
                        <div class="input-group">
                            <input type="text" id="txt_nombre" class="form-control" placeholder="Nombre"
                                value="{{ sucursal.nombre }}" oninput="this.value = this.value.toUpperCase();">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-home"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="txt_direccion">Dirección</label>
                        <div class="input-group">
                            <input type="text" id="txt_direccion" class="form-control" placeholder="Dirección"
                                value="{{ sucursal.direccion }}" oninput="this.value = this.value.toUpperCase();">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fa fa-map"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="txt_ubicacion">Ubicación</label>
                        <div class="input-group">
                            <input type="text" id="txt_ubicacion" class="form-control" placeholder="Ubicación" readonly
                                value="{{ ubicacion }}" oninput="this.value = this.value.toUpperCase();">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fa fa-map"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="cbx_Estado">Estado</label>
                        <div class="input-group">
                            <select id="cbx_Estado" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{% endif
                                %}>
                                <option disabled>--SELECCIONAR--</option>
                                <option {% if sucursal.estado==1 %}selected{% endif %} value="1">Vigente</option>
                                <option {% if sucursal.estado==0 %}selected{% endif %} value="0">No vigente</option>
                            </select>
                        </div>
                    </div>

                    <h2>Buscar ubicaciones</h2>

                    <div id="map"></div>
                    <div id="info">
                        <p><strong>Latitud:</strong> <span id="lat">-</span></p>
                        <p><strong>Longitud:</strong> <span id="lng">-</span></p>
                    </div>

                    <div class="text-center">
                        <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de
                            sucursales</button>
                        <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                    </div>

                    <input type="hidden" id="txt_departamento" name="departamento">
                    <input type="hidden" id="txt_provincia" name="provincia">
                    <input type="hidden" id="txt_distrito" name="distrito">
                    <input type="hidden" id="txt_country" name="country">
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    #map {
        height: 400px;
        width: 100%;
    }

    #info {
        margin-top: 10px;
    }

    /* Asegúrate de que el cuadro de búsqueda del geocoder esté expandido siempre */
    .leaflet-control-geocoder {
        display: block !important;
        width: 100% !important;
    }

    .leaflet-control-geocoder .leaflet-control-geocoder-form {
        display: block !important;
        width: 100% !important;
        align-content: center !important;
    }

    .leaflet-control-geocoder .leaflet-control-geocoder-icon {
        display: none !important;
        /* Oculta el ícono de la lupa */
    }

    #map>div.leaflet-control-container>div.leaflet-top.leaflet-right>div {
        align-content: center;
    }
</style>

{% endblock %}

{% block scripts %}
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

<script>
    // Configuración del mapa
    const map = L.map('map').setView([-9.19, -75.0152], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        minZoom: 6,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Variable para el marcador de nueva ubicación
    let marker;

    // Cargar sucursales existentes
    function cargarSucursales() {
        fetch('/trabajadores/viajes/ObtenerSucursalesMapa')
            .then(response => response.json())
            .then(sucursales => {
                sucursales.forEach(sucursal => {
                    if (sucursal.latitud && sucursal.longitud) {
                        const popupContent = `
                            <b>${sucursal.nombre}</b><br>
                            <small>${sucursal.direccion || 'Sin dirección'}</small>
                        `;
                        
                        L.marker([sucursal.latitud, sucursal.longitud])
                            .addTo(map)
                            .bindPopup(popupContent);
                    }
                });
            })
            .catch(error => console.error('Error al cargar sucursales:', error));
    }

    // Cargar sucursales al iniciar
    map.whenReady(cargarSucursales);

    // Manejo de clics en el mapa
    map.on('click', async function(e) {
        const lat = e.latlng.lat.toFixed(6);
        const lng = e.latlng.lng.toFixed(6);

        document.getElementById('lat').textContent = lat;
        document.getElementById('lng').textContent = lng;

        if (!marker) {
            marker = L.marker(e.latlng).addTo(map);
        } else {
            marker.setLatLng(e.latlng);
        }

        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`, {
                headers: { 'User-Agent': 'Mozilla/5.0' }
            });
            
            if (response.ok) {
                const data = await response.json();
                const address = data.address || {};
                
                // Obtener los componentes de la dirección
                const departamento = address.state || '';
                const provincia = address.region || '';
                const distrito = address.village || address.town || address.suburb || address.city || address.hamlet ||'';
                const direccionCompleta = data.display_name || 'Dirección no disponible';
                const country = address.country || '';

                // Asignar a campos visibles
                document.getElementById("txt_direccion").value = direccionCompleta;
                document.getElementById("txt_ubicacion").value = `${departamento} - ${provincia} - ${distrito}`;
                document.getElementById("txt_country").value = country;

                // Asignar a los inputs ocultos
                document.getElementById("txt_departamento").value = provincia;
                document.getElementById("txt_provincia").value = provincia;
                document.getElementById("txt_distrito").value = distrito;
            }
        } catch (error) {
            console.error("Error al obtener ubicación:", error);
            document.getElementById("txt_direccion").value = '';
            document.getElementById("txt_ubicacion").value = '';
        }
    });

    // Configuración del buscador
    const searchControl = L.Control.geocoder({
        position: 'topright',
        defaultMarkGeocode: false,
        geocoder: L.Control.Geocoder.nominatim({
            geocodingQueryParams: { countrycodes: 'pe' }
        })
    }).on('markgeocode', function(e) {
        const latlng = e.geocode.center;
        map.setView(latlng, 16);
        
        if (!marker) {
            marker = L.marker(latlng).addTo(map);
        } else {
            marker.setLatLng(latlng);
        }
        
        document.getElementById('lat').textContent = latlng.lat.toFixed(6);
        document.getElementById('lng').textContent = latlng.lng.toFixed(6);
    }).addTo(map);

    // Ajustar el campo de búsqueda
    setTimeout(() => {
        const input = document.querySelector('.leaflet-control-geocoder input');
        if (input) {
            input.placeholder = "Buscar ubicación en Perú...";
            input.style.width = '100%';
        }
    }, 300);

    $(document).ready(function () {
        $("#btn_Registrar").click(function () {
            let nombre = $("#txt_nombre").val().trim();
            let direccion = $("#txt_direccion").val().trim();
            let latitud = $("#lat").text().trim();
            let longitud = $("#lng").text().trim();
            let departamento = $("#txt_departamento").val().trim();
            let provincia = $("#txt_provincia").val().trim();
            let distrito = $("#txt_distrito").val().trim();
            let estado = $('#cbx_Estado').val();
            let country = $("#txt_country").val().trim();

            if (country !== 'Perú') {
                toastr.warning("La ubicación debe ser en Perú", "MENSAJE DE SISTEMA");
                return;
            }

            // Validación de campos obligatorios
            if (!nombre) {
                toastr.warning("El nombre de la sucursal es obligatorio", "MENSAJE DE SISTEMA");
                return;
            }

            if (latitud === '-' || longitud === '-') {
                toastr.warning("Debe seleccionar una ubicación en el mapa", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará una sucursal. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar sucursal",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("txt_nombre", nombre);
                    formData.append("txt_direccion", direccion);
                    formData.append("txt_latitud", latitud);
                    formData.append("txt_longitud", longitud);
                    formData.append("txt_departamento", departamento);
                    formData.append("txt_provincia", provincia);
                    formData.append("txt_distrito", distrito);

                    $.ajax({
                        url: "/trabajadores/viajes/RegistrarSucursal",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    actualizarMapa();
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/viajes/GestionarSucursal";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Editar").click(function () {
            const id = Number("{{ sucursal.id }}");

            let nombre = $("#txt_nombre").val().trim();
            let direccion = $("#txt_direccion").val().trim();
            let latitud = $("#lat").text().trim();
            let longitud = $("#lng").text().trim();
            let departamento = $("#txt_departamento").val().trim();
            let provincia = $("#txt_provincia").val().trim();
            let distrito = $("#txt_distrito").val().trim();
            let estado = $('#cbx_Estado').val();
            let country = $("#txt_country").val().trim();

            if (country !== 'Perú') {
                toastr.warning("La ubicación debe ser en Perú", "MENSAJE DE SISTEMA");
                return;
            }

            if (!nombre || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará la sucursal. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar sucursal",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("txt_nombre", nombre);
                    formData.append("txt_direccion", direccion);
                    formData.append("txt_latitud", latitud);
                    formData.append("txt_longitud", longitud);
                    formData.append("txt_departamento", departamento);
                    formData.append("txt_provincia", provincia);
                    formData.append("txt_distrito", distrito);
                    formData.append("estado", estado);

                    $.ajax({
                        url: `/trabajadores/viajes/EditarSucursal/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    actualizarMapa();
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/viajes/GestionarSucursal";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $("#btn_Aceptar").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarSucursal";
        });

        $("#btn_Volver").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarSucursal";
        });
    });
</script>
{% endblock %}
