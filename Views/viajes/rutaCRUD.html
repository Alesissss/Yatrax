{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="txt_Ruta">Nombre</label>
                            <div class="input-group">
                                <input type="text" id="txt_Ruta" class="form-control" placeholder="Nombre"
                                    value="{{ ruta.nombre }}" oninput="this.value = this.value.toUpperCase();" {% if
                                    btnId=='btn_Aceptar' %}disabled{% endif %}>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="cbx_Origen">Sucursal origen</label>
                            <div class="input-group">
                                <select id="cbx_Origen" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{%
                                    endif %}>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="cbx_Destino">Sucursal destino</label>
                            <div class="input-group">
                                <select id="cbx_Destino" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{%
                                    endif %}>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="cbx_Estado">Estado</label>
                            <div class="input-group">
                                <select id="cbx_Estado" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{%
                                    endif %}>
                                    <option disabled>--SELECCIONAR--</option>
                                    <option {% if ruta.estado==1 %}selected{% endif %} value="1">Vigente</option>
                                    <option {% if ruta.estado==0 %}selected{% endif %} value="0">No vigente</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-12 text-center">
                            <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de
                                rutas</button>
                            <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    function fct_GetSucursales() {
        $.getJSON('/trabajadores/viajes/GetSucursales', function (response) {
            if (response.Status === 'success') {
                let itemsOrigen = [];
                let itemsDestino = [];

                $.each(response.data, function (index, item) {
                    itemsOrigen.push({
                        id: item.id,
                        text: item.id + " - " + item.nombre
                    });

                    itemsDestino.push({
                        id: item.id,
                        text: item.id + " - " + item.nombre
                    });
                });

                $('#cbx_Origen').select2({
                    theme: 'bootstrap4',
                    containerCss: {
                        'background-color': '#1f2d3d',
                    },
                    placeholder: "Buscar...",
                    data: itemsOrigen,
                    language: {
                        noResults: function () {
                            return "No se encontraron resultados";
                        }
                    },
                    allowClear: true
                });

                $('#cbx_Destino').select2({
                    theme: 'bootstrap4',
                    containerCss: {
                        'background-color': '#1f2d3d',
                    },
                    placeholder: "Buscar...",
                    data: itemsDestino,
                    language: {
                        noResults: function () {
                            return "No se encontraron resultados";
                        }
                    },
                    allowClear: true
                });

                $('#cbx_Origen').val("{{ ruta.idOrigen }}").trigger('change');
                $('#cbx_Destino').val("{{ ruta.idDestino }}").trigger('change');

            } else {
                console.error('Error al obtener las sucursales:', response.Msj);
            }
        });
    }

    $(document).ready(function () {
        fct_GetSucursales();

        $("#btn_Registrar").click(function () {
            let nombre = $("#txt_Ruta").val().trim();
            let idOrigen = $('#cbx_Origen').val();
            let idDestino = $('#cbx_Destino').val();
            let estado = $('#cbx_Estado').val();

            if (!nombre || !idOrigen || !idDestino || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            if (idOrigen === idDestino){
                toastr.warning("La sucursal de origen no puede ser la misma que la de destino", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará a la ruta. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar ruta",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("origen", idOrigen);
                    formData.append("destino", idDestino);
                    formData.append("estado", estado);

                    $.ajax({
                        url: "/trabajadores/viajes/RegistrarRuta",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/viajes/GestionarRutas";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Editar").click(function () {
            const id = Number("{{ ruta.id }}");

            let nombre = $("#txt_Ruta").val().trim();
            let idOrigen = $('#cbx_Origen').val();
            let idDestino = $('#cbx_Destino').val();
            let estado = $('#cbx_Estado').val();

            if (!nombre || !idOrigen || !idDestino || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            if (idOrigen === idDestino){
                toastr.warning("La sucursal de origen no puede ser la misma que la de destino", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará a la ruta. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar ruta",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("origen", idOrigen);
                    formData.append("destino", idDestino);
                    formData.append("estado", estado);

                    $.ajax({
                        url: `/trabajadores/viajes/EditarRuta/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                setTimeout(() => {
                                    window.location.href = "/trabajadores/viajes/GestionarRutas";
                                }, 500);
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $("#btn_Aceptar").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarRutas";
        });

        $("#btn_Volver").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarRutas";
        });
    });
</script>
{% endblock %}
