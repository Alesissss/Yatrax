{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <h2>Datos de la ruta</h2>
                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label for="txt_Ruta">Nombre</label>
                                    <div class="input-group">
                                        <input type="text" id="txt_Ruta" class="form-control" placeholder="Nombre"
                                            value="{{ ruta.nombre }}" oninput="this.value = this.value.toUpperCase();"
                                            {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                                    </div>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label for="cbx_Origen">Sucursal origen</label>
                                    <div class="input-group">
                                        <select id="cbx_Origen" class="form-control" {% if btnId=='btn_Aceptar'
                                            %}disabled{% endif %}>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label for="cbx_Destino">Sucursal destino</label>
                                    <div class="input-group">
                                        <select id="cbx_Destino" class="form-control" {% if btnId=='btn_Aceptar'
                                            %}disabled{% endif %}>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label for="cbx_Estado">Estado</label>
                                    <div class="input-group">
                                        <select id="cbx_Estado" class="form-control" {% if btnId=='btn_Aceptar'
                                            %}disabled{% endif %}>
                                            <option disabled>--SELECCIONAR--</option>
                                            <option {% if ruta.estado==1 %}selected{% endif %} value="1">Vigente
                                            </option>
                                            <option {% if ruta.estado==0 %}selected{% endif %} value="0">No vigente
                                            </option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <h2>Ubicación de la ruta en el mapa</h2>
                            <button id="btnMostrarRuta" type="button" class="btn btn-primary">Mostrar ruta</button>
                            <div id="map"></div>
                        </div>
                        <div class="col-md-12 text-center mt-3">
                            <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de
                                rutas</button>
                            <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                        </div>
                    </div>
                    <input type="hidden" id="txt_departamento" name="departamento">
                    <input type="hidden" id="txt_provincia" name="provincia">
                    <input type="hidden" id="txt_distrito" name="distrito">
                    <input type="hidden" id="txt_country" name="country">
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block styles %}
<style>
    #map {
        height: 600px;
        width: 100%;
    }

    .leaflet-control-geocoder {
        display: block !important;
        width: 100% !important;
    }

    .leaflet-control-geocoder .leaflet-control-geocoder-form {
        display: block !important;
        width: 100% !important;
        align-content: center !important;
    }

    .leaflet-control-geocoder .leaflet-control-geocoder-icon {
        display: none !important;
        /* Oculta el ícono de la lupa */
    }

    #map>div.leaflet-control-container>div.leaflet-top.leaflet-right>div {
        align-content: center;
    }
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

{% endblock %}
{% block scripts %}

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<!-- Leaflet Routing Machine -->
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.min.js"></script>
<!-- OpenRouteService -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
    // Configuración del mapa
    const map = L.map('map').setView([-9.19, -75.0152], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 18,
        minZoom: 6,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const orsAPIKey = '5b3ce3597851110001cf6248ee3267fd49824a40983b5ec79e79356f';

    // Variable para el marcador de nueva ubicación
    let marker;

    // Variable global para controlar la ruta
    var controlRuta;

    function dibujarRuta(origen, destino) {
        console.log("Origen:", origen);
        console.log("Destino:", destino);

        const orsAPIKey = '5b3ce3597851110001cf6248ee3267fd49824a40983b5ec79e79356f'; // 👉 Reemplaza con tu API Key de OpenRouteService

        // Hacer la solicitud a OpenRouteService usando Axios
        axios.get('https://api.openrouteservice.org/v2/directions/driving-car', {
            headers: {
                'Authorization': orsAPIKey
            },
            params: {
                start: `${origen.longitud},${origen.latitud}`,  // Long, Lat
                end: `${destino.longitud},${destino.latitud}`
            }
        })
            .then(function (response) {
                console.log("Respuesta de la API:", response.data);

                // Verificamos si existen features en la respuesta
                if (response.data.features && response.data.features.length > 0) {
                    const ruta = response.data.features[0].geometry.coordinates;

                    // Verificamos si existen coordenadas en la ruta
                    if (ruta && ruta.length > 0) {
                        // Dibujar la ruta en el mapa
                        L.polyline(ruta.map(coord => [coord[1], coord[0]]), { color: 'blue' }).addTo(map);
                    } else {
                        console.error("No se encontraron coordenadas en la ruta.");
                    }
                } else {
                    console.error("No se encontró ninguna ruta.");
                }
            })
            .catch(function (error) {
                console.error('Error al obtener la ruta:', error);
            });
    }

    function fct_GetSucursales() {
        $.getJSON('/trabajadores/viajes/GetSucursales', function (response) {
            if (response.Status === 'success') {
                let itemsOrigen = [];
                let itemsDestino = [];

                $.each(response.data, function (index, item) {
                    let option = {
                        id: item.id,
                        text: item.id + " - " + item.nombre,
                        latitud: item.latitud,
                        longitud: item.longitud
                    };

                    itemsOrigen.push(option);
                    itemsDestino.push(option);
                });

                $('#cbx_Origen').select2({
                    theme: 'bootstrap4',
                    placeholder: "Buscar...",
                    data: itemsOrigen,
                    language: {
                        noResults: function () {
                            return "No se encontraron resultados";
                        }
                    },
                    allowClear: true
                });

                $('#cbx_Destino').select2({
                    theme: 'bootstrap4',
                    placeholder: "Buscar...",
                    data: itemsDestino,
                    language: {
                        noResults: function () {
                            return "No se encontraron resultados";
                        }
                    },
                    allowClear: true
                });

                $('#cbx_Origen').val("{{ ruta.idOrigen }}").trigger('change');
                $('#cbx_Destino').val("{{ ruta.idDestino }}").trigger('change');
            } else {
                console.error('Error al obtener las sucursales:', response.Msj);
            }
        });
    }

    $(document).ready(function () {
        fct_GetSucursales();

        $('#btnMostrarRuta').on('click', function () {
            const origen = $('#cbx_Origen').select2('data')[0];
            const destino = $('#cbx_Destino').select2('data')[0];

            let idOrigen = $('#cbx_Origen').val();
            let idDestino = $('#cbx_Destino').val();
            
            if (idOrigen === idDestino) {
                toastr.warning("La sucursal de origen no puede ser la misma que la de destino", "MENSAJE DE SISTEMA");
                return;
            }

            if (origen && destino) {
                dibujarRuta({
                    latitud: parseFloat(origen.latitud),
                    longitud: parseFloat(origen.longitud)
                }, {
                    latitud: parseFloat(destino.latitud),
                    longitud: parseFloat(destino.longitud)
                });
            } else {
                toastr.warning('Por favor selecciona ambas sucursales.', 'MENSAJE DE SISTEMA');
            }
        });

        $("#btn_Registrar").click(function () {
            let nombre = $("#txt_Ruta").val().trim();
            let idOrigen = $('#cbx_Origen').val();
            let idDestino = $('#cbx_Destino').val();
            let estado = $('#cbx_Estado').val();

            if (!nombre || !idOrigen || !idDestino || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            if (idOrigen === idDestino) {
                toastr.warning("La sucursal de origen no puede ser la misma que la de destino", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará a la ruta. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar ruta",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("origen", idOrigen);
                    formData.append("destino", idDestino);
                    formData.append("estado", estado);

                    $.ajax({
                        url: "/trabajadores/viajes/RegistrarRuta",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/viajes/GestionarRutas";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Editar").click(function () {
            const id = Number("{{ ruta.id }}");

            let nombre = $("#txt_Ruta").val().trim();
            let idOrigen = $('#cbx_Origen').val();
            let idDestino = $('#cbx_Destino').val();
            let estado = $('#cbx_Estado').val();

            if (!nombre || !idOrigen || !idDestino || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            if (idOrigen === idDestino) {
                toastr.warning("La sucursal de origen no puede ser la misma que la de destino", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará a la ruta. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar ruta",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("origen", idOrigen);
                    formData.append("destino", idDestino);
                    formData.append("estado", estado);

                    $.ajax({
                        url: `/trabajadores/viajes/EditarRuta/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                setTimeout(() => {
                                    window.location.href = "/trabajadores/viajes/GestionarRutas";
                                }, 500);
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Aceptar").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarRutas";
        });

        $("#btn_Volver").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarRutas";
        });
    });

    function cargarSucursales() {
        fetch('/trabajadores/viajes/ObtenerSucursalesMapa')
            .then(response => response.json())
            .then(sucursales => {
                sucursales.forEach(sucursal => {
                    if (sucursal.latitud && sucursal.longitud) {
                        const popupContent = `
                            <b>${sucursal.nombre}</b><br>
                            <small>${sucursal.direccion || 'Sin dirección'}</small>
                        `;

                        L.marker([sucursal.latitud, sucursal.longitud])
                            .addTo(map)
                            .bindPopup(popupContent);
                    }
                });
            })
            .catch(error => console.error('Error al cargar sucursales:', error));
    }

    // Cargar sucursales al iniciar
    map.whenReady(cargarSucursales);
</script>
{% endblock %}
