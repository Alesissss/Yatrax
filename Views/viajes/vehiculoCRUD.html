{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="txt_placa">Placa</label>
                            <input type="text" name="txt_placa" id="txt_placa" class="form-control"
                                placeholder="Ingrese número de placa" value="{{ vehiculo.placa }}" {% if
                                btnId=="btn_Regresar" %} disabled {% endif %}>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="txt_anio">Año</label>
<input type="date" name="txt_anio" id="txt_anio" class="form-control"
    placeholder="Ingrese el año del vehículo" value="{{ vehiculo.anio }}" {% if btnId=="btn_Regresar" %} disabled {% endif %}>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="txt_color">Color:</label>
                            <select id="txt_color" class="form-control" name="txt_color" {% if btnId=="btn_Regresar" %}
                                disabled {% endif %}>
                                <option value="NEGRO" {% if vehiculo.color == 'NEGRO' %} selected {% endif %}>⚫ NEGRO</option>
                                <option value="GRIS" {% if vehiculo.color == 'GRIS' %} selected {% endif %}>⚪ GRIS</option>
                                <option value="ROJO" {% if vehiculo.color == 'ROJO' %} selected {% endif %}>🔴 ROJO</option>
                                <option value="VERDE" {% if vehiculo.color == 'VERDE' %} selected {% endif %}>🟢 VERDE</option>
                                <option value="AZUL" {% if vehiculo.color == 'AZUL' %} selected {% endif %}>🔵 AZUL</option>
                                <option value="AMARILLO" {% if vehiculo.color == 'AMARILLO' %} selected {% endif %}>🟡 AMARILLO</option>
                                <option value="MORADO" {% if vehiculo.color == 'MORADO' %} selected {% endif %}>🟣 MORADO</option>
                                <option value="CELESTE" {% if vehiculo.color == 'CELESTE' %} selected {% endif %}>🔷 CELESTE</option>
                            </select>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="cbx_Tipo">Tipo Vehículo</label>
                            <div class="input-group">
                                <select id="cbx_Tipo" name="cbx_Tipo" class="form-control" {% if
                                    btnId=='btn_Regresar' %}disabled{% endif %}>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="txt_estado">Estado</label>
                            <select id="cbx_Estado" name="txt_estado" class="form-control" {% if btnId=="btn_Regresar"
                                %} disabled {% endif %}>
                                <option value="1" {% if vehiculo.estado==1 %}selected{% endif %}>Vigente</option>
                                <option value="0" {% if vehiculo.estado==0 %}selected{% endif %}>No vigente</option>
                            </select>
                        </div>
                        <div class="col-md-12 text-center">
                            <button id="btn_Listado" type="button" class="btn btn-danger">Volver al listado de
                                vehículos</button>
                            <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
<script>
    function fct_GetTipos() {
        $.getJSON('/trabajadores/viajes/GetTiposVehiculo_Vehiculo', function (response) {
            if (response.Status === 'success') {
                let items = '<option disabled selected>--SELECCIONAR--</option>';

                $.each(response.data, function (index, item) {
                    if (item.id === Number("{{ vehiculo.id_tipo_vehiculo }}")) {
                        items += `<option selected value="${item.id}">${item.nombre}</option>`;
                    } else {
                        items += `<option value="${item.id}">${item.nombre}</option>`;
                    }
                });

                $('#cbx_Tipo').html(items);
            } else {
                console.error('Error al obtener los tipos de usuario:', response.Msj);
            }
        });
    }
    // Aquí puedes agregar cualquier script que necesites
    $(document).ready(function () {

        $('#txt_placa').mask('AAA-AAA', {
        translation: {
            'A': { pattern: /[A-Za-z0-9]/ }
        },
        placeholder: "___-___"
    });
        fct_GetTipos();

        $("#btn_Listado").click(() => {
            window.location.href = "/trabajadores/viajes/GestionarVehiculo"
        })

        $("#btn_Regresar").click(() => {
            window.location.href = "/trabajadores/viajes/GestionarVehiculo"
        })


        // Validar formato exacto XXX-XXX


        $("#btn_Registrar").click(function () {
            let placa = $("#txt_placa").val().trim();
            let anio = $("#txt_anio").val();
if (anio) {
    anio = anio.substring(0, 4); // Solo el año
}
            let color = $("#txt_color").val().toUpperCase();
            let idTipoVehiculo = $("#cbx_Tipo").val();
            let estado = $('#cbx_Estado').val();

            if (!placa || !anio || !color || !idTipoVehiculo || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }else{
                const placaRegex = /^[A-Za-z0-9]{3}-[A-Za-z0-9]{3}$/;
if (!placaRegex.test(placa)) {
    toastr.warning("La placa debe tener el formato XXX-XXX (6 caracteres y un guion)", "MENSAJE DE SISTEMA");
    return;
}
            }
           
            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará al vehículo. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar vehículo",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("placa", placa);
                    formData.append("anio", anio);
                    formData.append("color", color);
                    formData.append("idTipoVehiculo", idTipoVehiculo);
                    formData.append("estado", estado);

                    $.ajax({
                        url: "/trabajadores/viajes/registrarVehiculo",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/viajes/GestionarVehiculo";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Actualizar").click(function () {
            const id = Number("{{ vehiculo.id }}");

            let placa = $("#txt_placa").val().trim();
            let anio = $("#txt_anio").val();
            let color = $("#txt_color").val().toUpperCase();
            let idTipoVehiculo = $("#cbx_Tipo").val();
            let estado = $('#cbx_Estado').val();

            if (!placa || !anio || !color || !idTipoVehiculo) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará al vehículo. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar vehículo",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("placa", placa);
                    formData.append("anio", anio);
                    formData.append("color", color);
                    formData.append("idTipoVehiculo", idTipoVehiculo);
                    formData.append("estado", estado);

                    $.ajax({
                        url: `/trabajadores/viajes/editarVehiculo/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/viajes/GestionarVehiculo";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });
    });
</script>
{% endblock %}
