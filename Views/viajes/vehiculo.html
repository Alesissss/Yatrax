{% extends "index.html" %}

{% block title %}YATRAX - Gestión de tipo vehiculo{% endblock %}

{% block content %}
<div class="container-fluid p-4">
    <div class="panel-heading">
        <div class="row">
            <div class="col-md-12">
                <h1>Gestionar vehículo</h1>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div class="row">
            <div class="col-12">
                <table id="tbl_Vehiculo" class="table table-bordered table-short-rows">
                    <thead class="bg-gray">
                        <tr>
                            <th class="text-center">ID</th>
                            <th class="text-center">PLACA</th>
                            <th class="text-center">AÑO</th>
                            <th class="text-center">COLOR</th>
                            <th class="text-center">TIPO VEHICULO</th>
                            <th class="text-center">MARCA</th>
                            <th class="text-center">ESTADO</th>
                            <th class="text-center">ACCION</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white table-short-rows">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    var dtUsuarios;

    $(document).ready(function () {
        // $('body').addClass('sidebar-collapse');
        var windowHeight = $('body > div.os-padding.menu-open > div > div > div > div.content-wrapper').height() / 2;
        //CONFIGURACION POR DEFECTO DATATABLES
        $.extend($.fn.dataTable.defaults, {
            dom: "<'row align-items-center'<'col-sm-8 justify-content-start'f><'col-sm-4 c1 d-flex justify-content-end'>>" + "<'row align-items-center'<'col-sm-4'l><'col-sm-4 my-3 justify-content-start d-flex'B><'col-sm-4 d-flex justify-content-end'p>>" + "rt" + "<'row'<'col-sm-6'i><'col-sm-6 mt-1 d-flex justify-content-end'p>>",
            // dom: "<'row pb-1'<'col-sm-9 d-flex'B><'col-sm-3 c1 d-flex justify-content-end'>>" + "<'row'<'col-sm-4'l><'col-sm-8 justify-content-start'f>>" + "<'row'<'col-sm-6'i><'col-sm-6 d-flex justify-content-end'p>>" + "rt" + "<'row'<'col-sm-6'i><'col-sm-6 mt-1 d-flex justify-content-end'p>>",
            // dom: "<'row pb-1'<'col-sm-9'B><'col-sm-3 c1 d-flex justify-content-end'>>" + "<'row'<'col-sm-10'l><'col-sm-2'f>>" + "<'row'<'col-sm-6'i><'col-sm-6'p>>" + "rt" + "<'row'<'col-sm-6'i><'col-sm-6'p>>",
            // dom: "<'row pb-1'<'col-sm-10'B><'col-sm-2 c1 d-flex justify-content-end'>>" + "<'row'<'col-sm-11'l><'col-sm-1'f>>" + "<'row'<'col-sm-10'i><'col-sm-2'p>>" + "rt" + "<'row'<'col-sm-10'i><'col-sm-2'p>>",
            paging: true,
            select: true,
            scroller: false,
            deferRender: true,
            scrollY: windowHeight,
            scrollX: false,
            fixedHeader: true,
            ordering: true,
            destroy: true,
            responsive: true,
            autoWidth: false,
            processing: true,
            filter: true,
            orderMulti: true,
            stateSave: false,
            serverSide: false,
            language: {
                processing: "Procesando...",
                sSearch: "Buscar:",
                lengthMenu: "Mostrar _MENU_ registros",
                info: "Mostrando del _START_ al _END_ de un total de _TOTAL_ registros",
                infoEmpty: "Sin registros encontrados.",
                infoFiltered: "(Total de _MAX_ registros filtrados)",
                loadingRecords: "Cargando...",
                zeroRecords: "No se encontraron registros",
                emptyTable: "No hay datos disponibles en la tabla",
                paginate: {
                    previous: "Anterior",
                    next: "Siguiente",
                    first: "Primero",
                    last: "Último",
                },
                aria: {
                    sortAscending: ": Activar para ordenar la columna de manera ascendente",
                    sortDescending: ": Activar para ordenar la columna de manera descendente"
                },
                select: {
                    rows: {
                        _: "%d filas seleccionadas",
                        0: "Haz clic en una fila para seleccionarla",
                        1: "1 fila seleccionada"
                    }
                },
                buttons: {
                    copyTitle: 'Copiado en el portapapeles',
                    copyKeys: 'Presiona <i>ctrl</i> o <i>\u2318</i> + <i>C</i> para copiar los datos de la tabla a tu portapapeles. <br><br>Para cancelar, haga clic en este mensaje o presione Esc.',
                    copySuccess: {
                        _: '%d registros copiados correctamente',
                        1: '1 registro copiado correctamente'
                    }
                }
            },
            lengthMenu: [[100, 200, 500, -1], [100, 200, 500, 'Todos']],
        });

        fct_IniciarTablaUsuarios('#tbl_Vehiculo');
    });

    function fct_IniciarTablaUsuarios(IdTabla) {
        // Inicializar DataTables con botones
        dtUsuarios = $(IdTabla).DataTable({
            buttons: [
                {
                    extend: 'copy',
                    text: '<i class="bi bi-back"></i>',
                    titleAttr: 'Copiar en portapapeles',
                    className: 'btn btn-primary',
                },
                {
                    extend: 'excel',
                    text: '<i class="bi bi-file-earmark-excel"></i>',
                    titleAttr: 'Exportar a Excel',
                    className: 'btn btn-success',
                    filename: 'Vehículo' + ' ' + moment().format('DD-MM-YYYY HH_mm'),
                    footer: true,
                    exportOptions:
                    {
                        stripHtml: true,
                        columns: ':not(:last-child)'
                    },
                },
                {
                    extend: 'pdf',
                    text: '<i class="bi bi-file-earmark-pdf"></i>',
                    titleAttr: 'Exportar a PDF',
                    className: 'btn btn-danger',
                    filename: 'Vehículo' + ' ' + moment().format('DD-MM-YYYY HH_mm'),
                    exportOptions:
                    {
                        stripHtml: true,
                        columns: ':not(:last-child)'
                    },
                    orientation: 'landscape',
                    pageSize: 'LEGAL',
                },
                {
                    extend: 'print',
                    text: '<i class="bi bi-printer-fill"></i>',
                    titleAttr: 'Imprimir',
                    className: 'btn btn-info',
                    exportOptions:
                    {
                        stripHtml: true,
                        columns: ':not(:last-child)'
                    },
                },
                {
                    extend: 'colvis',
                    text: '<i class="bi bi-ui-checks"></i>',
                    titleAttr: 'Seleccionar',
                    className: 'btn btn-warning',
                    columns: ':not(.noVis)',
                },
                {
                    text: '<i class= "bi bi-plus-circle" style="margin-right: 5px;"></i>Nuevo  vehículo',
                    className: 'btn bg-success m-1',
                    titleAttr: 'Nuevo',
                    action: function (e, dt, node, config) {
                        fct_NuevoVehiculo();
                    },
                },
            ],
            ajax: {
                url: "/trabajadores/viajes/GetData_Vehiculo",
                type: "GET",
                datatype: "json",
                data: function (d) {
                },
                dataSrc: function (json) {
                    if (json.Status === "error") {
                        toastr.error('Ocurrió un error inesperado al intentar listar la tabla');
                        console.error(json.Msj);
                        return [];
                    }
                    return json.data;
                },
                error: function (xhr, error, thrown) {
                    toastr.error('Ocurrió un error inesperado al intentar listar la tabla');
                    console.error('Error en la solicitud Ajax: ' + error + xhr.Msj + thrown);
                },
            },
            columns: [
                { data: "id", name: "Id" },
                { data: "placa", name: "Placa" },
                { data: "anio", name: "Año" },
                { data: "color", name: "Color" },
                { data: "tipoVehiculo", name: "Tipo Vehiculo" },
                { data: "marca", name: "Marca" },
                { 
                    data: "estado", 
                    name: "estado",
                    render: function (data, type, row) {
                        let estado = data === 1 ? 'Vigente' : 'No vigente';
                        if (estado === "Vigente") {
                            return `<h5 class="mb-0 d-flex align-items-center justify-content-center"><span class="badge badge-success fs-5">${estado}</span></h5>`;
                        } else if (estado === "No vigente") {
                            return `<h5 class="mb-0 d-flex align-items-center justify-content-center"><span class="badge badge-danger fs-5">${estado}</span></h5>`;
                        } else {
                            return `<h5 class="mb-0 d-flex align-items-center justify-content-center"><span class="badge fs-5" style="background-color: #800080; color: white;">${estado}</span></h5>`;
                        }
                    },
                },
                {
                    data: null,
                    name: null,
                    render: function (data, type, row) {
                        return `
                        <div class="flex-wrap btn-group">
                            <button class="btn btn-xs m-1 btn-info" onclick="fct_AgregarNivel('${data.id}')" title="Registrar nivel">Agregar nivel</button>
                            <button class="btn btn-xs m-1 btn-info" onclick="fct_VerVehiculo('${data.id}')" title="Ver tipo vehiculo"><i class="bi bi-eye"></i></button>
                            <button class="btn btn-xs m-1 btn-primary" onclick="fct_VehiculoEditar('${data.id}')" title="Editar tipo vehiculo"><i class="bi bi-pencil-square"></i></button>
                            <button class="btn btn-xs m-1 btn-warning" onclick="fct_VehiculoDarBaja('${data.id}')" title="Dar de baja tipo vehiculo"><i class="bi bi-arrow-down-circle"></i></button>
                            <button class="btn btn-xs m-1 btn-danger" onclick = "fct_VehiculoEliminar('${data.id}')" title="Eliminar tipo vehiculo"><i class="bi bi-trash"></i></button>
                        </div>
                        `;
                    },
                    className: 'text-center align-middle',
                }
            ],
            columnDefs: [
                {
                    targets: [0],
                    className: "text-center align-middle",
                },
                {
                    targets: [1, 2, 3, 4, 5, 6],
                    className: 'text-center align-middle',
                },
                {
                    targets: [7],
                    orderable: false,
                    width: '10%',
                },
            ],
            lengthMenu: [[100, 200, 500, -1], [100, 200, 500, 'Todos']],
            initComplete: function (data, row, cell, start, end, display) {
                $('.dt-buttons button').addClass('m-1');
                $('.dt-button-collection').appendTo('.dt-buttons');
                $('.btn.btn-success').removeClass('dt-button btn-secondary buttons-excel buttons-html5');
                $('.btn.btn-danger').removeClass('dt-button btn-secondary buttons-pdf buttons-html5');
                $('.btn.btn-primary').removeClass('dt-button btn-secondary buttons-copy buttons-html5');
                $('.btn.btn-info').removeClass('dt-button btn-secondary buttons-print');
                $('.btn.btn-warning').removeClass('dt-button btn-secondary buttons-collection buttons-colvis');
                //TAMAÑO DE LOS BOTONES
                $('.btn.btn-success.m-1').addClass('btn-xs');
                $('.btn.btn-danger.m-1').addClass('btn-xs');
                $('.btn.btn-primary.m-1').addClass('btn-xs');
                $('.btn.btn-info.m-1').addClass('btn-xs');
                $('.btn.btn-warning.m-1').addClass('btn-xs');
                //Palabra exportar
                // $('.dt-buttons').parent().prepend('<h5 class="mr-2">Exportar</h5>');
                //Botón Nuevo
                $('button[title="Nuevo"]').attr('id', 'btn_Nuevo');
                $('#btn_Nuevo').removeClass('dt-button');
                $('#btn_Nuevo').appendTo('div.col-sm-4.c1.d-flex.justify-content-end');
            },
        });
    }

    (function(){
    // ─── 1) Función para cargar el combo ─────────────────────────────────────
    function _getVehiculos(Id) {
      $.getJSON('/trabajadores/viajes/GetData_Vehiculo', function(response) {
        if (response.Status === 'success') {
          let options = '<option disabled>--SELECCIONAR--</option>';
          $.each(response.data, function(_, item) {
            const sel = (item.id === Number(Id)) ? ' selected' : '';
            options += `<option value="${item.id}"${sel}>${item.placa}</option>`;
          });
          $('#cbx_Vehiculo').html(options);
        } else {
          console.error('Error al obtener vehiculos:', response.Msj);
        }
      });
    }

    // ─── 2) Función para generar e inyectar el modal ─────────────────────────
    function _generarModalNivel(Id) {
      // 2.1) Remuevo cualquier modal previo
      $('#modalNivel').remove();

      // 2.2) Inyecto el HTML
      const html = `
      <div class="modal fade" id="modalNivel" tabindex="-1" aria-labelledby="modalNivelLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header bg-primary text-white">
              <h5 class="modal-title" id="modalNivelLabel"></h5>
            </div>
            <div class="modal-body">
              <form id="formNivel">
                <input type="hidden" id="txt_idVehiculo" name="txt_idVehiculo">
                <div class="mb-3">
                  <label for="cbx_Vehiculo">Vehículo</label>
                  <select id="cbx_Vehiculo" name="txt_vehiculo" class="form-control">
                    <option>Cargando...</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label for="txt_cantidad">Cantidad de asientos</label>
                  <input type="number" id="txt_cantidad" name="txt_cantidad" class="form-control" placeholder="Cantidad de espacios">
                </div>
                <div class="text-center">
                  <button type="button" id="btn_Listado" class="btn btn-danger" data-bs-dismiss="modal">Volver al listado</button>
                  <button type="submit" id="btn_Action" class="btn btn-primary">Aceptar</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>`;
      $('body').append(html);

      // 2.3) Ahora que existe el <select>, lo cargamos
      _getVehiculos(Id);
    }

    // ─── 3) Función de alto nivel que usa las dos anteriores ────────────────
    function _agregarNivel(Id) {
      // 3.1) genero e inyecto modal
      _generarModalNivel(Id);

      // 3.2) seteo valores y textos
      $('#txt_idVehiculo').val(Id);
      $('#modalNivelLabel').text('Registrar Nivel');
      $('#btn_Action').text('Registrar');
      $('#formNivel')[0].reset();

      // 3.3) muestro el modal
      const modal = new bootstrap.Modal(document.getElementById('modalNivel'));
      modal.show();

      // 3.4) binding de botones / submit
      $('#btn_Listado').off('click').on('click', () => {
        modal.hide();
        window.location.href = '/trabajadores/viajes/GestionarVehiculo';
      });

      $('#formNivel').off('submit').on('submit', function(e) {
        e.preventDefault();
        $.ajax({
          url: '/trabajadores/viajes/registrarNivel',
          type:"POST",
          data: $(this).serialize(),
          success(resp) {
            if (resp.Status === 'success') {
              toastr.success(resp.Msj || 'Nivel registrado correctamente','Éxito');
              setTimeout(() => window.location.reload(), 800);
            } else {
              toastr.error(resp.Msj || 'Ocurrió un error','Error');
            }
          },
          error(xhr) {
            const msg = xhr.responseJSON?.Msj || 'Error desconocido';
            toastr.error(msg,'Error');
          }
        });
      });
    }

    // ─── 4) Exponer globalmente y hacer binding de botones ──────────────────
    window.fct_GetVehiculos = _getVehiculos;
    window.fct_AgregarNivel = _agregarNivel;

    // binding en document ready para cualquier botón .btn-agregar-nivel
    $(function(){
      $(document).on('click', '.btn-agregar-nivel', function(){
        const id = $(this).data('id');
        _agregarNivel(id);
      });
    });
  })();

    function fct_NuevoVehiculo() {
        window.location.href = '/trabajadores/viajes/registrarVehiculo';
    }

    function fct_VehiculoEditar(Id) {
        window.location.href = `/trabajadores/viajes/editarVehiculo/${Id}`;
    }

    function fct_VerVehiculo(Id) {
        window.location.href = `/trabajadores/viajes/verVehiculo/${Id}`;
    }

    function fct_VehiculoEliminar(Id) {
        Swal.fire({
            title: "¿Estás seguro?",
            text: "Esta acción eliminará el tipo de vehiculo. ¿Deseas continuar?",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#3085d6",
            cancelButtonColor: "#d33",
            confirmButtonText: "Sí, eliminar",
            cancelButtonText: "Cancelar",
            reverseButtons: true // Invertir el orden de los botones
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url: `/trabajadores/viajes/eliminarVehiculo/${Id}`,  // Pasamos el ID en la URL
                    type: "POST",
                    contentType: "application/json",
                    success: function (response) {
                        if (response.Status === "success") {
                            if (response.Msj2 !== '' && response.Msj2 !== null) {
                                toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                return;
                            }
                            fct_IniciarTablaUsuarios('#tbl_Vehiculo');
                            toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                        } else {
                            toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            console.error('Error: ' + response.Msj);
                        }
                    },
                    error: function (xhr, Status, error) {
                        toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        console.error('Error:' + error);
                    }
                });
            }
        });
    }

    function fct_VehiculoDarBaja(Id) {
        Swal.fire({
            title: "¿Estás seguro?",
            text: "Esta acción le dará de baja al tipo de vehiculo. ¿Deseas continuar?",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#3085d6",
            cancelButtonColor: "#d33",
            confirmButtonText: "Sí, dar de baja",
            cancelButtonText: "Cancelar",
            reverseButtons: true // Invertir el orden de los botones
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url: `/trabajadores/viajes/DarBajaVehiculo/${Id}`,  // Pasamos el ID en la URL
                    type: "POST",
                    contentType: "application/json",
                    success: function (response) {
                        if (response && response.Status === "success") {
                            fct_IniciarTablaUsuarios('#tbl_Vehiculo');
                            toastr.success(response.Msj || "Operación exitosa", "MENSAJE DE SISTEMA");
                        } else {
                            toastr.error((response && response.Msj) || "Error desconocido", "MENSAJE DE SISTEMA");
                            console.error('Error: ' + (response ? response.Msj : "No hay respuesta"));
                        }
                    },

                    error: function (xhr, Status, error) {
                        toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        console.error('Error:' + error);
                    }
                });
            }
        });
    }

    function newexportaction(e, dt, button, config) {
        // Guardar el contenido original del botón
        var originalText = $(button).html();
        // Cambiar el contenido del botón para incluir un spinner
        $(button).html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>');

        var self = this;
        var oldStart = dt.settings()[0]._iDisplayStart;
        dt.one('preXhr', function (e, s, data) {
            // Just this once, load all data from the server...
            data.start = 0;
            data.length = 2147483647;
            dt.one('preDraw', function (e, settings) {
                // Call the original action function
                if (button[0].className.indexOf('buttons-copy') >= 0 || button[0].className.indexOf('btn btn-primary') >= 0) {
                    $.fn.dataTable.ext.buttons.copyHtml5.action.call(self, e, dt, button, config);
                }
                else if (button[0].className.indexOf('btn btn-success') >= 0 || button[0].className.indexOf('btn btn-success') >= 0) {
                    $.fn.dataTable.ext.buttons.excelHtml5.available(dt, config) ?
                        $.fn.dataTable.ext.buttons.excelHtml5.action.call(self, e, dt, button, config) :
                        $.fn.dataTable.ext.buttons.excelFlash.action.call(self, e, dt, button, config);
                }
                else if (button[0].className.indexOf('buttons-csv') >= 0) {
                    $.fn.dataTable.ext.buttons.csvHtml5.available(dt, config) ?
                        $.fn.dataTable.ext.buttons.csvHtml5.action.call(self, e, dt, button, config) :
                        $.fn.dataTable.ext.buttons.csvFlash.action.call(self, e, dt, button, config);
                }
                else if (button[0].className.indexOf('buttons-pdf') >= 0 || button[0].className.indexOf('btn btn-danger') >= 0) {
                    $.fn.dataTable.ext.buttons.pdfHtml5.available(dt, config) ?
                        $.fn.dataTable.ext.buttons.pdfHtml5.action.call(self, e, dt, button, config) :
                        $.fn.dataTable.ext.buttons.pdfFlash.action.call(self, e, dt, button, config);
                }
                else if (button[0].className.indexOf('buttons-print') >= 0 || button[0].className.indexOf('btn btn-info') >= 0) {
                    $.fn.dataTable.ext.buttons.print.action(e, dt, button, config);
                }
                // Restaurar el contenido original del botón después de que la exportación ha concluido
                $(button).html(originalText);

                dt.one('preXhr', function (e, s, data) {
                    // DataTables thinks the first item displayed is index 0, but we're not drawing that.
                    // Set the property to what it was before exporting.
                    settings._iDisplayStart = oldStart;
                    data.start = oldStart;
                });
                // Reload the grid with the original page. Otherwise, API functions like table.cell(this) don't work properly.
                setTimeout(dt.ajax.reload, 0);
                // Prevent rendering of the full data to the DOM
                return false;
            });
        });
        // Requery the server with the new one-time export settings
        dt.ajax.reload();
    };
</script>
{% endblock %}
