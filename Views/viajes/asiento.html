{% extends "index.html" %}

{% block title %}YATRAX - Gestión de asientos{% endblock %}

{% block content %}
<div class="container-fluid p-4">
    <div class="panel-heading">
        <div class="row">
            <div class="col-md-12">
                <h1>Gestionar asientos</h1>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div class="row">
            <div class="col-12">
                <table id="tbl_Asientos" class="table table-bordered table-short-rows">
                    <thead class="bg-gray">
                        <tr>
                            <th class="text-center">ID</th>
                            <th class="text-center">NUMERO DE ASIENTO</th>
                            <th class="text-center">NIVEL</th>
                            <th class="text-center">TIPO DE ASIENTO</th>
                            <th class="text-center">ESTADO</th>

                            <th class="text-center">ACCIÓN</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white table-short-rows">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    var dtAsientos;

    $(document).ready(function () {
        // $('body').addClass('sidebar-collapse');
        var windowHeight = $('body > div.os-padding.menu-open > div > div > div > div.content-wrapper').height() / 2;
        //CONFIGURACION POR DEFECTO DATATABLES
        $.extend($.fn.dataTable.defaults, {
            dom: "<'row align-items-center'<'col-sm-8 justify-content-start'f><'col-sm-4 c1 d-flex justify-content-end'>>" + "<'row align-items-center'<'col-sm-4'l><'col-sm-4 my-3 justify-content-start d-flex'B><'col-sm-4 d-flex justify-content-end'p>>" + "rt" + "<'row'<'col-sm-6'i><'col-sm-6 mt-1 d-flex justify-content-end'p>>",
            // dom: "<'row pb-1'<'col-sm-9 d-flex'B><'col-sm-3 c1 d-flex justify-content-end'>>" + "<'row'<'col-sm-4'l><'col-sm-8 justify-content-start'f>>" + "<'row'<'col-sm-6'i><'col-sm-6 d-flex justify-content-end'p>>" + "rt" + "<'row'<'col-sm-6'i><'col-sm-6 mt-1 d-flex justify-content-end'p>>",
            // dom: "<'row pb-1'<'col-sm-9'B><'col-sm-3 c1 d-flex justify-content-end'>>" + "<'row'<'col-sm-10'l><'col-sm-2'f>>" + "<'row'<'col-sm-6'i><'col-sm-6'p>>" + "rt" + "<'row'<'col-sm-6'i><'col-sm-6'p>>",
            // dom: "<'row pb-1'<'col-sm-10'B><'col-sm-2 c1 d-flex justify-content-end'>>" + "<'row'<'col-sm-11'l><'col-sm-1'f>>" + "<'row'<'col-sm-10'i><'col-sm-2'p>>" + "rt" + "<'row'<'col-sm-10'i><'col-sm-2'p>>",
            paging: true,
            select: true,
            scroller: false,
            deferRender: true,
            scrollY: windowHeight,
            scrollX: false,
            fixedHeader: true,
            ordering: true,
            destroy: true,
            responsive: true,
            autoWidth: false,
            processing: true,
            filter: true,
            orderMulti: true,
            stateSave: false,
            serverSide: false,
            language: {
                processing: "Procesando...",
                sSearch: "Buscar:",
                lengthMenu: "Mostrar _MENU_ registros",
                info: "Mostrando del _START_ al _END_ de un total de _TOTAL_ registros",
                infoEmpty: "Sin registros encontrados.",
                infoFiltered: "(Total de _MAX_ registros filtrados)",
                loadingRecords: "Cargando...",
                zeroRecords: "No se encontraron registros",
                emptyTable: "No hay datos disponibles en la tabla",
                paginate: {
                    previous: "Anterior",
                    next: "Siguiente",
                    first: "Primero",
                    last: "Último",
                },
                aria: {
                    sortAscending: ": Activar para ordenar la columna de manera ascendente",
                    sortDescending: ": Activar para ordenar la columna de manera descendente"
                },
                select: {
                    rows: {
                        _: "%d filas seleccionadas",
                        0: "Haz clic en una fila para seleccionarla",
                        1: "1 fila seleccionada"
                    }
                },
                buttons: {
                    copyTitle: 'Copiado en el portapapeles',
                    copyKeys: 'Presiona <i>ctrl</i> o <i>\u2318</i> + <i>C</i> para copiar los datos de la tabla a tu portapapeles. <br><br>Para cancelar, haga clic en este mensaje o presione Esc.',
                    copySuccess: {
                        _: '%d registros copiados correctamente',
                        1: '1 registro copiado correctamente'
                    }
                }
            },
            lengthMenu: [[100, 200, 500, -1], [100, 200, 500, 'Todos']],
        });

        fct_IniciarTablaAsientos('#tbl_Asientos');
    });

    function fct_IniciarTablaAsientos(IdTabla) {
        // Inicializar DataTables con botones
        dtAsientos = $(IdTabla).DataTable({
            buttons: [
                {
                    extend: 'copy',
                    text: '<i class="bi bi-back"></i>',
                    titleAttr: 'Copiar en portapapeles',
                    className: 'btn btn-primary',
                },
                {
                    extend: 'excel',
                    text: '<i class="bi bi-file-earmark-excel"></i>',
                    titleAttr: 'Exportar a Excel',
                    className: 'btn btn-success',
                    filename: 'Asientos' + ' ' + moment().format('DD-MM-YYYY HH_mm'),
                    footer: true,
                    exportOptions:
                    {
                        stripHtml: true,
                        columns: ':not(:last-child)'
                    },
                },
                {
                    extend: 'pdf',
                    text: '<i class="bi bi-file-earmark-pdf"></i>',
                    titleAttr: 'Exportar a PDF',
                    className: 'btn btn-danger',
                    filename: 'Asientos' + ' ' + moment().format('DD-MM-YYYY HH_mm'),
                    exportOptions:
                    {
                        stripHtml: true,
                        columns: ':not(:last-child)'
                    },
                    orientation: 'landscape',
                    pageSize: 'LEGAL',
                },
                {
                    extend: 'print',
                    text: '<i class="bi bi-printer-fill"></i>',
                    titleAttr: 'Imprimir',
                    className: 'btn btn-info',
                    exportOptions:
                    {
                        stripHtml: true,
                        columns: ':not(:last-child)'
                    },
                },
                {
                    extend: 'colvis',
                    text: '<i class="bi bi-ui-checks"></i>',
                    titleAttr: 'Seleccionar',
                    className: 'btn btn-warning',
                    columns: ':not(.noVis)',
                },
                {
                    text: '<i class= "bi bi-plus-circle" style="margin-right: 5px;"></i>Nuevo asiento',
                    className: 'btn bg-success m-1',
                    titleAttr: 'Nuevo',
                    action: function (e, dt, node, config) {
                        fct_AsientoNuevo();
                    },
                },
            ],

            ajax: {
                url: "/trabajadores/viajes/GetData_Asientos",
                type: "GET",
                datatype: "json",
                data: function (d) {
                },
                dataSrc: function (json) {
                    if (json.Status === "error") {
                        toastr.error('Ocurrió un error inesperado al intentar listar la tabla');
                        console.error(json.Msj);
                        return [];
                    }
                    return json.data;
                },
                error: function (xhr, error, thrown) {
                    toastr.error('Ocurrió un error inesperado al intentar listar la tabla');
                    console.error('Error en la solicitud Ajax: ' + error + xhr.Msj + thrown);
                },
            },
            columns: [
                { data: "id", name: "id" },
                { data: "nro_asiento", name: "nro_asiento" },
                { data: "nivel", name: "nivel" },
                { data: "tipo_asiento", name: "tipo_asiento" },
                {
                    data: "estado",
                    name: "estado",
                    render: function (data, type, row) {
                        let estado = data === 1 ? 'Vigente' : 'No vigente';
                        let badgeClass = data === 1 ? 'badge-success' : 'badge-danger';
                        return `<h5 class="mb-0 d-flex align-items-center justify-content-center"><span class="badge ${badgeClass} fs-5">${estado}</span></h5>`;
                    },
                    className: 'text-center align-middle'
                },
                {
                    data: "accion",
                    name: "accion",
                    render: function (data, type, row) {
                        return `
                <div class="flex-wrap btn-group">
                    <button class="btn btn-xs m-1 btn-info" onclick="fct_AsientoVer('${row.id}')" title="Ver asiento"><i class="bi bi-eye"></i></button>
                    <button class="btn btn-xs m-1 btn-primary" onclick="fct_AsientoEditar('${row.id}')" title="Editar asiento"><i class="bi bi-pencil-square"></i></button>
                    <button class="btn btn-xs m-1 btn-warning" onclick="fct_AsientoDarBaja('${row.id}')" title="Dar de baja asiento"><i class="bi bi-arrow-down-circle"></i></button>
                    <button class="btn btn-xs m-1 btn-danger" onclick="fct_AsientoEliminar('${row.id}')" title="Eliminar asiento"><i class="bi bi-trash"></i></button>
                </div>
            `;
                    },
                    className: 'text-center align-middle',
                    orderable: false
                }
            ],

            columnDefs: [
                {
                    targets: [0],
                    className: "text-center align-middle",
                },
                {
                    targets: [1, 2, 3, 4],
                    className: 'text-center align-middle',
                },
                {
                    targets: [5],
                    orderable: false,
                    className: 'text-center align-middle',
                    width: '10%',
                },
            ],
            lengthMenu: [[100, 200, 500, -1], [100, 200, 500, 'Todos']],
            initComplete: function (data, row, cell, start, end, display) {
                $('.dt-buttons button').addClass('m-1');
                $('.dt-button-collection').appendTo('.dt-buttons');
                $('.btn.btn-success').removeClass('dt-button btn-secondary buttons-excel buttons-html5');
                $('.btn.btn-danger').removeClass('dt-button btn-secondary buttons-pdf buttons-html5');
                $('.btn.btn-primary').removeClass('dt-button btn-secondary buttons-copy buttons-html5');
                $('.btn.btn-info').removeClass('dt-button btn-secondary buttons-print');
                $('.btn.btn-warning').removeClass('dt-button btn-secondary buttons-collection buttons-colvis');
                //TAMAÑO DE LOS BOTONES
                $('.btn.btn-success.m-1').addClass('btn-xs');
                $('.btn.btn-danger.m-1').addClass('btn-xs');
                $('.btn.btn-primary.m-1').addClass('btn-xs');
                $('.btn.btn-info.m-1').addClass('btn-xs');
                $('.btn.btn-warning.m-1').addClass('btn-xs');
                //Palabra exportar
                // $('.dt-buttons').parent().prepend('<h5 class="mr-2">Exportar</h5>');
                //Botón Nuevo
                $('button[title="Nuevo"]').attr('id', 'btn_Nuevo');
                $('#btn_Nuevo').removeClass('dt-button');
                $('#btn_Nuevo').appendTo('div.col-sm-4.c1.d-flex.justify-content-end');
            },
        });
    }

    function fct_AsientoNuevo() {
        window.location.href = '/trabajadores/viajes/AsientoNuevo';
    }

    function fct_AsientoEditar(Id) {
        window.location.href = `/trabajadores/viajes/EditarAsiento/${Id}`;
    }

    function fct_AsientoVer(Id) {
        window.location.href = `/trabajadores/viajes/VerAsiento/${Id}`;
    }

    function fct_AsientoEliminar(Id) {
        Swal.fire({
            title: "¿Estás seguro?",
            text: "Esta acción eliminará al asiento. ¿Deseas continuar?",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#3085d6",
            cancelButtonColor: "#d33",
            confirmButtonText: "Sí, eliminar",
            cancelButtonText: "Cancelar",
            reverseButtons: true // Invertir el orden de los botones
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url: `/trabajadores/viajes/EliminarAsiento/${Id}`,  // Pasamos el ID en la URL
                    type: "POST",
                    contentType: "application/json",
                    success: function (response) {
                        if (response.Status === "success") {
                            if (response.Msj2 !== '' && response.Msj2 !== null) {
                                toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                return;
                            }
                            fct_IniciarTablaAsientos('#tbl_Asientos');
                            toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                        } else {
                            toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            console.error('Error: ' + response.Msj);
                        }
                    },
                    error: function (xhr, Status, error) {
                        toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        console.error('Error:' + error);
                    }
                });
            }
        });
    }

    function fct_AsientoDarBaja(Id) {
        Swal.fire({
            title: "¿Estás seguro?",
            text: "Esta acción le dará de baja al asiento. ¿Deseas continuar?",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#3085d6",
            cancelButtonColor: "#d33",
            confirmButtonText: "Sí, dar de baja",
            cancelButtonText: "Cancelar",
            reverseButtons: true // Invertir el orden de los botones
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url: `/trabajadores/viajes/DarBajaAsiento/${Id}`,  // Pasamos el ID en la URL
                    type: "POST",
                    contentType: "application/json",
                    success: function (response) {
                        if (response.Status === "success") {
                            if (response.Msj2 !== '' && response.Msj2 !== null) {
                                toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                return;
                            }
                            fct_IniciarTablaAsientos('#tbl_Asientos');
                            toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                        } else {
                            toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            console.error('Error: ' + response.Msj);
                        }
                    },
                    error: function (xhr, Status, error) {
                        toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        console.error('Error:' + error);
                    }
                });
            }
        });
    }
</script>
{% endblock %}
