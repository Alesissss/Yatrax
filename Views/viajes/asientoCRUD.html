{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <!-- Número de asiento -->
                    <div class="col-md-12 mb-3">
                        <label for="txt_NumeroAsiento">Número de asiento</label>
                        <div class="input-group">
                            <input type="text" id="txt_NumeroAsiento" class="form-control" placeholder="Ej: 1"
                                value="{{ asiento.nro_asiento }}" oninput="this.value = this.value.toUpperCase();" {% if
                                btnId=='btn_Aceptar' %}disabled{% endif %}>
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-chair"></i></div>
                            </div>
                        </div>
                    </div>

                    <!-- Nivel -->
                    <div class="col-md-12 mb-3">
                        <label for="cbx_Nivel">Nivel</label>
                        <div class="input-group">
                            <select id="cbx_Nivel" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{% endif
                                %}>
                                <option disabled selected>--SELECCIONAR--</option>
                                <option value="1" {% if asiento.nivel==1 %}selected{% endif %}>1er Piso</option>
                                <option value="2" {% if asiento.nivel==2 %}selected{% endif %}>2do Piso</option>
                            </select>
                        </div>
                    </div>

                    <!-- Tipo de asiento -->
                    <div class="col-md-12 mb-3">
                        <label for="cbx_TipoAsiento">Tipo de asiento</label>
                        <div class="input-group">
                            <select id="cbx_TipoAsiento" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{%
                                endif %}>
                                <option disabled selected>--SELECCIONAR--</option>
                                <option value="Reclinable" {% if asiento.tipo=='Reclinable' %}selected{% endif %}>
                                    Reclinable</option>
                                <option value="Semi-reclinable" {% if asiento.tipo=='Semi-reclinable' %}selected{% endif
                                    %}>Semi-reclinable</option>
                                <option value="Económico" {% if asiento.tipo=='Económico' %}selected{% endif %}>
                                    Económico</option>
                            </select>
                        </div>
                    </div>

                    <!-- Estado -->
                    <div class="col-md-12 mb-3">
                        <label for="cbx_Estado">Estado</label>
                        <div class="input-group">
                            <select id="cbx_Estado" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{% endif
                                %}>
                                <option disabled>--SELECCIONAR--</option>
                                <option value="1" {% if asiento.estado==1 %}selected{% endif %}>Vigente</option>
                                <option value="0" {% if asiento.estado==0 %}selected{% endif %}>No vigente</option>
                                <option value="2" {% if asiento.estado==2 %}selected{% endif %}>Reservado</option>
                            </select>
                        </div>
                    </div>

                    <!-- Botones -->
                    <div class="col-md-12 text-center">
                        <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de
                            asientos</button>
                        <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(document).ready(function () {
        // Botón registrar asiento
        $("#btn_Registrar").click(function () {
            let nroAsiento = $("#txt_NumeroAsiento").val().trim();
            let nivel = $("#cbx_Nivel").val();
            let tipo = $("#cbx_TipoAsiento").val();
            let estado = $("#cbx_Estado").val();

            if (!nroAsiento || !nivel || !tipo || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará el asiento.",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar",
                cancelButtonText: "Cancelar"
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("nro_asiento", nroAsiento);
                    formData.append("nivel", nivel);
                    formData.append("tipo", tipo);
                    formData.append("estado", estado);

                    $.ajax({
                        url: "/trabajadores/viajes/RegistrarAsiento",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                setTimeout(() => {
                                    window.location.href = "/trabajadores/viajes/GestionarAsiento";
                                }, 500);
                            } else {
                                toastr.error(response.Msj + " AAAA", "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function () {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        // Botón editar asiento
        $("#btn_Editar").click(function () {
            const id = Number("{{ asiento.id }}");

            let nroAsiento = $("#txt_NumeroAsiento").val().trim();
            let nivel = $("#cbx_Nivel").val();
            let tipo = $("#cbx_TipoAsiento").val();
            let estado = $("#cbx_Estado").val();

            if (!nroAsiento || !nivel || !tipo || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción actualizará el asiento.",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, actualizar",
                cancelButtonText: "Cancelar"
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("nro_asiento", nroAsiento);
                    formData.append("nivel", nivel);
                    formData.append("tipo", tipo);
                    formData.append("estado", estado);

                    $.ajax({
                        url: `/trabajadores/viajes/EditarAsiento/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                setTimeout(() => {
                                    window.location.href = "/trabajadores/viajes/GestionarAsiento";
                                }, 500);
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function () {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        // Botones de volver o aceptar
        $("#btn_Aceptar, #btn_Volver").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarAsiento";
        });
    });
</script>
{% endblock %}
