{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid p-4">
    <div class="row">
        <div class="col-md-12 col-sm-6">
            <div class="card card-primary card-tabs">
                <div class="card-header p-0 pt-1">
                    <!-- LISTA DE TABSSSSS -->
                    <ul class="nav nav-tabs" id="custom-tabs-one-tab" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" id="tab01-tab" data-toggle="pill" href="#tab-01" role="tab"
                                aria-controls="tab-01" aria-selected="true">Nuevo nivel</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="tab02-tab" data-toggle="pill" href="#tab-02" role="tab"
                                aria-controls="tab-02" aria-selected="false">Diseño del nivel</a>
                        </li>
                        <!-- <li class="nav-item">
                            <a class="nav-link" id="tab03-tab" data-toggle="pill" href="#tab-03" role="tab"
                                aria-controls="tab-03" aria-selected="false">Seguimiento de viajes</a>
                        </li> -->
                    </ul>
                </div>
                <div class="card-body">
                    <div class="tab-content" id="custom-tabs-one-tabContent">

                        <!-- Tab 1 -->
                        <div class="tab-pane fade show active" id="tab-01" role="tabpanel" aria-labelledby="tab01-tab">
                            <div class="panel-heading">
                                <h4 class="text-center mb-0">{{ tittle }}</h4>
                            </div>
                            <div class="panel-body">
                                <div class="row justify-content-center">
                                    <div class="col-md-6">
                                        <form action="" method="POST" id="formNivel">
                                            <div class="mb-3">
                                                <label for="txt_nroPiso">Número de piso</label>
                                                <input type="number" name="txt_nroPiso" id="txt_nroPiso"
                                                    class="form-control" placeholder="Número de piso"
                                                    value="{{ nivel.nroPiso }}" readonly>
                                            </div>
                                            <div class="mb-3">
                                                <label for="txt_vehiculo">Tipo vehículo</label>
                                                <div class="input-group">
                                                    <select id="cbx_TipoVehiculo" name="txt_vehiculo"
                                                        class="form-control" {% if btnId=='btn_Regresar' %}disabled{%
                                                        endif %}>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="mb-3">
                                                <label for="txt_cantidad">Cantidad</label>
                                                <input type="number" name="txt_cantidad" id="txt_cantidad"
                                                    class="form-control" placeholder="Cantidad de espacios"
                                                    value="{{ nivel.cantidad }}" {% if btnId=="btn_Regresar" %} disabled
                                                    {% endif %}>
                                            </div>
                                            <div class="mb-3">
                                                <label for="txt_estado">Estado</label>
                                                <select id="txt_estado" name="txt_estado" class="form-control" {% if
                                                    btnId=="btn_Regresar" %} disabled {% endif %}>
                                                    <option value="1" {% if nivel.estado==1 or nivel.estado=="activo"
                                                        %}selected{% endif %}>
                                                        Activo</option>
                                                    <option value="0" {% if nivel.estado==0 or nivel.estado=="inactivo"
                                                        %}selected{% endif %}>Inactivo</option>
                                                </select>
                                            </div>
                                            <div class="text-center">
                                                <button id="btn_Listado" type="button" class="btn btn-danger">Volver al
                                                    listado
                                                    de
                                                    niveles</button>
                                                {% if btnId != "btn_Regresar" %}
                                                <button id="{{ btnId }}" type="submit"
                                                    class="btn btn-primary">Aceptar</button>
                                                {% endif %}
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Tab 2 -->
                        <div class="tab-pane fade" id="tab-02" role="tabpanel" aria-labelledby="tab02-tab">
                            <div class="panel-heading">
                                <!-- <div class="row">
                                    <div class="col-md-12">
                                        <h1>Programar un nuevo viaje</h1>
                                    </div>
                                </div> -->
                            </div>
                            <div class="panel-body">
                                <div class="card h-100 w-100">
                                    <div class="card-header bg-primary text-white"> 
                                        <h4 class="text-center mb-0">Diseñar el nivel</h4>
                                    </div>
                                    <div class="card-body">

                                    </div>
                                    <div class="card-footer">

                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Tab 3 -->
                        <!-- <div class="tab-pane fade" id="tab-03" role="tabpanel" aria-labelledby="tab03-tab">
                            <div class="panel-heading">
                                
                            </div>
                            <div class="panel-body">
                                
                            </div>
                        </div> -->

                    </div> <!-- /.tab-content -->
                </div> <!-- /.card-body -->
            </div> <!-- /.card -->
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function fct_Vehiculos() {
        $.getJSON('/trabajadores/viajes/GetData_Vehiculo', function (response) {
            if (response.Status === 'success') {
                let items = '<option disabled>--SELECCIONAR--</option>';

                $.each(response.data, function (index, item) {
                    if (item.id === Number("{{ nivel.id_vehiculo }}")) {
                        items += `<option selected value="${item.id}">${item.placa}</option>`;
                    } else {
                        items += `<option value="${item.id}">${item.placa}</option>`;
                    }
                });

                $('#cbx_TipoVehiculo').html(items);
            } else {
                console.error('Error al obtener los tipos de usuario:', response.Msj);
            }
        });
    }

    $(document).ready(function () {

        fct_Vehiculos()

        // ID del nivel para editar/ver
        let idNivel = "{{ nivel.id if nivel.id is not none else '' }}";

        // Volver al listado
        $("#btn_Listado, #btn_Regresar").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarNivel";
        });

        // Manejo del formulario
        $('#formNivel').on('submit', function (e) {
            e.preventDefault();

            let url, tipo;
            if ($("#btn_Actualizar").length) {
                url = `/trabajadores/viajes/editarNivel/${idNivel}`;
                tipo = 'POST';
            } else if ($("#btn_Registrar").length) {
                url = '/trabajadores/viajes/registrarNivel';
                tipo = 'POST';
            } else {
                return;
            }

            $.ajax({
                url: url,
                type: tipo,
                data: $(this).serialize(),
                success: function (response) {
                    if (response.Status === "success") {
                        toastr.success(response.Msj || "Operación exitosa", 'Éxito');
                        setTimeout(function () {
                            window.location.href = "/trabajadores/viajes/GestionarNivel";
                        }, 1000);
                    } else {
                        toastr.error(response.Msj || "Ocurrió un error", 'Error');
                    }
                },
                error: function (xhr) {
                    let errorMsg = xhr.responseJSON ? xhr.responseJSON.Msj : 'Error desconocido';
                    toastr.error(errorMsg, 'Error');
                }
            });
        });
    });
</script>
{% endblock %}
