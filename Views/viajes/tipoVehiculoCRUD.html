{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body" autocomplete="off">
                    <!-- Formulario para registrar el tipo de vehículo -->
                    <!-- /trabajadores/viajes/registrarTipoVehiculo -->
                    <div id="formTipoVehiculo">

                        <div class="mb-3">
                            <label for="txt_Nombre">Nombre del tipo de vehículo</label>
                            <input type="text" name="txt_nombre" id="txt_Nombre" class="form-control" placeholder="Nombre del tipo de vehículo" value="{{ tipoVehiculo.nombre }}" {% if btnId == "btn_Regresar" %} disabled {% endif %}>
                        </div>

                        <div class="mb-3">
                            <label for="txt_marca">Marca</label>
                            <div class="input-group">
                                <select id="cbx_Marca" name="txt_marca" class="form-control" {% if btnId=='btn_Regresar'
                                    %}disabled{% endif %}>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="txt_cantidad">Cantidad</label>
                            <input type="number" name="txt_cantidad" id="txt_cantidad" class="form-control" placeholder="Ingrese la cantidad de vehiuclos de ese tipo" value="{{ tipoVehiculo.cantidad }}" {% if btnId == "btn_Regresar" %} disabled {% endif %}>
                        </div>

                        <div class="mb-3">
                            <label for="txt_Estado">Estado</label>
                            <select id="txt_Estado" name="txt_estado" class="form-control" {% if btnId == "btn_Regresar" %} disabled {% endif %}>
                                <option value="1" {% if tipoVehiculo.estado == 1 %}selected{% endif %}>Activo</option>
                                <option value="0" {% if tipoVehiculo.estado == 0 %}selected{% endif %}>Inactivo</option>
                            </select>
                        </div>

                        <div class="text-center">
                            <button id="btn_Listado" type="button" class="btn btn-danger">Volver al listado de
                                tipo de vehiculo</button>
                            <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function fct_GetMarcas() {
        $.getJSON('/trabajadores/viajes/GetData_Marcas', function (response) {
            if (response.Status === 'success') {
                let items = '<option disabled>--SELECCIONAR--</option>';

                $.each(response.data, function (index, item) {
                    if (item.id === Number("{{ tipoVehiculo.idMarca }}")) {
                        items += `<option selected value="${item.id}">${item.nombre}</option>`;
                    } else {
                        items += `<option value="${item.id}">${item.nombre}</option>`;
                    }
                });

                $('#cbx_Marca').html(items);
            } else {
                console.error('Error al obtener los tipos de usuario:', response.Msj);
            }
        });
    }
    // Aquí puedes agregar cualquier script que necesites
    $(document).ready(function () {

        fct_GetMarcas()

        let idTipoVehiculo = "{{ tipoVehiculo.id }}"

        $("#btn_Listado").click(()=>{
            window.location.href="/trabajadores/viajes/GestionarTipoVehiculo"
        })

        $("#btn_Regresar").click(()=>{
            window.location.href="/trabajadores/viajes/GestionarTipoVehiculo"
        })

        $('#btn_Registrar, #btn_Actualizar').click(function(){
            // determinamos URL según el id del botón clicado
            const action = this.id; // 'btn_Registrar' o 'btn_Actualizar'
            const url = (action === 'btn_Registrar')
            ? '/trabajadores/viajes/registrarTipoVehiculo'
            : `/trabajadores/viajes/editarTipoVehiculo/${idTipoVehiculo}`;

            // serializamos inputs y selects dentro del div#formTipoVehiculo
            const data = $('#formTipoVehiculo')
            .find('input[name], select[name]')
            .serialize();

            $.ajax({
            url: url,
            type: 'POST',
            data: data,
            success: resp => {
                toastr.success(resp.Msj, 'Éxito');
                setTimeout(()=> {
                window.location.href = '/trabajadores/viajes/GestionarTipoVehiculo';
                }, 1000);
            },
            error: xhr => {
                const msg = xhr.responseJSON?.Msj || 'Error desconocido';
                toastr.error(msg, 'Error');
            }
            });
    });
});
</script>
{% endblock %}
