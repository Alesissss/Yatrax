{% extends "index.html" %}
{% block title %} {{title}} {% endblock %}

{% block content %}
<style>
    .rounded-circle {
        display: flex !important;
        align-items: center;
        justify-content: center;
        font-weight: bold;
    }

    .btn-success:hover {
        background-color: #1e7e34 !important;
        transform: scale(1.1);
        transition: all 0.2s;
    }

    .btn-danger:hover {
        background-color: #bd2130 !important;
        transform: scale(1.1);
        transition: all 0.2s;
    }

    .control.selected {
        background-color: #fff59d;
        /* Amarillo claro */
        padding: 5px 10px;
        border-radius: 6px;
        display: inline-block;
        font-weight: 600;
    }

    #matrizContainer_1,
    #matrizContainer_2,
    #matrizContainer_3 {
        max-width: 100%;
        overflow-x: auto;
    }
</style>

<div class="container-fluid p-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card card-primary card-tabs">
                <div class="card-header p-0 pt-1">
                    <ul class="nav nav-tabs flex-wrap text-center" id="tipoVehiculoTabs" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link active" id="tab-vehiculo-tab" data-toggle="pill" href="#tab-vehiculo"
                                role="tab" aria-controls="tab-vehiculo" aria-selected="true">Datos</a>
                        </li>
                    </ul>
                </div>

                <div class="card-body">
                    <div class="tab-content" id="tipoVehiculoTabsContent">
                        <!-- TAB VEHÍCULO -->
                        <div class="tab-pane fade show active" id="tab-vehiculo" role="tabpanel"
                            aria-labelledby="tab-vehiculo-tab">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-12 mb-3">
                                        <label for="txt_Nombre">Nombre del tipo de vehículo</label>
                                        <input type="text" name="txt_Nombre" id="txt_Nombre" class="form-control"
                                            placeholder="Nombre del tipo de vehículo" value="{{ tipoVehiculo.nombre }}"
                                            {% if btnId=="btn_Regresar" %} disabled {% endif %}>
                                    </div>
                                    <div class="col-md-12 mb-3">
                                        <label for="txt_marca">Marca</label>
                                        <div class="input-group">
                                            <select id="cbx_Marca" name="txt_marca" class="form-control" {% if
                                                btnId=='btn_Regresar' %}disabled{% endif %}>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-12 mb-3">
                                        <label for="cbx_Servicio">Servicio</label>
                                        <div class="input-group">
                                            <select id="cbx_Servicio" name="cbx_Servicio" class="form-control" {% if
                                                btnId=='btn_Regresar' %}disabled{% endif %}>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="col-md-12 mb-3">
                                        <label for="cbx_Estado">Estado</label>
                                        <select id="cbx_Estado" name="cbx_Estado" class="form-control" {% if
                                            btnId=="btn_Regresar" %} disabled {% endif %}>
                                            <option value="1" {% if tipoVehiculo.estado==1 %}selected{% endif %}>Vigente
                                            </option>
                                            <option value="0" {% if tipoVehiculo.estado==0 %}selected{% endif %}>No
                                                vigente
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-md-12 mb-3">
                                        <label for="cantidadPisos">Cantidad de pisos</label>
                                        <input type="number" min="1" max="2" id="cantidadPisos"
                                            placeholder="Cantidad de pisos del tipo de vehículo" name="cantidadPisos"
                                            class="form-control" required value="{{ niveles|length }}" {% if
                                            btnId=="btn_Regresar" %} disabled {% endif %}>
                                    </div>
                                    <div class="col-md-12 text-center">
                                        <button id="btn_Listado" type="button" class="btn btn-danger">Volver al listado
                                            de
                                            tipos de vehículos</button>
                                        <button type="button" class="btn btn-primary"
                                            id="btn_Siguiente_tab_01">Siguiente</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}


{% block scripts %}
<!-- Script para usar botones -->

<!-- Script para cargar datos -->
<!-- Funciones auxiliares -->

<script>
    // =============================================
    // MÓDULO PRINCIPAL - GESTIÓN DE TIPOS DE VEHÍCULO
    // =============================================

    /**
     * Controlador principal que organiza todas las funcionalidades
     */
    const TipoVehiculoController = (function () {
        // Constantes y configuraciones
        const MAX_PISOS = 2;
        const DEFAULT_HERRAMIENTA = 1;

        // Variables de estado
        let herramientaSeleccionada = null;
        let ultimoTipoAsientoSeleccionado = DEFAULT_HERRAMIENTA;

        // Datos iniciales
        const list_herramientas = JSON.parse('{{ herramientas | tojson }}');
        const botones_guardados = JSON.parse('{{ botones | tojson }}');
        const btnId = "{{ btnId }}";
        const isModoEdicion = btnId === "btn_Actualizar";
        const isModoRegresar = btnId === "btn_Regresar";

        // ======================
        // Funciones de utilidad
        // ======================

        /**
         * Muestra un toast de error
         * @param {string} mensaje 
         * @param {string} [titulo] 
         */
        function mostrarError(mensaje, titulo = 'Error') {
            toastr.error(mensaje, titulo);
            console.error(titulo + ':', mensaje);
        }

        /**
         * Obtiene el HTML del ícono desde la lista de herramientas
         * @param {number|string} idHerramienta 
         * @returns {string}
         */
        function obtenerIcono(idHerramienta) {
            const herramienta = list_herramientas.find(h => h.id === parseInt(idHerramienta));
            return herramienta
                ? `<img src="/Static/${herramienta.icono}" width="32" height="32" style="display: block; margin: auto;" alt="icono">`
                : '';
        }

        /**
         * Crea un botón con las propiedades especificadas
         * @param {string} texto 
         * @param {string} claseColor 
         * @param {string} tooltip 
         * @param {Function} accion 
         * @returns {HTMLButtonElement}
         */
        function crearBoton(texto, claseColor, tooltip, accion) {
            const btn = document.createElement('button');
            btn.className = `btn btn-sm rounded-circle ${claseColor}`;
            btn.style.width = '30px';
            btn.style.height = '30px';
            btn.style.fontSize = '12px';
            btn.style.padding = '0';
            btn.innerHTML = texto;
            btn.title = tooltip;

            if (!isModoRegresar) {
                btn.addEventListener('click', accion);
            } else {
                btn.disabled = true;
            }

            return btn;
        }

        // ======================
        // Funciones de API
        // ======================

        /**
         * Obtiene las marcas de vehículos desde el servidor
         * @returns {Promise<void>}
         */
        async function obtenerMarcas() {
            try {
                const response = await $.getJSON('/trabajadores/viajes/GetMarcasTipoVehiculo');

                if (response.Status === 'success') {
                    let items = '<option disabled>--SELECCIONAR--</option>';

                    $.each(response.data, function (index, item) {
                        const selected = item.id === Number("{{ tipoVehiculo.id_marca }}") ? 'selected' : '';
                        items += `<option ${selected} value="${item.id}">${item.nombre}</option>`;
                    });

                    $('#cbx_Marca').html(items);
                } else {
                    mostrarError('Error al obtener las marcas:', response.Msj);
                }
            } catch (error) {
                mostrarError('Error en la solicitud de marcas', error);
            }
        }

        /**
         * Obtiene los servicios de vehículos desde el servidor
         * @returns {Promise<void>}
         */
        async function obtenerServicios() {
            try {
                const response = await $.getJSON('/trabajadores/viajes/GetServiciosTipoVehiculo');

                if (response.Status === 'success') {
                    let items = '<option disabled>--SELECCIONAR--</option>';

                    $.each(response.data, function (index, item) {
                        const selected = item.id === Number("{{ tipoVehiculo.id_servicio }}") ? 'selected' : '';
                        items += `<option ${selected} value="${item.id}">${item.nombre}</option>`;
                    });

                    $('#cbx_Servicio').html(items);
                } else {
                    mostrarError('Error al obtener los servicios:', response.Msj);
                }
            } catch (error) {
                mostrarError('Error en la solicitud de servicios', error);
            }
        }

        // ======================
        // Funciones de UI - Tabs
        // ======================

        /**
         * Navega al siguiente tab disponible
         * @returns {number} Índice del nuevo tab activo
         */
        function irAlSiguienteTab() {
            const tabs = Array.from(document.querySelectorAll('#tipoVehiculoTabs .nav-link'));
            const activeTab = tabs.find(tab => tab.classList.contains('active'));

            if (!activeTab) return;

            const currentIndex = tabs.indexOf(activeTab);
            const nextTab = tabs[currentIndex + 1];

            if (nextTab) {
                $(nextTab).tab('show');
            } else {
                toastr.info("Ya estás en el último tab.");
            }

            return currentIndex + 1;
        }

        /**
         * Genera los tabs de nivel basados en la cantidad de pisos especificada
         */
        function generarTabsNivel() {
            const cantidad = parseInt(document.getElementById("cantidadPisos").value);

            if (!cantidad || cantidad < 1) {
                toastr.warning("Ingrese una cantidad válida de pisos.");
                return;
            }

            const tabs = document.getElementById("tipoVehiculoTabs");
            const content = document.getElementById("tipoVehiculoTabsContent");

            // Obtener tabs existentes (excluyendo el primero que es de datos)
            const existingTabs = Array.from(tabs.querySelectorAll('li'))
                .filter(tab => tab.querySelector('a')?.id?.startsWith('nivel-'));

            const existingCount = existingTabs.length;

            // Ajustar cantidad de tabs
            if (existingCount < cantidad) {
                agregarTabsFaltantes(existingCount, cantidad, tabs, content);
            } else if (existingCount > cantidad) {
                eliminarTabsSobrantes(existingCount, cantidad);
            }

            actualizarBotonesTabs(cantidad);
        }

        /**
         * Agrega los tabs que faltan
         * @param {number} existingCount 
         * @param {number} cantidad 
         * @param {HTMLElement} tabs 
         * @param {HTMLElement} content 
         */
        function agregarTabsFaltantes(existingCount, cantidad, tabs, content) {
            for (let i = existingCount + 1; i <= cantidad; i++) {
                const tabId = `nivel-${i}`;

                // Crear nuevo tab
                const newTab = document.createElement('li');
                newTab.className = 'nav-item';
                newTab.innerHTML = `
                <a class="nav-link" id="${tabId}-tab" data-toggle="pill" href="#${tabId}" role="tab"
                   aria-controls="${tabId}" aria-selected="false">Piso ${i}</a>
            `;
                tabs.appendChild(newTab);

                // Crear contenido del tab
                const newContent = crearContenidoTab(tabId, i, cantidad);
                content.appendChild(newContent);

                activarEventosDrag();
            }
        }

        /**
         * Elimina los tabs que sobran
         * @param {number} existingCount 
         * @param {number} cantidad 
         */
        function eliminarTabsSobrantes(existingCount, cantidad) {
            for (let i = existingCount; i > cantidad; i--) {
                const tabId = `nivel-${i}`;
                const tabElement = document.getElementById(`${tabId}-tab`);
                const paneElement = document.getElementById(tabId);

                if (tabElement) tabElement.closest('li').remove();
                if (paneElement) paneElement.remove();
            }
        }

        /**
         * Actualiza los botones de los tabs
         * @param {number} cantidad 
         */
        function actualizarBotonesTabs(cantidad) {
            document.querySelectorAll('.tab-pane').forEach((pane, index) => {
                const footer = pane.querySelector('.card-footer');
                if (!footer) return;

                // Eliminar botones anteriores
                footer.querySelector(`#${btnId}`)?.remove();
                footer.querySelector('#btn_Siguiente')?.remove();

                const isLast = (index === cantidad); // índice 0 es el tab de "Datos"
                const newBtn = document.createElement('button');
                newBtn.className = 'btn btn-primary mb-2';

                if (isLast && !isModoRegresar) {
                    newBtn.textContent = "Aceptar";
                    newBtn.id = btnId;
                } else {
                    newBtn.textContent = "Siguiente";
                    newBtn.id = "btn_Siguiente";
                }

                footer.appendChild(newBtn);
            });
        }

        /**
         * Crea el contenido HTML para un tab de nivel
         * @param {string} tabId 
         * @param {number} matrizId 
         * @param {number} cantidad 
         * @returns {HTMLElement}
         */
        function crearContenidoTab(tabId, matrizId, cantidad) {
            const newContent = document.createElement('div');
            newContent.className = 'tab-pane fade';
            newContent.id = tabId;
            newContent.setAttribute('role', 'tabpanel');
            newContent.setAttribute('aria-labelledby', `${tabId}-tab`);

            const botonTexto = matrizId === cantidad && !isModoRegresar
                ? `<button type="button" class="btn btn-primary mb-2" id="${btnId}">Aceptar</button>`
                : `<button id="btn_Siguiente" type="button" class="btn btn-primary mb-2">Siguiente</button>`;

            newContent.innerHTML = `
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Controles</h3>
                        </div>
                        <div class="card-body">
                            <div id="accordion">
                                {% for tipo_herramienta in tipo_herramientas %}
                                <div class="card card-{{ loop.cycle('info','primary') }}">
                                    <div class="card-header">
                                        <h4 class="card-title w-100">
                                            <a class="d-block w-100 collapsed" data-toggle="collapse"
                                                href="#collapse{{ loop.index }}"
                                                aria-expanded="false">{{ tipo_herramienta.nombre }}</a>
                                        </h4>
                                    </div>
                                    <div id="collapse{{ loop.index }}" class="collapse"
                                        data-parent="#accordion">
                                        <div class="card-body bg-white">
                                            {% for herramienta in herramientas %}
                                            {% if herramienta.id_tipo==tipo_herramienta.id %}
                                            <div class="row">
                                                <div class="col-12">
                                                    <div class="align-items-center mb-2">
                                                        <img src="{{ url_for('static', filename= herramienta.icono) }}"
                                                            width="32" height="32" alt="icono"
                                                            draggable="true" data-tipo="{{ herramienta.id }}"
                                                            title="{{ herramienta.nombre }}"
                                                            class="control mr-2">
                                                        <span>{{ herramienta.nombre }}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            {% endif %}
                                            {% endfor %}
                                        </div>
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">Diseño</h3>
                        </div>
                        <div class="card-body">
                            <div class="row justify-content-center" id="matrizContainer_${matrizId}"></div>
                        </div>
                    </div>
                </div>
                <div class="card-footer text-center">
                    <button id="btn_Listado" type="button" class="btn btn-danger mb-2">Volver al listado</button>
                    ${botonTexto}
                </div>
            </div>
        `;

            return newContent;
        }

        // ======================
        // Funciones de Matriz
        // ======================

        /**
         * Genera una matriz de diseño para un piso específico
         * @param {number} piso 
         */
        function generarMatriz(piso) {
            const filas = 15;
            const columnas = 6;
            const contenedor = document.getElementById(`matrizContainer_${piso}`);

            if (contenedor.children.length > 0) return;
            contenedor.innerHTML = '';

            // Configurar grid
            contenedor.style.display = 'grid';
            contenedor.style.gridTemplateColumns = `40px repeat(${columnas}, 40px)`;
            contenedor.style.gridTemplateRows = `40px repeat(${filas}, 40px)`;
            contenedor.style.gap = '2px';
            contenedor.style.justifyContent = 'center';

            // Celda vacía en esquina superior izquierda
            const esquina = document.createElement('div');
            esquina.style.width = '40px';
            esquina.style.height = '40px';
            contenedor.appendChild(esquina);

            // Botones de columna (+)
            for (let j = 1; j <= columnas; j++) {
                const btnColumna = crearBoton('+', 'btn-success', `Llenar columna ${j}`, () => llenarColumna(piso, j));
                contenedor.appendChild(btnColumna);
            }

            // Filas
            for (let i = 1; i <= filas; i++) {
                // Botón de fila (-)
                const btnFila = crearBoton('−', 'btn-danger', `Vaciar fila ${i}`, () => vaciarFila(piso, i));
                contenedor.appendChild(btnFila);

                // Celdas de la fila
                for (let j = 1; j <= columnas; j++) {
                    crearCeldaMatriz(piso, i, j, contenedor);
                }
            }
        }

        /**
         * Crea una celda de la matriz
         * @param {number} piso 
         * @param {number} fila 
         * @param {number} columna 
         * @param {HTMLElement} contenedor 
         */
        function crearCeldaMatriz(piso, fila, columna, contenedor) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-light border-dark';
            btn.style.width = '40px';
            btn.style.height = '40px';
            btn.style.display = 'flex';
            btn.style.alignItems = 'center';
            btn.style.justifyContent = 'center';
            btn.style.padding = '0';

            btn.setAttribute('data-x', columna);
            btn.setAttribute('data-y', fila);
            btn.setAttribute('data-tipo', '');

            // Si hay herramienta preexistente
            const existente = botones_guardados.find(b =>
                parseInt(b.x_dimension) === columna &&
                parseInt(b.y_dimension) === fila &&
                parseInt(b.piso) === piso
            );

            if (existente) {
                btn.setAttribute('data-tipo', existente.id_herramienta);
                btn.innerHTML = obtenerIcono(existente.id_herramienta);
            }

            // Drag & drop
            btn.addEventListener('dragover', e => e.preventDefault());
            btn.addEventListener('drop', function (e) {
                e.preventDefault();
                if (herramientaSeleccionada && !isModoRegresar) {
                    this.setAttribute('data-tipo', herramientaSeleccionada);
                    this.innerHTML = obtenerIcono(herramientaSeleccionada);
                }
            });

            // Click para alternar herramienta
            if (!isModoRegresar) {
                btn.addEventListener('click', function () {
                    const tipoActual = this.getAttribute('data-tipo');
                    if (tipoActual === '') {
                        const tipoAUsar = ultimoTipoAsientoSeleccionado || DEFAULT_HERRAMIENTA;
                        this.setAttribute('data-tipo', tipoAUsar);
                        this.innerHTML = obtenerIcono(tipoAUsar);
                    } else {
                        this.setAttribute('data-tipo', '');
                        this.innerHTML = '';
                    }
                });
            }

            contenedor.appendChild(btn);
        }

        /**
         * Llena toda una columna con la herramienta seleccionada
         * @param {number} piso 
         * @param {number} columna 
         */
        function llenarColumna(piso, columna) {
            // Determinar qué tipo de asiento usar
            let tipoAsiento = herramientaSeleccionada
                ? parseInt(herramientaSeleccionada)
                : ultimoTipoAsientoSeleccionado;

            ultimoTipoAsientoSeleccionado = tipoAsiento;

            const contenedor = document.getElementById(`matrizContainer_${piso}`);
            const botones = contenedor.querySelectorAll(`button[data-x="${columna}"]`);

            botones.forEach(btn => {
                if (btn.hasAttribute('data-y')) { // Solo los botones de asientos, no los de control
                    btn.setAttribute('data-tipo', tipoAsiento);
                    btn.innerHTML = obtenerIcono(tipoAsiento);
                }
            });

            // Mostrar mensaje informativo
            const herramienta = list_herramientas.find(h => h.id === tipoAsiento);
            toastr.info(`Columna ${columna} llenada con: ${herramienta?.nombre || 'Asiento'}`, 'Columna Completada');
        }

        /**
         * Vacía toda una fila
         * @param {number} piso 
         * @param {number} fila 
         */
        function vaciarFila(piso, fila) {
            const contenedor = document.getElementById(`matrizContainer_${piso}`);
            const botones = contenedor.querySelectorAll(`button[data-y="${fila}"]`);

            botones.forEach(btn => {
                if (btn.hasAttribute('data-x')) { // Solo los botones de asientos, no los de control
                    btn.setAttribute('data-tipo', '');
                    btn.innerHTML = '';
                }
            });

            toastr.info(`Fila ${fila} vaciada completamente`, 'Fila Limpiada');
        }

        // ======================
        // Funciones de Drag & Drop
        // ======================

        /**
         * Activa los eventos de drag and drop para los controles
         */
        function activarEventosDrag() {
            document.querySelectorAll('.control').forEach(icono => {
                // Evento drag para arrastrar y soltar
                icono.addEventListener('dragstart', function (e) {
                    herramientaSeleccionada = this.getAttribute('data-tipo');
                    ultimoTipoAsientoSeleccionado = parseInt(herramientaSeleccionada);
                });

                // Evento click para seleccionar tipo de herramienta
                icono.addEventListener('click', function (e) {
                    e.preventDefault();

                    const tipoSeleccionado = parseInt(this.getAttribute('data-tipo'));
                    ultimoTipoAsientoSeleccionado = tipoSeleccionado;
                    herramientaSeleccionada = this.getAttribute('data-tipo');

                    // Remover selección visual anterior
                    document.querySelectorAll('.control').forEach(c => {
                        c.classList.remove('bg-warning', 'control-selected');
                        c.style.backgroundColor = '';
                        c.style.color = '';
                    });

                    // Agregar selección visual al control actual
                    this.classList.add('control-selected');
                    this.style.backgroundColor = '#ffc107';
                    this.style.color = '#000';

                    const herramienta = list_herramientas.find(h => h.id === tipoSeleccionado);
                    toastr.info(`Tipo seleccionado: ${herramienta?.nombre || 'Herramienta'}`, 'Herramienta Seleccionada');
                });
            });
        }

        /**
         * Inicializa el sistema de selección de herramientas
         */
        function inicializarSistemaSeleccion() {
            if (!ultimoTipoAsientoSeleccionado) {
                ultimoTipoAsientoSeleccionado = DEFAULT_HERRAMIENTA;
            }

            // Seleccionar visualmente el primer asiento por defecto
            const primerAsiento = document.querySelector('.control[data-tipo="1"]');
            if (primerAsiento && btnId === "btn_Registrar") {
                primerAsiento.click();
            }

        }

        // ======================
        // Funciones de Datos
        // ======================

        /**
         * Obtiene un diccionario con las herramientas por piso
         * @returns {Object} {piso: [{x, y, tipo}]}
         */
        function obtenerHerramientasPorPiso() {
            const resultados = {};

            document.querySelectorAll('[id^="matrizContainer_"]').forEach(matriz => {
                const piso = parseInt(matriz.id.split('_')[1]);
                const botones = Array.from(matriz.querySelectorAll('button'))
                    .filter(btn => {
                        const tipo = btn.dataset.tipo;
                        return tipo && tipo !== "";
                    })
                    .map(btn => ({
                        x: parseInt(btn.dataset.x),
                        y: parseInt(btn.dataset.y),
                        tipo: parseInt(btn.dataset.tipo)
                    }));

                resultados[piso] = botones;
            });

            return resultados;
        }

        /**
         * Valida los datos del formulario antes de enviar
         * @returns {boolean}
         */
        function validarFormulario() {
            const nombre = $("#txt_Nombre").val().trim();
            const marca = $("#cbx_Marca").val().trim();
            const estado = $('#cbx_Estado').val();
            const servicio = $('#cbx_Servicio').val();
            const cantidadPisos = parseInt($('#cantidadPisos').val());

            if (!nombre || !estado || !marca || !cantidadPisos || cantidadPisos < 1) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return false;
            }

            const herramientasPorPiso = obtenerHerramientasPorPiso();
            const hayDatos = Object.values(herramientasPorPiso).some(arr => arr.length > 0);

            if (!hayDatos) {
                toastr.error("Debe diseñar al menos un nivel para continuar", 'MENSAJE DE SISTEMA');
                return false;
            }

            return true;
        }

        /**
         * Prepara los datos para enviar al servidor
         * @returns {Object}
         */
        function prepararDatosEnvio() {
            const nombre = $("#txt_Nombre").val().trim();
            const marca = $("#cbx_Marca").val().trim();
            const estado = $('#cbx_Estado').val();
            const servicio = $('#cbx_Servicio').val();
            const cantidadPisos = parseInt($('#cantidadPisos').val());
            const herramientasPorPiso = obtenerHerramientasPorPiso();

            const niveles = [];
            for (let i = 1; i <= cantidadPisos; i++) {
                const herramientas = herramientasPorPiso[i] || [];

                let maxX = -Infinity;
                let maxY = -Infinity;

                herramientas.forEach(el => {
                    if (el.x > maxX) maxX = el.x;
                    if (el.y > maxY) maxY = el.y;
                });

                niveles.push({
                    nroPiso: i,
                    x_dimension: maxX === -Infinity ? 0 : maxX,
                    y_dimension: maxY === -Infinity ? 0 : maxY,
                    herramientas: herramientas
                });
            }

            return {
                nombre,
                estado,
                marca,
                servicio,
                cantidadPisos,
                niveles
            };
        }

        // ======================
        // Funciones de Eventos
        // ======================

        /**
         * Maneja el evento de registrar un tipo de vehículo
         * @param {Event} e 
         */
        async function manejarRegistro(e) {
            e.preventDefault();

            if (!validarFormulario()) return;

            const confirmacion = await Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará al tipo de vehículo y sus niveles. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar tipo vehículo",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            });

            if (!confirmacion.isConfirmed) return;

            const datos = prepararDatosEnvio();
            let formData = new FormData();

            formData.append("nombre", datos.nombre);
            formData.append("estado", datos.estado);
            formData.append("marca", datos.marca);
            formData.append("servicio", datos.servicio);
            formData.append("cantidadPisos", datos.cantidadPisos);
            formData.append("niveles", JSON.stringify(datos.niveles));

            try {
                const response = await $.ajax({
                    url: '/trabajadores/viajes/registrarTipoVehiculo',
                    type: "POST",
                    processData: false,
                    contentType: false,
                    data: formData
                });

                if (response.Status === "success") {
                    if (response.Msj2) {
                        toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                    } else {
                        toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                        setTimeout(() => {
                            window.location.href = '/trabajadores/viajes/GestionarTipoVehiculo';
                        }, 500);
                    }
                } else {
                    mostrarError(response.Msj, "MENSAJE DE SISTEMA");
                }
            } catch (error) {
                mostrarError("Error en el servidor", "MENSAJE DE SISTEMA");
            }
        }

        /**
         * Maneja el evento de actualizar un tipo de vehículo
         * @param {Event} e 
         */
        async function manejarActualizacion(e) {
            e.preventDefault();

            if (!validarFormulario()) return;

            const confirmacion = await Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará el tipo vehículo y sus niveles. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar tipo vehículo",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            });

            if (!confirmacion.isConfirmed) return;

            const id = Number("{{ tipoVehiculo.id }}");
            const datos = prepararDatosEnvio();
            let formData = new FormData();

            formData.append("nombre", datos.nombre);
            formData.append("estado", datos.estado);
            formData.append("marca", datos.marca);
            formData.append("servicio", datos.servicio);
            formData.append("cantidadPisos", datos.cantidadPisos);
            formData.append("niveles", JSON.stringify(datos.niveles));

            try {
                const response = await $.ajax({
                    url: `/trabajadores/viajes/editarTipoVehiculo/${id}`,
                    type: "POST",
                    processData: false,
                    contentType: false,
                    data: formData
                });

                if (response.Status === "success") {
                    if (response.Msj2) {
                        toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                    } else {
                        toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                        setTimeout(() => {
                            window.location.href = '/trabajadores/viajes/GestionarTipoVehiculo';
                        }, 500);
                    }
                } else {
                    mostrarError(response.Msj, "MENSAJE DE SISTEMA");
                }
            } catch (error) {
                mostrarError("Error en el servidor", "MENSAJE DE SISTEMA");
            }
        }

        /**
         * Maneja el evento de ir al siguiente tab
         */
        function manejarSiguienteTab() {
            generarTabsNivel();

            setTimeout(() => {
                const cantidad = parseInt(document.getElementById("cantidadPisos").value);
                for (let i = 1; i <= cantidad; i++) {
                    generarMatriz(i);
                }

                activarEventosDrag();
                inicializarSistemaSeleccion();
                irAlSiguienteTab();
            }, 100);
        }

        /**
         * Inicializa el controlador
         */
        function init() {
            // Cargar datos iniciales
            obtenerMarcas();
            obtenerServicios();

            // Configurar eventos
            $(document).on('click', '#btn_Siguiente', irAlSiguienteTab);
            $(document).on('click', '#btn_Siguiente_tab_01', manejarSiguienteTab);
            $(document).on('click', '#btn_Registrar', manejarRegistro);
            $(document).on('click', '#btn_Actualizar', manejarActualizacion);
            $(document).on('click', '#btn_Listado', () => {
                window.location.href = "/trabajadores/viajes/GestionarTipoVehiculo";
            });
            $(document).on('click', '#btn_Regresar', () => {
                window.location.href = "/trabajadores/viajes/GestionarTipoVehiculo";
            });

            // Validar input de cantidad de pisos
            document.getElementById('cantidadPisos').addEventListener('input', (e) => {
                let val = parseInt(e.target.value);
                if (isNaN(val) || val < 1) e.target.value = 1;
                else if (val > MAX_PISOS) e.target.value = MAX_PISOS;
            });

            // Configuración inicial para modo edición/ver
            if (isModoEdicion || isModoRegresar) {
                setTimeout(() => {
                    $('#cantidadPisos').val("{{ niveles|length }}");
                    generarTabsNivel();

                    setTimeout(() => {
                        const cantidad = parseInt(document.getElementById("cantidadPisos").value);
                        for (let i = 1; i <= cantidad; i++) {
                            generarMatriz(i);
                        }
                        activarEventosDrag();
                    }, 100);
                }, 100);
            }

            // Deshabilitar drag en modo ver
            if (isModoRegresar) {
                document.querySelectorAll('.control').forEach(icono => {
                    icono.setAttribute('draggable', 'false');
                });
            }

            // Inicializar selección
            setTimeout(() => {
                inicializarSistemaSeleccion();
            }, 200);
        }

        // Retornar métodos públicos
        return {
            init
        };
    })();

    // Inicializar el controlador cuando el documento esté listo
    $(document).ready(function () {
        TipoVehiculoController.init();
    });
</script>
