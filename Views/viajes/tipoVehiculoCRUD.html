{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</ h4>
                </div>
                <div class="card-body" autocomplete="off">
                    <!-- Formulario para registrar el tipo de vehículo -->
                    <!-- /trabajadores/viajes/registrarTipoVehiculo -->
                    <form action=""
                    method="POST" id="formTipoVehiculo">

                        <div class="mb-3">
                            <label for="txt_Nombre">Nombre del tipo de vehículo</label>
                            <input type="text" name="txt_nombre" id="txt_Nombre" class="form-control" placeholder="Nombre del tipo de vehículo" value="{{ tipoVehiculo.nombre }}" {% if btnId == "btn_Regresar" %} disabled {% endif %}>
                        </div>

                        <div class="mb-3">
                            <label for="txt_marca">idMarca</label>
                            <input type="number" name="txt_marca" id="txt_marca" class="form-control" placeholder="Id de la marca" value="{{ tipoVehiculo.idMarca }}" {% if btnId == "btn_Regresar" %} disabled {% endif %}>
                        </div>

                        <div class="mb-3">
                            <label for="txt_Estado">Estado</label>
                            <select id="txt_Estado" name="txt_estado" class="form-control" {% if btnId == "btn_Regresar" %} disabled {% endif %}>
                                <option value="1" {% if tipoVehiculo.estado == 1 %}selected{% endif %}>Activo</option>
                                <option value="0" {% if tipoVehiculo.estado == 0 %}selected{% endif %}>Inactivo</option>
                            </select>
                        </div>

                        <div class="text-center">
                            <button id="btn_Listado" type="button" class="btn btn-danger">Volver al listado de
                                tipo de vehiculo</button>
                            <button id="{{ btnId }}" type="submit" class="btn btn-primary">Aceptar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Aquí puedes agregar cualquier script que necesites
    $(document).ready(function () {

        let idTipoVehiculo = "{{ tipoVehiculo.id }}"

        $("#btn_Listado").click(()=>{
            window.location.href="/trabajadores/viajes/GestionarTipoVehiculo"
        })

        $("#btn_Regresar").click(()=>{
            window.location.href="/trabajadores/viajes/GestionarTipoVehiculo"
        })

        $('#formTipoVehiculo').on('submit', function(e) {
            e.preventDefault();

            $("#btn_Actualizar").click(()=>{
                $.ajax({
                    url: `/trabajadores/viajes/editarTipoVehiculo/${idTipoVehiculo}`,
                    type: 'POST',
                    data: $(this).serialize(),
                    success: function(response) {
                        // Mostrar toastr de éxito
                        toastr.success(response.Msj, 'Éxito');
                        
                        // Redirigir después de 2 segundos (opcional)
                        setTimeout(function() {
                            window.location.href = "/trabajadores/viajes/GestionarTipoVehiculo";
                        }, 1000);
                    },
                    error: function(xhr) {
                        // Mostrar toastr de error
                        let errorMsg = xhr.responseJSON ? xhr.responseJSON.Msj : 'Error desconocido';
                        toastr.error(errorMsg, 'Error');
                    }
                });
            })

            $("#btn_Registrar").click(()=>{
                $.ajax({
                    url: '/trabajadores/viajes/registrarTipoVehiculo',
                    type: 'POST',
                    data: $(this).serialize(),
                    success: function(response) {
                        // Mostrar toastr de éxito
                        toastr.success(response.Msj, 'Éxito');
                        
                        // Redirigir después de 2 segundos (opcional)
                        setTimeout(function() {
                            window.location.href = "/trabajadores/viajes/GestionarTipoVehiculo";
                        }, 1000);
                    },
                    error: function(xhr) {
                        // Mostrar toastr de error
                        let errorMsg = xhr.responseJSON ? xhr.responseJSON.Msj : 'Error desconocido';
                        toastr.error(errorMsg, 'Error');
                    }
                });
            })
            
        });

    });
</script>
{% endblock %}
