{% extends "index.html" %}
{% block title %} {{title}} {% endblock %}

{% block content %}
<div class="container-fluid p-4">
    <div class="card card-primary card-tabs">
        <div class="card-header p-0 pt-1">
            <ul class="nav nav-tabs" id="tipoVehiculoTabs" role="tablist">
                <li class="nav-item">
                    <a class="nav-link active" id="tab-vehiculo-tab" data-toggle="pill" href="#tab-vehiculo" role="tab"
                        aria-controls="tab-vehiculo" aria-selected="true">Tipo Vehículo</a>
                </li>
            </ul>
        </div>

        <div class="card-body">
            <div class="tab-content" id="tipoVehiculoTabsContent">
                <!-- TAB VEHÍCULO -->
                <div class="tab-pane fade show active" id="tab-vehiculo" role="tabpanel"
                    aria-labelledby="tab-vehiculo-tab">
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label for="txt_Nombre">Nombre del tipo de vehículo</label>
                                <input type="text" name="txt_Nombre" id="txt_Nombre" class="form-control"
                                    placeholder="Nombre del tipo de vehículo" value="{{ tipoVehiculo.nombre }}" {% if
                                    btnId=="btn_Regresar" %} disabled {% endif %}>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label for="txt_marca">Marca</label>
                                <div class="input-group">
                                    <select id="cbx_Marca" name="txt_marca" class="form-control" {% if
                                        btnId=='btn_Regresar' %}disabled{% endif %}>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label for="cbx_Servicio">Servicio</label>
                                <div class="input-group">
                                    <select id="cbx_Servicio" name="cbx_Servicio" class="form-control" {% if
                                        btnId=='btn_Regresar' %}disabled{% endif %}>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label for="txt_Cantidad">Cantidad</label>
                                <input type="number" name="txt_Cantidad" id="txt_Cantidad" class="form-control"
                                    placeholder="Ingrese la cantidad de vehiuclos de ese tipo"
                                    value="{{ tipoVehiculo.cantidad }}" {% if btnId=="btn_Regresar" %} disabled {% endif
                                    %}>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label for="cbx_Estado">Estado</label>
                                <select id="cbx_Estado" name="cbx_Estado" class="form-control" {% if
                                    btnId=="btn_Regresar" %} disabled {% endif %}>
                                    <option value="1" {% if tipoVehiculo.estado==1 %}selected{% endif %}>Vigente
                                    </option>
                                    <option value="0" {% if tipoVehiculo.estado==0 %}selected{% endif %}>No vigente
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label for="cantidadPisos">Cantidad de pisos</label>
                                <input type="number" min="1" id="cantidadPisos" name="cantidadPisos"
                                    class="form-control" required>
                            </div>
                            <div class="col-md-12 text-center">
                                <button id="btn_Listado" type="button" class="btn btn-danger">Volver al listado de
                                    tipos de vehículos</button>
                                <button type="button" class="btn btn-primary"
                                    onclick="generarTabsNivel()">Siguiente</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}


{% block scripts %}
<script>
    function generarTabsNivel() {
        const cantidad = parseInt(document.getElementById("cantidadPisos").value);
        if (!cantidad || cantidad < 1) {
            toastr.warning("Ingrese una cantidad válida de pisos.");
            return;
        }

        const tabs = document.getElementById("tipoVehiculoTabs");
        const content = document.getElementById("tipoVehiculoTabsContent");

        // Limpiar tabs antiguos excepto el primero (tipo vehículo)
        tabs.querySelectorAll("li:not(:first-child)").forEach(e => e.remove());
        content.querySelectorAll(".tab-pane:not(:first-child)").forEach(e => e.remove());

        for (let i = 1; i <= cantidad; i++) {
            const tabId = `nivel-${i}`;
            const tabLabel = `Piso ${i}`;

            // Crear nuevo tab
            const newTab = document.createElement('li');
            newTab.className = 'nav-item';
            newTab.innerHTML = `
                <a class="nav-link" id="${tabId}-tab" data-toggle="pill" href="#${tabId}" role="tab" aria-controls="${tabId}" aria-selected="false">${tabLabel}</a>
            `;
            tabs.appendChild(newTab);

            // Crear contenido del tab
            const newContent = document.createElement('div');
            newContent.className = 'tab-pane fade';
            newContent.id = tabId;
            newContent.setAttribute('role', 'tabpanel');
            newContent.setAttribute('aria-labelledby', `${tabId}-tab`);
            newContent.innerHTML = `
                <div class="row">
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Controles</h3>
                            </div>
                            <div class="card-body">
                                <div id="accordion">
                                    {% for tipo_herramienta in tipo_herramientas %}
                                    <div class="card card-{{ loop.cycle('info','primary') }}">
                                        <div class="card-header">
                                            <h4 class="card-title w-100">
                                                <a class="d-block w-100 collapsed" data-toggle="collapse"
                                                    href="#collapse{{ loop.index }}"
                                                    aria-expanded="false">{{ tipo_herramienta.nombre }}</a>
                                            </h4>
                                        </div>
                                        <div id="collapse{{ loop.index }}" class="collapse"
                                            data-parent="#accordion">
                                            <div class="card-body d-flex flex-wrap bg-white">
                                                {% for herramienta in herramientas %}
                                                {% if herramienta.id_tipo==tipo_herramienta.id %}
                                                <i class="{{ herramienta.icono }} fa-lg m-2 control"
                                                    draggable="true" data-tipo="{{ herramienta.id }}"
                                                    title="{{ herramienta.nombre }}"></i>
                                                {% endif %}
                                                {% endfor %}
                                            </div>
                                        </div>
                                    </div>
                                    {% endfor %}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Diseño</h3>
                            </div>
                            <div class="card-body">
                                <div class="row justify-content-center" id="matrizContainer"></div>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                                <button id="btn_Listado" type="button" class="btn btn-danger mb-2">Volver al
                                    listado</button>
                                {% if btnId != "btn_Regresar" %}
                                <button id="{{ btnId }}" class="btn btn-primary mb-2">Aceptar</button>
                                {% endif %}
                            </div>
                    </div>
            `;
            content.appendChild(newContent);
            generarMatriz();
            activarEventosDrag();
        }
    }
</script>
<script>
    function fct_GetMarcas() {
        $.getJSON('/trabajadores/viajes/GetMarcasTipoVehiculo', function (response) {
            if (response.Status === 'success') {
                let items = '<option disabled selected>--SELECCIONAR--</option>';

                $.each(response.data, function (index, item) {
                    if (item.id === Number("{{ tipoVehiculo.id_marca }}")) {
                        items += `<option selected value="${item.id}">${item.nombre}</option>`;
                    } else {
                        items += `<option value="${item.id}">${item.nombre}</option>`;
                    }
                });

                $('#cbx_Marca').html(items);
            } else {
                console.error('Error al obtener las marcas:', response.Msj);
            }
        });
    }

    function fct_GetServicios() {
        $.getJSON('/trabajadores/viajes/GetServiciosTipoVehiculo', function (response) {
            if (response.Status === 'success') {
                let items = '<option disabled selected>--SELECCIONAR--</option>';

                $.each(response.data, function (index, item) {
                    if (item.id === Number("{{ tipoVehiculo.id_servicio }}")) {
                        items += `<option selected value="${item.id}">${item.nombre}</option>`;
                    } else {
                        items += `<option value="${item.id}">${item.nombre}</option>`;
                    }
                });

                $('#cbx_Servicio').html(items);
            } else {
                console.error('Error al obtener los servicios:', response.Msj);
            }
        });
    }
    // Aquí puedes agregar cualquier script que necesites
    $(document).ready(function () {

        fct_GetMarcas();
        fct_GetServicios();

        $("#btn_Listado").click(() => {
            window.location.href = "/trabajadores/viajes/GestionarTipoVehiculo"
        })

        $("#btn_Regresar").click(() => {
            window.location.href = "/trabajadores/viajes/GestionarTipoVehiculo"
        })

        $("#btn_Registrar").click(function () {
            let nombre = $("#txt_Nombre").val().trim();
            let marca = $("#cbx_Marca").val();
            let cantidad = $("#txt_Cantidad").val().trim();
            let estado = $('#cbx_Estado').val();
            let servicio = $('#cbx_Servicio').val();

            if (!nombre || !estado || !marca || !cantidad || !servicio) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará al tipo de vehículo. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar tipo vehículo",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("estado", estado);
                    formData.append("marca", marca);
                    formData.append("cantidad", cantidad);
                    formData.append("servicio", servicio);

                    $.ajax({
                        url: '/trabajadores/viajes/registrarTipoVehiculo',
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = '/trabajadores/viajes/GestionarTipoVehiculo';
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Actualizar").click(function () {
            const id = Number("{{ tipoVehiculo.id }}");

            let nombre = $("#txt_Nombre").val().trim();
            let marca = $("#cbx_Marca").val();
            let cantidad = $("#txt_Cantidad").val().trim();
            let estado = $('#cbx_Estado').val();
            let servicio = $('#cbx_Servicio').val();

            if (!nombre || !estado || !marca || !cantidad || !servicio) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará al tipo vehículo. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar tipo vehículo",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {

                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("estado", estado);
                    formData.append("marca", marca);
                    formData.append("cantidad", cantidad);
                    formData.append("servicio", servicio);

                    $.ajax({
                        url: `/trabajadores/viajes/editarTipoVehiculo/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = '/trabajadores/viajes/GestionarTipoVehiculo';
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        fct_Vehiculos()

        // Volver al listado
        $("#btn_Listado, #btn_Regresar").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarNivel";
        });

        if ("{{ btnId }}" === "btn_Regresar") {
            document.querySelectorAll('.control').forEach(icono => {
                icono.setAttribute('draggable', 'false');
            });
        }
        if (herramientaSeleccionada && "{{ btnId }}" !== "btn_Regresar") {
            this.setAttribute('data-tipo', herramientaSeleccionada);
            this.innerHTML = obtenerIcono(herramientaSeleccionada);
        }


        $('#btn_Siguiente').click(function () {
            const piso = $('#txt_nroPiso').val();
            const tipo = $('#cbx_TipoVehiculo').val();

            if (!piso || !tipo) {
                toastr.error("Complete todos los campos antes de continuar", "Error");
                return;
            }

            $('#tab02-tab').tab('show');
            
            
        });
        $('#btn_Registrar').click(function (e) {
            e.preventDefault();
            try {
                const herramientas = dict_botones();
                if (herramientas.length == 0) {
                    toastr.error("Debe diseñar el nivel para continuar", 'Error');
                    return;
                }

                let maxX = 15;
                let maxY = 6;


                const datos = {
                    nroPiso: $('#txt_nroPiso').val(),
                    id_tipo_vehiculo: $('#cbx_TipoVehiculo').val(),
                    x_dimension: maxX,
                    y_dimension: maxY,
                    estado: $('#txt_estado').val(),
                    herramientas: herramientas
                };

                $.ajax({
                    url: "/trabajadores/viajes/registrarNivel",
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify(datos),
                    success: function (response) {
                        if (response.Status === "success") {
                            toastr.success("Se ha registrado el nivel correctamente", "Éxito");
                            setTimeout(() => {
                                window.location.href = "/trabajadores/viajes/GestionarNivel";
                            }, 500);

                        } else {
                            toastr.error("Ocurrió un error al registrar el nivel: " + response.Msj, "Error")
                        }
                    },
                    error: function () {
                        toastr.error("Error en el servidor", "Error")
                    }
                });
            } catch (error) {
                console.error("Error capturado en try-catch:", error);
                toastr.error("Se produjo un error inesperado: " + error.message, "Error");
            }
        });
        $('#btn_Actualizar').click(function (e) {

            e.preventDefault();

            try {
                const id = Number("{{ nivel.id }}");
                const herramientas = dict_botones();
                if (herramientas.length == 0) {
                    toastr.error("Debe diseñar el nivel para continuar", 'Error');
                    return;
                }

                let maxX = 15;
                let maxY = 6;

                const datos = {
                    nroPiso: $('#txt_nroPiso').val(),
                    id_tipo_vehiculo: $('#cbx_TipoVehiculo').val(),
                    x_dimension: maxX,
                    y_dimension: maxY,
                    estado: $('#txt_estado').val(),
                    herramientas: herramientas
                };

                $.ajax({
                    url: `/trabajadores/viajes/editarNivel/${id}`,  // Envia a /editarNivel/<idNivel>
                    type: "POST",
                    contentType: "application/json",
                    data: JSON.stringify(datos),
                    success: function (response) {
                        if (response.Status === "success") {
                            toastr.success("Se ha actualizado el nivel correctamente", "Éxito");
                            setTimeout(() => {
                                window.location.href = "/trabajadores/viajes/GestionarNivel";
                            }, 500);
                        } else {
                            toastr.error("Error al actualizar el nivel: " + response.Msj, "Error");
                        }
                    },
                    error: function () {
                        toastr.error("Error en el servidor", "Error");
                    }
                });
            } catch (error) {
                console.error("Error capturado en try-catch:", error);
                toastr.error("Se produjo un error inesperado: " + error.message, "Error");
            }
        });

    });
</script>

<script>
    // Botón "Siguiente" del primer tab


    let herramientaSeleccionada = null;
    const list_herramientas = JSON.parse('{{ herramientas | tojson }}');
    const botones_guardados = JSON.parse('{{ botones | tojson }}');
    $(document).ready(() => {




    });
    function activarEventosDrag() {
        document.querySelectorAll('.control').forEach(icono => {
            icono.addEventListener('dragstart', function (e) {
                herramientaSeleccionada = this.getAttribute('data-tipo');
            });
        });
    }


    function generarMatriz() {
        const filas = 15;
        const columnas = 6;
        const contenedor = document.getElementById('matrizContainer');
        contenedor.innerHTML = '';

        contenedor.style.display = 'grid';
        contenedor.style.gridTemplateColumns = `repeat(${columnas}, auto)`;
        contenedor.style.gap = '8px';

        for (let i = 1; i <= filas; i++) {
            for (let j = 1; j <= columnas; j++) {

                const btn = document.createElement('button');
                btn.className = 'btn btn-light border-dark';
                btn.style.width = '40px';
                btn.style.height = '40px';
                btn.setAttribute('data-x', j);
                btn.setAttribute('data-y', i);
                btn.setAttribute('data-tipo', '');

                // Verificar si hay un botón en esta posición
                const boton_existente = botones_guardados.find(b =>
                    parseInt(b.x_dimension) === j && parseInt(b.y_dimension) === i
                );

                if (boton_existente) {
                    const iconoHTML = obtenerIcono(boton_existente.id_herramienta);
                    btn.innerHTML = iconoHTML;
                    btn.setAttribute('data-tipo', boton_existente.id_herramienta);
                }

                // Drag-over y drop
                btn.addEventListener('dragover', e => e.preventDefault());
                btn.addEventListener('drop', function (e) {
                    e.preventDefault();
                    if (herramientaSeleccionada && "{{ btnId }}" !== "btn_Regresar") {
                        this.setAttribute('data-tipo', herramientaSeleccionada);
                        this.innerHTML = obtenerIcono(herramientaSeleccionada);
                    }
                });

                // Click (solo si no es modo ver)
                if ("{{ btnId }}" !== "btn_Regresar") {
                    btn.addEventListener('click', function () {
                        let idAsiento = 1;
                        let herramienta_dict = list_herramientas.find(h => h.id === parseInt(idAsiento));
                        const tipoActual = this.getAttribute('data-tipo');
                        if (tipoActual === '') {
                            this.setAttribute('data-tipo', `${idAsiento}`);
                            this.innerHTML = `<i class="${herramienta_dict.icono}"></i>`;
                        } else {
                            this.setAttribute('data-tipo', '');
                            this.innerHTML = '';
                        }
                    });
                }

                contenedor.appendChild(btn);
            }
        }
    }


    function obtenerIcono(idHerramienta) {
        const herramienta_dict = list_herramientas.find(h => h.id === parseInt(idHerramienta));
        if (herramienta_dict) {
            return `<i class="${herramienta_dict.icono}"></i>`
        }
        return '';
    }
    function dict_botones() {
        const botones = document.querySelectorAll("#matrizContainer button");
        const lista_botones = Array.from(botones)
            .filter(boton => boton.dataset.tipo != "")
            .map(boton => ({
                x: boton.dataset.x,
                y: boton.dataset.y,
                tipo: boton.dataset.tipo
            }));
        return lista_botones
    }
    function fct_Vehiculos() {
        $.getJSON('/trabajadores/viajes/GetData_TipoVehiculo', function (response) {
            if (response.Status === 'success') {
                let items = '<option disabled>--SELECCIONAR--</option>';

                $.each(response.data, function (index, item) {
                    if (item.id === Number('{{ nivel.id_tipo_vehiculo }}')) {
                        items += `<option selected value="${item.id}">${item.nombre}</option>`;
                    } else {
                        items += `<option value="${item.id}">${item.nombre}</option>`;
                    }
                });

                $('#cbx_TipoVehiculo').html(items);
            } else {
                console.error('Error al obtener los tipos de usuario:', response.Msj);
            }
        });
    }

</script>

{% endblock %}
