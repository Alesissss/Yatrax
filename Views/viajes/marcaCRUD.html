{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data" id="formMarca">
                        <div class="mb-3">
                            <label for="txt_Nombre">Nombre</label>
                            <input type="text" id="txt_Nombre" name="nombre" class="form-control" placeholder="Nombre"
                                   {% if ver %}disabled{% endif %} value="{{ marca.nombre }}">
                        </div>
                        <div class="mb-3">
                            <label for="txt_Estado">Estado</label>
                            <select id="txt_Estado" name="estado" class="form-control" {% if ver %}disabled{% endif %}>
                                <option value="1" {% if marca.estado == 1 %}selected{% endif %}>Vigente</option>
                                <option value="0" {% if marca.estado == 0 %}selected{% endif %}>No vigente</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="txt_Logo">Logo</label>
                            <div class="col-12 text-left">
                                <label class="btn btn-warning {% if btnId == 'btn_Aceptar' %}disabled{% endif %}" for="file_Imagen">
                                    <i class="bi bi-file-earmark-arrow-up-fill"></i> Subir archivo
                                </label>
                                <input {% if ver %}disabled{% endif %} type="file" class="d-none" id="file_Imagen" name="logo" accept=".jpg, .jpeg, .png" {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                                <span id="checkIcon" class="d-none text-success ml-2">
                                    <i class="bi bi-check-circle-fill"></i> Archivo subido
                                </span>
                            </div>
                        
                            <!-- Vista previa de la imagen seleccionada -->
                            <div id="logoPreview" class="mt-3" style="display: none;">
                                <label>Vista previa:</label>
                                <img id="logoPreviewImage" class="img-thumbnail" style="width: 100px;">
                            </div>
                        
                            {% if marca.logo %}
                                <div class="mt-3">
                                    <label>Logo actual:</label>
                                    <img src="{{ marca.logo }}" class="img-thumbnail mt-2" style="width: 100px;">
                                </div>
                            {% endif %}
                        </div>
                        
                        
                        <div class="text-center">
                            <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de marcas</button>
                            {% if ver %}
                                <button id="btn_Ver" type="button" class="btn btn-primary">Aceptar</button>
                            {% else %}
                                <button id="{{ btnId }}" type="submit" class="btn btn-primary">
                                    {% if btnId == 'btn_Registrar' %}Aceptar{% elif btnId == 'btn_Editar' %}Aceptar{% else %}Ver{% endif %}
                                </button>
                            {% endif %}
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    $(document).ready(function () {

        $("#btn_Ver").click(function () {
            window.location.href = '/trabajadores/viajes/GestionarMarcas';
        });

        // Volver al listado de marcas
        $("#btn_Volver").click(function () {
            window.location.href = '/trabajadores/viajes/GestionarMarcas';
        });

        // Validaciones al enviar el formulario
        $("#formMarca").submit(function (e) {
            e.preventDefault(); // Evitar el envío del formulario por defecto
            // Obtener los valores de los campos
            var nombre = $("#txt_Nombre").val().trim();
            if (!nombre) {
                toastr.warning("El nombre es obligatorio", "MENSAJE DE SISTEMA");
                return;
            }

            // Confirmación antes de realizar la modificación o registro
            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará los datos de la marca. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, continuar",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    // Si se confirma, enviamos el formulario
                    $(this).unbind("submit").submit(); // Permite que se envíe el formulario
                }
            });
        });

        // Mostrar el icono de archivo subido y vista previa de la imagen
    $('#file_Imagen').on('change', function () {
        if (this.files.length > 0) {
            // Mostrar el icono de "Archivo subido"
            $('#checkIcon').removeClass('d-none');

            // Mostrar la vista previa de la imagen
            var reader = new FileReader();
            reader.onload = function (e) {
                // Mostrar la imagen seleccionada
                $('#logoPreview').show();  // Mostrar la vista previa
                $('#logoPreviewImage').attr('src', e.target.result);  // Establecer la imagen en la vista previa
            };

            reader.readAsDataURL(this.files[0]);  // Leer el archivo como una URL de datos
        } else {
            // Ocultar el icono y la vista previa si no hay archivo seleccionado
            $('#checkIcon').addClass('d-none');
            $('#logoPreview').hide();
        }
    });
    });
</script>
{% endblock %}
