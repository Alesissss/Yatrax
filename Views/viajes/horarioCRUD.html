{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="txt_hora_entrada">Hora de entrada:</label>
                        <div class="input-group">
                            <input type="time" id="txt_hora_entrada" class="form-control" placeholder="HH:mm:SS" {% if
                                btnId=='btn_Aceptar' %}disabled{% endif %} value="{{ horario.horario_entrada }}">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-user"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="txt_hora_salida">Hora de salida:</label>
                        <div class="input-group">
                            <input type="time" id="txt_hora_salida" class="form-control" placeholder="HH:mm:SS" {%
                                if btnId=='btn_Aceptar' %}disabled{% endif %} value="{{ horario.horario_salida }}">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="cbx_Estado">Estado</label>
                        <div class="input-group">
                            <select id="cbx_Estado" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{%
                                endif %}>
                                <option disabled>--SELECCIONAR--</option>
                                <option {% if horario.estado  == 'A' %}selected{% endif %} value="A">Vigente</option>
                                <option {% if horario.estado  == 'I' %}selected{% endif %} value="0">No vigente</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="text-center">
                        <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de
                            horarios</button>
                        <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    $(document).ready(function () {
        $("#btn_Registrar").click(function () {
            let hora_entrada = $("#txt_hora_entrada").val().trim();
            let hora_salida = $("#txt_hora_salida").val().trim();
            let estado = $('#cbx_Estado').val();

            if (!hora_entrada || !hora_salida || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará al horario. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar horario",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("hora_entrada", hora_entrada);
                    formData.append("hora_salida", hora_salida);
                    formData.append("estado", estado);
                    $.ajax({
                        url: "/trabajadores/viajes/RegistrarHorario",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/viajes/GestionarHorarios";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Editar").click(function () {
            const id = Number("{{ horario.id }}");

            let hora_entrada = $("#txt_hora_entrada").val().trim();
            let hora_salida = $("#txt_hora_salida").val().trim();
            let estado = $('#cbx_Estado').val();

            if (!hora_entrada || !hora_salida || !estado) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará al horario. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar horario",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("hora_entrada", hora_entrada);
                    formData.append("hora_salida", hora_salida);
                    formData.append("estado", estado);

                    $.ajax({
                        url: `/trabajadores/viajes/EditarHorario/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                setTimeout(() => {
                                    window.location.href = "/trabajadores/viajes/GestionarHorarios";
                                }, 500);
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $("#btn_Aceptar").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarHorarios";
        });

        $("#btn_Volver").click(function () {
            window.location.href = "/trabajadores/viajes/GestionarHorarios";
        });
    });
</script>
{% endblock %}
