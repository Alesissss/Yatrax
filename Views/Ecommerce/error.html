<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YATRAX - {{ error }}</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='/img/yatrax_icon.ico') }}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #003b8b;
            --secondary-color: #315CAC;
            --light-blue: #2196f3;
            --success-color: #4caf50;
            --danger-color: #c62828;
            --border-radius: 10px;
            --transition: all 0.3s ease;
        }

        /*
        .bg-primary-custom {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)) !important;
        }
        */
        .text-primary-custom {
            color: var(--primary-color) !important;
        }

        .btn-primary-custom {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .btn-primary-custom:hover {
            background-color: var(--secondary-color);
            border-color: var(--secondary-color);
        }

        .rounded-custom {
            border-radius: var(--border-radius) !important;
        }
    </style>
</head>

<body class="bg-primary-custom">
    <div class="container-fluid min-vh-100 d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-10 col-xl-8">
                    <!-- <div class="card shadow-lg border-0 rounded-custom"> -->

                    <div class="card border-0">
                        <div class="card-body p-4 p-md-5">
                            <div class="row align-items-center">
                                <!-- Contenido Principal - Izquierda en desktop, primero en móvil -->
                                <div class="col-12 col-lg-6 text-center text-lg-start mb-4 mb-lg-0 order-1 order-lg-1">
                                    <!-- Brand -->
                                    <h1 class="display-5 fw-bold text-primary-custom mb-4 NOMBRE_EMPRESA"></h1>

                                    <!-- Error Code -->
                                    <div class="display-1 fw-bold text-primary-custom mb-3">{{ error_code|string }}</div>

                                    <!-- Error Title -->
                                    <h2 class="h3 text-dark mb-3" id="ERROR_TITLE"></h2>

                                    <!-- Error Description -->
                                    <p class="text-muted mb-3 fs-6">
                                        {{ error }}
                                    </p>

                                    <!-- Mensaje gracioso y botones - Solo visible en desktop -->
                                    <div class="d-none d-lg-block">
                                        <p class="text-muted mb-4 fs-6" id="FUNNY_MESSAGE"></p>

                                        <!-- Action Buttons -->
                                        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-lg-start">
                                            <button class="btn btn-primary-custom btn-lg"
                                                onclick="window.history.back()">
                                                <i class="fas fa-arrow-left me-2"></i>
                                                Volver Atrás
                                            </button>
                                            <button class="btn btn-outline-secondary btn-lg"
                                                onclick="window.location.href='/'">
                                                <i class="fas fa-home me-2"></i>
                                                Ir al Inicio
                                            </button>
                                        </div>

                                        <!-- Brand Footer -->
                                        <div class="mt-5 pt-4 border-top">
                                            <h5 class="fw-bold text-primary-custom mb-0 NOMBRE_EMPRESA"></h5>
                                        </div>
                                    </div>
                                </div>

                                <!-- Imagen - Derecha en desktop, segundo en móvil -->
                                <div class="col-12 col-lg-6 text-center order-2 order-lg-2 mb-4">
                                    <div class="mb-4">
                                        <img src="{{ url_for('static', filename='img/bus_danado.jpg') }}"
                                            alt="Bus dañado" class="img-fluid rounded-custom shadow-sm"
                                            style="max-height: 400px; object-fit: cover;">
                                    </div>
                                </div>

                                <!-- Mensaje gracioso y botones - Solo visible en móvil -->
                                <div class="col-12 text-center d-lg-none order-3">
                                    <p class="text-muted mb-4 fs-6" id="FUNNY_MESSAGE_MOBILE"></p>

                                    <!-- Action Buttons -->
                                    <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
                                        <button class="btn btn-primary-custom btn-lg" onclick="window.history.back()">
                                            <i class="fas fa-arrow-left me-2"></i>
                                            Volver Atrás
                                        </button>
                                        <button class="btn btn-outline-secondary btn-lg"
                                            onclick="window.location.href='/'">
                                            <i class="fas fa-home me-2"></i>
                                            Ir al Inicio
                                        </button>
                                    </div>

                                    <!-- Brand Footer -->
                                    <div class="mt-5 pt-4 border-top">
                                        <h5 class="fw-bold text-primary-custom mb-0 NOMBRE_EMPRESA"></h5>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Info adicional -->
                    <div class="text-center mt-1">
                        <small class="opacity-75" style="color: var(--primary-color);">
                            <i class="fas fa-info-circle me-1"></i>
                            Si el problema persiste, contacta con nuestro equipo de soporte
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const CONFIG = {
            EMPRESA: {
                NOMBRE: "YATRAXCITO",
            },
            ERROR: {
                TITULO: "Eso es un error",
                FUNNY_MESSAGE: "Tal vez el bus se desvió de la ruta. Eso es todo lo que sabemos"
            }
        };

        const FormManager = {
            setValuesFromConfig() {
                // Setear nombre empresa
                document.querySelectorAll(".NOMBRE_EMPRESA").forEach(label => {
                    label.innerHTML = CONFIG.EMPRESA.NOMBRE;
                });

                // Setear titulo error (corregido el error de variable)
                const error_title = document.getElementById("ERROR_TITLE");
                error_title.innerHTML = CONFIG.ERROR.TITULO;

                // Setear mensaje gracioso para desktop
                const funny_message = document.getElementById("FUNNY_MESSAGE");
                funny_message.innerHTML = CONFIG.ERROR.FUNNY_MESSAGE;

                // Setear mensaje gracioso para móvil
                const funny_message_mobile = document.getElementById("FUNNY_MESSAGE_MOBILE");
                funny_message_mobile.innerHTML = CONFIG.ERROR.FUNNY_MESSAGE;
            }
        };

        const App = {
            init() {
                this.inicializarComponentes();
            },

            inicializarComponentes() {
                FormManager.setValuesFromConfig();
            }
        };

        // Inicialización al cargar el DOM
        document.addEventListener('DOMContentLoaded', () => {
            App.init();
        });
    </script>
</body>

</html>
