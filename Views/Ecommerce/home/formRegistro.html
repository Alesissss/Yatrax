{% extends "maestra.html" %}
{% block titulo %}YATRAX - Registro{% endblock %}
{% block contenido %}
<style>
    /* Contenedor principal con posición relativa */
    .ytrx-register-back {
        background: linear-gradient(135deg, #1e88e5, #0d47a1);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        box-sizing: border-box;
        position: relative;
    }

    /* Contenedor del formulario con margen superior fijo */
    .ytrx-register-container {
        background-color: white;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 600px;
        padding: 40px;
        margin: 80px auto 40px;
        /* Margen superior fijo para el navbar */
        position: relative;
    }

    /* Títulos */
    .ytrx-register-title {
        color: #333;
        margin-bottom: 20px;
        font-size: 28px;
        text-align: center;
        font-weight: 600;
    }

    .ytrx-register-subtitle {
        color: #666;
        margin-bottom: 30px;
        line-height: 1.6;
        font-size: 16px;
        text-align: center;
    }

    /* Grupos de input */
    .ytrx-input-group {
        position: relative;
        margin-bottom: 20px;
    }

    /* Campos de formulario */
    .ytrx-form-input {
        width: 100%;
        padding: 15px 15px 15px 10px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.3s;
    }

    .ytrx-form-input:focus {
        border-color: #1976d2;
    }

    /* Contenedor de documento */
    .ytrx-doc-container {
        display: flex;
        gap: 10px;
    }

    #ytrx-doc-type {
        width: 30%;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
    }

    #ytrx-doc-number {
        width: 70%
    }

    /* Botón de submit */
    .ytrx-submit-btn {
        background-color: #1976d2;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
        width: 100%;
        margin-top: 10px;
    }

    .ytrx-submit-btn:hover {
        background-color: #1565c0;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* Enlace de login */
    .ytrx-login-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
    }

    .ytrx-login-link a {
        color: #1976d2;
        text-decoration: none;
        font-weight: 500;
    }

    .ytrx-login-link a:hover {
        text-decoration: underline;
    }

    /* Ajustes para móviles */
    @media (max-width: 768px) {
        .ytrx-register-container {
            padding: 30px;
            margin: 60px auto 20px;
        }
    }
</style>

<main class="ytrx-register-back">
    <div class="ytrx-register-container">
        <h1 class="ytrx-register-title">Crea una cuenta</h1>
        <p class="ytrx-register-subtitle">Únete a nuestra comunidad y disfruta de todos los beneficios</p>

        <form id="ytrx-register-form">
            <!-- Nombre completo -->
            <div class="ytrx-input-group">
                <input type="text" id="ytrx-fullname" class="ytrx-form-input" placeholder="Nombre y Apellidos" required>
            </div>

            <div class="ytrx-input-group">
                <input type="date" id="ytrx-birthdate" class="ytrx-form-input" placeholder="Fecha de nacimiento"
                    required>
            </div>


            <!-- Documento -->
            <div class="ytrx-input-group ytrx-doc-container">
                <select id="ytrx-doc-type" required>
                    <option value="" disabled selected>Tipo</option>
                    <option value="dni">DNI</option>
                    <option value="ce">CE</option>
                    <option value="pasaporte">Pasaporte</option>
                </select>
                <div style="position: relative; width: 70%;">
                    <input type="text" id="ytrx-doc-number" class="ytrx-form-input" style="width: 100%;" placeholder="Número de documento"
                        required>
                </div>
            </div>

            <!-- Teléfono -->
            <div class="ytrx-input-group">
                <input type="tel" id="ytrx-phone" class="ytrx-form-input" placeholder="Número de teléfono" required>
            </div>

            <!-- Email -->
            <div class="ytrx-input-group">
                <input type="email" id="ytrx-email" class="ytrx-form-input" placeholder="Correo electrónico" required>
            </div>

            <!-- Contraseña -->
            <div class="ytrx-input-group">
                <input type="password" id="ytrx-password" class="ytrx-form-input" placeholder="Contraseña" required>
            </div>

            <!-- Confirmar contraseña -->
            <div class="ytrx-input-group">
                <input type="password" id="ytrx-confirm-password" class="ytrx-form-input"
                    placeholder="Confirma contraseña" required>
            </div>

            <button type="submit" class="ytrx-submit-btn">Registrarse</button>

            <!-- Registro con redes sociales -->
            <div style="text-align: center; margin-top: 30px;">
                <p style="margin-bottom: 15px; color: #666;">O conéctate con</p>
                <div style="display: flex; justify-content: center; gap: 15px;">
                    <button type="button" style="border: none; background: none; cursor: pointer;">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
                            alt="Google" width="32" height="32">
                    </button>
                    <button type="button" style="border: none; background: none; cursor: pointer;">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg"
                            alt="Facebook" width="32" height="32">
                    </button>
                    <button type="button" style="border: none; background: none; cursor: pointer;">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg"
                            alt="Microsoft" width="32" height="32">
                    </button>
                </div>
            </div>
        </form>

        <p class="ytrx-login-link">
            ¿Ya tienes una cuenta? <a href="/login">Inicia sesión</a>
        </p>
    </div>
</main>
{% endblock %}
