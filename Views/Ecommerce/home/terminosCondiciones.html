{% extends "maestra.html" %}
{% block titulo %}YATRAX - Términos y condiciones{% endblock %}
{% block contenido %}

<style>
  /* pestañas en azul base */
  .nav-tabs .nav-link {
    color: rgb(52, 86, 168);
    border: none;
    border-bottom: 2px solid #000000;
    margin-right: 0 !important;
    border-radius: 0 !important;
    background-color: transparent !important;
    position: relative;
  }
  .nav-tabs .nav-link.active {
    color: #fff !important;
    background-color: rgb(52, 86, 168) !important;
    border-color: rgb(52, 86, 168) rgb(52, 86, 168) transparent;
  }
  .nav-tabs .nav-link:hover {
    background-color: rgba(52, 86, 168, 0.1);
  }
  .nav-tabs {
    display: flex !important;
    border-bottom: none !important;
  }
  .nav-item {
    padding: 0.5rem 0;
  }
  .nav-link {
    text-align: center;
    width: 100%;
    margin: 0;
  }
  .mt-4 {
    margin-top: 0px !important;
  }
</style>

<div class="container p-8 mt-4 font-family-system-ui">
  <div class="container container-tabs">
    <h2 class="text-center mb-4">Términos y Condiciones</h2>

    <ul class="nav nav-tabs mb-3 w-100" id="terminosTabs" role="tablist">
      <li class="nav-item flex-fill text-center" role="presentation">
        <button class="nav-link active" id="compra-tab"
                data-bs-toggle="tab" data-bs-target="#compra"
                type="button" role="tab" aria-controls="compra"
                aria-selected="true">
          Compras por Internet
        </button>
      </li>
      <li class="nav-item flex-fill text-center" role="presentation">
        <button class="nav-link" id="pasajes-tab"
                data-bs-toggle="tab" data-bs-target="#pasajes"
                type="button" role="tab" aria-controls="pasajes"
                aria-selected="false">
          Pasajes
        </button>
      </li>
      <li class="nav-item flex-fill text-center" role="presentation">
        <button class="nav-link" id="encomiendas-tab"
                data-bs-toggle="tab" data-bs-target="#encomiendas"
                type="button" role="tab" aria-controls="encomiendas"
                aria-selected="false">
          Encomiendas y Giros
        </button>
      </li>
      <li class="nav-item flex-fill text-center" role="presentation">
        <button class="nav-link" id="baselegal-tab"
                data-bs-toggle="tab" data-bs-target="#baselegal"
                type="button" role="tab" aria-controls="baselegal"
                aria-selected="false">
          Base Legal
        </button>
      </li>
    </ul>

    <div class="tab-content" id="terminosTabsContent">
      <div class="tab-pane fade show active" id="compra"
           role="tabpanel" aria-labelledby="compra-tab">
        <!-- Aquí se inyectará el contenido de "COMPRAS EN INTERNET" -->
      </div>
      <div class="tab-pane fade" id="pasajes"
           role="tabpanel" aria-labelledby="pasajes-tab">
        <!-- Aquí se inyectará el contenido de "PASAJES" -->
      </div>
      <div class="tab-pane fade" id="encomiendas"
           role="tabpanel" aria-labelledby="encomiendas-tab">
        <!-- Aquí se inyectará el contenido de "ENCOMIENDAS" -->
      </div>
      <div class="tab-pane fade" id="baselegal"
           role="tabpanel" aria-labelledby="baselegal-tab">
        <!-- Aquí se inyectará el contenido de "BASE LEGAL" -->
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap Bundle (Popper + JS) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener("DOMContentLoaded", () => {
  const url = "/ecommerce/home/ApiTerminosCondicionesActivo";
  const mapping = {
    "COMPRAS EN INTERNET": "#compra",
    "PASAJES":             "#pasajes",
    "ENCOMIENDAS":         "#encomiendas",
    "BASE LEGAL":          "#baselegal"
  };

  fetch(url)
    .then(res => res.json())
    .then(resp => {
      if (resp.Status !== "success") {
        console.error(resp.Msj);
        return;
      }
      resp.data.forEach(item => {
        const selector = mapping[item.seccion];
        if (!selector) return;
        // inyectamos el texto con <pre> para conservar saltos de línea
        document.querySelector(selector).innerHTML = 
          `<pre style="white-space: pre-wrap; word-wrap: break-word;">${item.contenido}</pre>`;
      });
    })
    .catch(err => console.error("Error al cargar términos:", err));
});
</script>
{% endblock %}
