<style>
    .tab-link:not(.active):not(.disabled) {
        background-color: #557cc0;
        /* color suave azul */
        color: #ffffff;
    }

    .tab-link.active {
        background-color: #557cc0;
        color: #ffffff;
        animation: saltoActivo 0.8s ease-in-out infinite alternate;
    }

    /* Animación rebote */
    @keyframes saltoActivo {
        0% {
            transform: translateY(0px);
        }

        100% {
            transform: translateY(-5px);
        }
    }


    .step {
        display: none;
        padding: 1rem;
        transition: opacity 0.3s ease;
    }

    .step.active {
        display: block;
    }

    .tab-link {
        position: relative;
    }

    .tab-link.disabled {
        pointer-events: none;
        background-color: var(--primary-color);
        color: rgb(255, 255, 255) !important;
        cursor: default;
    }

    .tab-link.disabled::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.6);
        border-radius: inherit;
    }

    .tab-link.active {
        background-color: var(--primary-color);
        color: white;
    }

    .hidden {
        display: none !important;
    }
</style>

<script>
    // Verificar si estamos en la página miPasajeOp y deshabilitar código promocional
    document.addEventListener("DOMContentLoaded", function() {
        // Verificar si estamos en miPasajeOp.html por la URL o por elementos específicos de esa página
        const currentPath = window.location.pathname;
        const isInMiPasajeOp = currentPath.includes('miPasajeOp') || 
                              document.getElementById('comprobante') !== null || // Elemento específico de miPasajeOp
                              document.getElementById('pasCod') !== null; // Otro elemento específico de miPasajeOp
        
        if (isInMiPasajeOp) {
            const codigoPromocionDiv = document.getElementById('codigoPromocion');
            if (codigoPromocionDiv) {
                // Ocultar completamente el div
                codigoPromocionDiv.style.display = 'none';
                console.log('Código promocional deshabilitado en miPasajeOp');
            }
        }
    });

    function actualizarProgressBarContactoPago(etapa) {
        const barra = document.getElementById("progress-bar-contacto-pago");
        if (!barra) return;

        if (etapa === "contacto") {
            barra.style.width = "0%";
            barra.setAttribute("aria-valuenow", "0");
            barra.textContent = "Contacto";
        } else if (etapa === "pago") {
            barra.style.width = "100%";
            barra.setAttribute("aria-valuenow", "100");
            barra.textContent = "Pago";
        }
    }

    // Eventos del acordeón
    document.addEventListener("DOMContentLoaded", () => {
        const contacto = document.getElementById("collapseContacto");
        const pago = document.getElementById("collapsePago");

        contacto.addEventListener("show.bs.collapse", () => {
            actualizarProgressBarContactoPago("contacto");
        });

        pago.addEventListener("show.bs.collapse", () => {
            actualizarProgressBarContactoPago("pago");
        });

        // Por si carga en contacto abierto
        actualizarProgressBarContactoPago("contacto");
    });
</script>
