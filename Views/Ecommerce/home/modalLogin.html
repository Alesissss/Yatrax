<!-- Modal del Login - Versión corregida para AJAX -->
<style>
  /* Estructura para el modal - Forzamos la visibilidad */
  .modal-login {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    background: rgba(0, 0, 0, 0.6) !important;
    backdrop-filter: blur(5px) !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    z-index: 9999 !important;
    padding: 20px !important;
    animation: modalFadeIn 0.3s ease-out !important;
  }

  @keyframes modalFadeIn {
    from {
      opacity: 0;
      backdrop-filter: blur(0px);
    }
    to {
      opacity: 1;
      backdrop-filter: blur(5px);
    }
  }

  /* Contenedor principal del modal */
  .container_log {
    background-color: white !important;
    border-radius: 20px !important;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15) !important;
    width: 100% !important;
    max-width: 900px !important;
    display: flex !important;
    overflow: hidden !important;
    position: relative !important;
    backdrop-filter: blur(10px) !important;
    border: 1px solid rgba(255, 255, 255, 0.2) !important;
    animation: slideIn 0.4s ease-out !important;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
    margin: auto !important;
  }

  @keyframes slideIn {
    from {
      opacity: 0;
      transform: scale(0.9) translateY(20px);
    }
    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  .left_log {
    position: relative !important;
    width: 50% !important;
    background: linear-gradient(45deg, #0C336E, #1a4a8a) !important;
    background-image: url("{{url_for('static',filename='img/login_pc.jpg')}}") !important;
    background-size: cover !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    overflow: hidden !important;
    min-height: 550px !important;
  }

  .left_log::before {
    content: '' !important;
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 0 !important;
    background: rgba(12, 51, 110, 0.7) !important;
    z-index: 1 !important;
  }

  .left-content {
    position: relative !important;
    z-index: 2 !important;
    text-align: center !important;
    color: white !important;
    padding: 40px !important;
  }

  .left-content i {
    font-size: 70px !important;
    margin-bottom: 25px !important;
    opacity: 0.9 !important;
  }

  .left-content h2 {
    font-size: 26px !important;
    margin-bottom: 15px !important;
    font-weight: 300 !important;
  }

  .left-content p {
    font-size: 15px !important;
    opacity: 0.9 !important;
    line-height: 1.6 !important;
  }

  .right_log {
    width: 50% !important;
    padding: 50px 40px !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
    background: linear-gradient(to bottom, #ffffff, #f8fafc) !important;
    position: relative !important;
  }

  .close {
    position: absolute !important;
    top: 20px !important;
    right: 20px !important;
    background: none !important;
    border: none !important;
    color: #718096 !important;
    font-size: 24px !important;
    cursor: pointer !important;
    outline: none !important;
    width: 40px !important;
    height: 40px !important;
    border-radius: 50% !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    transition: all 0.3s ease !important;
    z-index: 10 !important;
  }

  .close:hover {
    background: #f7fafc !important;
    color: #0C336E !important;
    transform: rotate(90deg) !important;
  }

  .subtitulo {
    color: #2d3748 !important;
    margin-bottom: 15px !important;
    font-size: 28px !important;
    font-weight: 600 !important;
    background: linear-gradient(135deg, #0C336E, #1a4a8a) !important;
    -webkit-background-clip: text !important;
    -webkit-text-fill-color: transparent !important;
    background-clip: text !important;
  }

  .descripcion {
    color: #718096 !important;
    margin-bottom: 35px !important;
    line-height: 1.6 !important;
    font-size: 15px !important;
  }

  .input-group {
    position: relative !important;
    margin-bottom: 25px !important;
  }

  .input-group i {
    position: absolute !important;
    left: 18px !important;
    top: 50% !important;
    transform: translateY(-50%) !important;
    color: #0C336E !important;
    font-size: 16px !important;
    z-index: 2 !important;
  }

  .entrada {
    width: 100% !important;
    padding: 18px 18px 18px 55px !important;
    border: 2px solid #e2e8f0 !important;
    border-radius: 12px !important;
    font-size: 16px !important;
    outline: none !important;
    transition: all 0.3s ease !important;
    background: white !important;
    box-sizing: border-box !important;
    font-family: inherit !important;
  }

  .entrada:focus {
    border-color: #0C336E !important;
    box-shadow: 0 0 0 3px rgba(12, 51, 110, 0.1) !important;
    transform: translateY(-2px) !important;
  }

  .entrada::placeholder {
    color: #a0aec0 !important;
  }

  .forgot {
    display: block !important;
    margin: 10px 0 25px 0 !important;
    text-align: right !important;
    color: #718096 !important;
    font-size: 14px !important;
    text-decoration: none !important;
    transition: all 0.3s ease !important;
  }

  .forgot:hover {
    color: #0C336E !important;
    text-decoration: underline !important;
  }

  .login-btn {
    background: linear-gradient(135deg, #0C336E, #1a4a8a) !important;
    color: white !important;
    border: none !important;
    padding: 18px 30px !important;
    border-radius: 12px !important;
    font-size: 16px !important;
    font-weight: 600 !important;
    cursor: pointer !important;
    transition: all 0.3s ease !important;
    margin-bottom: 25px !important;
    position: relative !important;
    overflow: hidden !important;
    width: 100% !important;
  }

  .login-btn::before {
    content: '' !important;
    position: absolute !important;
    top: 0 !important;
    left: -100% !important;
    width: 100% !important;
    height: 100% !important;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent) !important;
    transition: left 0.5s !important;
  }

  .login-btn:hover::before {
    left: 100% !important;
  }

  .login-btn:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 10px 25px rgba(12, 51, 110, 0.4) !important;
  }

  .divider {
    height: 1px !important;
    background: linear-gradient(to right, transparent, #e2e8f0, transparent) !important;
    margin: 25px 0 20px 0 !important;
  }

  .social-login {
    text-align: center !important;
  }

  .social-login p {
    color: #718096 !important;
    margin-bottom: 15px !important;
    font-size: 14px !important;
  }

  .icons {
    display: flex !important;
    justify-content: center !important;
    gap: 15px !important;
  }

  .icons img {
    width: 40px !important;
    height: 40px !important;
    cursor: pointer !important;
    transition: all 0.3s ease !important;
    border-radius: 50% !important;
    padding: 8px !important;
    background: #f7fafc !important;
    border: 1px solid #e2e8f0 !important;
  }

  .icons img:hover {
    transform: translateY(-3px) !important;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1) !important;
    background: white !important;
  }

  /* Responsive Design */
  @media (max-width: 768px) {
    .modal-login {
      padding: 10px !important;
    }

    .container_log {
      flex-direction: column !important;
      max-width: 400px !important;
      border-radius: 15px !important;
    }

    .left_log {
      width: 100% !important;
      min-height: 200px !important;
      background-image: url("{{url_for('static',filename='img/login_celular.jpg')}}") !important;
    }

    .left-content h2 {
      font-size: 22px !important;
    }

    .left-content p {
      font-size: 14px !important;
    }

    .left-content i {
      font-size: 50px !important;
      margin-bottom: 15px !important;
    }

    .right_log {
      width: 100% !important;
      padding: 35px 25px !important;
    }

    .subtitulo {
      font-size: 24px !important;
    }

    .descripcion {
      font-size: 14px !important;
    }

    .close {
      top: 15px !important;
      right: 15px !important;
      font-size: 20px !important;
    }
  }

  @media (max-width: 480px) {
    .right_log {
      padding: 25px 20px !important;
    }

    .subtitulo {
      font-size: 22px !important;
    }

    .entrada, .login-btn {
      padding: 15px 15px 15px 50px !important;
    }

    .icons img {
      width: 35px !important;
      height: 35px !important;
    }
  }
</style>
