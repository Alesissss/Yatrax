<!-- Modal del Login -->
<style>
  /* Estructura para el modal */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    justify-content: center;
    align-items: center;
    z-index: 1000;
    /* Asegura que esté por encima de otros elementos */
  }

  /* Contenedor principal del modal */
  .container_log {
    box-sizing: border-box;
    padding: 0;
    font-family: "Segoe UI", sans-serif;
    display: flex;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    width: 90%;
    /* Ancho por defecto para pantallas más grandes */
    max-width: 1000px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    margin: 20px;
    /* Añade un poco de margen alrededor */
  }

  .left_log {
    flex: 1;
    background-image: url("{{url_for('static',filename='img/login_pc.jpg')}}");
    background-size: 100% 100%;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }

  .illustration {
    width: 90%;
    max-width: 400px;
  }

  .right_log {
    flex: 1;
    padding: 40px;
    position: relative;
  }

  .close {
    position: absolute;
    top: 10px;
    right: 15px;
    background: none;
    border: none;
    color: #888;
    font-size: 20px;
    cursor: pointer;
    outline: none;
  }

  .close:hover {
    color: #555;
  }

  .close span {
    line-height: 1;
    /* Ajusta la altura de línea para centrar la 'x' verticalmente */
  }

  .subtitulo {
    margin-bottom: 25px;
    color: #0a2b66;
  }

  .input-group {
    margin-bottom: 20px;
  }

  .entrada {
    width: 100%;
    padding: 15px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 16px;
  }

  .forgot {
    display: block;
    margin: 10px 0;
    text-align: right;
    color: #444;
    font-size: 14px;
  }

  .login-btn {
    width: 100%;
    padding: 15px;
    background: #0056b3;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
  }

  .login-btn:hover {
    background: #004194;
  }

  .social-login {
    text-align: center;
    margin-top: 25px;
  }

  .icons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
  }

  .icons img {
    width: 30px;
    height: 30px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .icons img:hover {
    transform: scale(1.1);
  }

  /* Responsive Design */
  @media (max-width: 992px) {
    .container_log {
      flex-direction: column;
      border-radius: 10px;
      /* Reduce un poco el radio en pantallas pequeñas */
      width: 85%;
      /* Ocupa un porcentaje del ancho */
      max-width: 400px;
      /* Limita el ancho máximo en móviles */
      height: 90%;
      /* Ajusta la altura al contenido */
      margin: 30px auto;
      /* Centra horizontalmente y añade margen vertical */
    }


    .left_log {
      background-image: url("{{url_for('static',filename='img/login_celular.jpg')}}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .left_log,
    .right_log {
      width: 100%;
      padding: 20px;
      /* Reduce el padding en móviles */
    }

    .illustration {
      max-width: 200px;
      /* Reduce el tamaño de la ilustración en móviles */
    }
  }

  @media (max-width: 576px) {
    .container_log {
      width: 95%;
      /* Ocupa aún más ancho en pantallas muy pequeñas */
      margin: 15px auto;
    }

    .right_log {
      padding: 15px;
    }

    .login-btn {
      padding: 12px;
    }

    .entrada {
      padding: 12px;
    }

    .illustration {
      max-width: 150px;
    }

    .left_log {
      height: 400px;
    }
  }

  /* Estilos adicionales para el overlay del modal (si no los tenías) */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  .modal {
    animation: fadeIn 0.3s ease-out;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: scale(0.95);
    }

    to {
      opacity: 1;
      transform: scale(1);
    }
  }
</style>
<div class="container_log">

  <div class="left_log">
    <!-- <img src="{{ url_for('static', filename='img/login_imagen.png') }}" alt="Autobús y persona" class="illustration" /> -->
  </div>
  <div class="right_log">
    <button type="button" id="closeModal" class="close" data-dismiss="modal" aria-label="Close">
      <span>×</span>
    </button>
    <h2 class="subtitulo">Inicio de Sesión</h2>
    <form>
      <div class="input-group">
        <input class="entrada" type="email" placeholder="Correo Electrónico" required />
      </div>
      <div class="input-group">
        <input class="entrada" type="password" placeholder="Contraseña" required />
      </div>
      <a href="#" class="forgot" onclick="fct_forgotPass(event)">¿Olvidaste tu contraseña?</a>
      <button type="submit" class="login-btn">Iniciar Sesión</button>
    </form>
    <div class="social-login">
      <p>o inicia sesión con</p>
      <div class="icons">
        <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" alt="Google" />
        <img src="https://cdn-icons-png.flaticon.com/512/732/732221.png" alt="Outlook" />
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook" />
        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="Twitter" />
      </div>
    </div>
  </div>
</div>

<script>
  function fct_forgotPass(event) {
    event.preventDefault(); // Previene el salto o recarga por el href="#"
    window.location.href = '/ecommerce/home/forgotPass';
  }
</script>
