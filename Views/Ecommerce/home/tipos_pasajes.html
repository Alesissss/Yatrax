{% extends "maestra.html" %}
{% block titulo %}YATRAX - Tipos de pasajes{% endblock %}
{% block contenido %}
<style>
    .back {
        background: linear-gradient(135deg, #1e88e5, #0d47a1);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .contenedor {
        background-color: white;
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 1100px;
        display: flex;
        overflow: hidden;
        position: relative;
    }

    .left_f {
        position: relative;
        width: 50%;
        background-image: url("{{url_for('static',filename='img/forgotPass.jpg')}}");
        background-size: 100% 100%;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
    }

    .right_f {
        width: 50%;
        padding: 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .sub_01 {
        color: #333;
        margin-bottom: 20px;
        font-size: 32px;
    }

    .descrip {
        color: #666;
        margin-bottom: 30px;
        line-height: 1.6;
        font-size: 16px;
    }

    .input-contenedor {
        position: relative;
        margin-bottom: 30px;
    }

    .input-contenedor i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #1976d2;
    }

    input {
        width: 100%;
        padding: 15px 15px 15px 50px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.3s;
    }

    input:focus {
        border-color: #1976d2;
    }

    .send-button {
        background-color: #1976d2;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s;
        margin-bottom: 30px;
    }

    .send-button:hover {
        background-color: #1565c0;
    }

    .divider {
        height: 1px;
        background-color: #ddd;
        margin: 20px 0;
    }

    .back-link {
        display: flex;
        align-items: center;
        color: #666;
        text-decoration: none;
        font-size: 16px;
    }

    .back-link:hover {
        color: #1976d2;
    }

    .back-link i {
        margin-right: 8px;
    }

    @media (max-width: 768px) {
        .contenedor {
            flex-direction: column;
        }

        .left_f {
            width: 100%;
            height: 300px;
        }

        .right_f {
            width: 100%;
        }
    }
</style>

<main class="back">
    <div class="contenedor">
        <div class="left_f">
        </div>

        <div class="right_f">
            <h1 class="sub_01">¿Olvidaste tu contraseña?</h1>
            <p class="descrip">Ingresa tu correo electrónico y te enviaremos instrucciones para restablecer tu
                contraseña.</p>

            <div class="input-contenedor">
                <i>✉️</i>
                <input type="email" placeholder="Correo Electrónico">
            </div>

            <button class="send-button">Enviar instrucciones</button>

            <div class="divider"></div>

            <a href="#" class="back-link">
                <i>←</i>
                Volver al inicio de sesión
            </a>
        </div>
    </div>
</main>

{% endblock %}
