<body class="hold-transition login-page" style="background-image: url('/Static/img/WallpaperLogin.jpeg'); background-size: cover;">
    <div class="login-box">
        <div class="login-logo">
            <b>Iniciar</b> sesión
        </div>
        <div class="card">
            <div class="card-body login-card-body">
                <p class="login-box-msg">Ingresa tus credenciales</p>
                <div class="mb-1">
                    <div class="input-group mb-3">
                        <input type="text" name="email" id="txt_Email" class="form-control" placeholder="Email" required>
                        <div class="input-group-append">
                            <div class="input-group-text">
                                <span class="fas fa-user"></span>
                            </div>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <input type="password" name="password" id="txt_Password" class="form-control" placeholder="Contraseña" required>
                        <div class="input-group-append">
                            <div class="input-group-text">
                                <span class="fas fa-lock"></span>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <button type="button" class="btn btn-primary btn-block" id="btn_Login">Ingresar</button>
                        </div>
                    </div>
                </div>
                <p class="mb-1">
                    <a href="forgot-password.html">Olvidé mi contraseña</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>

<script src="/Static/js/jquery.min.js"></script>

<script>
    $(document).ready(function () {
        $('#btn_Login').on('click', function () {
            if ($('#txt_Email').val().trim() === '' || $('#txt_Password').val().trim() === '') {
                toastr.warning('Debe ingresar sus credenciales de acceso', 'MENSAJE DE SISTEMA');
                return;
            } else {
                $.ajax({
                    url: '/trabajadores/home/login',
                    type: 'POST',
                    contentType: 'application/json', // Importante para indicar que es JSON
                    data: JSON.stringify({
                        email: $('#txt_Email').val().trim(),
                        password: $('#txt_Password').val().trim()
                    }),
                    success: function (response) {
                        if (response.Status === 'success') {
                            $('#btn_Login').prop('disabled', true);
                            toastr.success(response.Msj, 'MENSAJE DE SISTEMA');
                            setTimeout(() => {
                                window.location.href = '/trabajadores/home/inicio';
                            }, 500);
                        } else {
                            toastr.error(response.Msj, 'MENSAJE DE SISTEMA');
                        }
                    },
                    error: function (xhr, Status, error) {
                        toastr.error('Error en el servidor', 'MENSAJE DE SISTEMA');
                        console.error('Error en el servidor: ' + error);
                    }
                });

                //EN CASO DE QUE PREFIERES USAR FORMDATA (EN EL SERVIDOR DEBES RECIBIR UN REQUEST.FORM, YA NO UN REQUEST.JSON)
                // let formData = new FormData();
                // formData.append('email', $('#txt_Email').val().trim());
                // formData.append('password', $('#txt_Password').val().trim());

                // $.ajax({
                //     url: '/login',
                //     type: 'POST',
                //     data: formData,
                //     processData: false, // Evita que jQuery convierta el FormData en string
                //     contentType: false, // Indica que no se está enviando JSON
                //     success: function (response) {
                //         if (response.Status === 'success') {
                //             toastr.success(response.Msj, 'MENSAJE DE SISTEMA');
                //             window.location.href = '/home';
                //         } else {
                //             toastr.error(response.Msj, 'MENSAJE DE SISTEMA');
                //         }
                //     },
                //     error: function () {
                //         toastr.error('Error en el servidor', 'MENSAJE DE SISTEMA');
                //     }
                // });

            }
        });
    });
</script>
