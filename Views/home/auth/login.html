<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YATRAX - Iniciar Sesión</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='/img/icono_yatrax.ico') }}">

    <!-- AdminLTE -->
    <link rel="stylesheet" href="/Static/css/adminlte.min.css">
    <link rel="stylesheet" href="/Static/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="/Static/plugins/sweetalert2-theme-bootstrap-4/bootstrap-4.min.css">
    <!-- Toastr -->
    <link rel="stylesheet" href="/Static/plugins/toastr/toastr.min.css">
    <!-- Select2 -->
    <link rel="stylesheet" href="/Static/plugins/select2/css/select2.min.css">
    <link rel="stylesheet" href="/Static/plugins/select2-bootstrap4-theme/select2-bootstrap4.min.css">
    <!-- Tempusdominus Bootstrap 4 -->
    <link rel="stylesheet" href="/Static/plugins/tempusdominus-bootstrap-4/css/tempusdominus-bootstrap-4.min.css">
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700">
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Source Sans Pro', sans-serif;
            min-height: 100vh;
            background-image: url('/Static/img/WallpaperLogin.jpeg');
            /* background-color: #c1c7d8; */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            height: auto;
            min-height: 600px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            animation: slideIn 0.8s ease-out;
            margin: auto;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Left Side - Illustration */
        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #06b6d4 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            color: white;
            text-align: center;
        }

        .left-side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(30, 64, 175, 0.9) 0%, rgba(59, 130, 246, 0.8) 50%, rgba(6, 182, 212, 0.7) 100%);
            z-index: 1;
        }

        .illustration {
            position: relative;
            z-index: 2;
            margin-bottom: 30px;
        }

        .user-icon {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .user-icon i {
            font-size: 48px;
            color: white;
        }

        .shield-icon {
            position: absolute;
            bottom: -10px;
            right: -10px;
            width: 40px;
            height: 40px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
        }

        .shield-icon i {
            font-size: 18px;
            color: white;
        }

        .bus-illustration {
            width: 100%;
            max-width: 300px;
            margin: 20px 0;
            opacity: 0.3;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            position: relative;
            z-index: 2;
        }

        .welcome-subtitle {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.5;
            position: relative;
            z-index: 2;
        }

        /* Right Side - Form */
        .right-side {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 40px;
            margin: initial;
            text-align: center;
        }

        .form-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: #64748b;
            font-size: 15px;
            margin: revert;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8fafc;
            color: #1e293b;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            transform: translateY(-1px);
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s ease;
            font-size: 16px;
        }

        .form-input:focus ~ .input-icon {
            color: #3b82f6;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            margin-bottom: 24px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .forgot-password {
            text-align: center;
        }

        .forgot-password a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #1e40af;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .login-container {
                flex-direction: column;
                width: 100%;
                max-width: 500px;
                height: auto;
                min-height: auto;
            }
            
            .left-side {
                padding: 30px 20px;
                min-height: 250px;
            }
            
            .welcome-title {
                font-size: 24px;
            }
            
            .welcome-subtitle {
                font-size: 14px;
            }
            
            .user-icon {
                width: 80px;
                height: 80px;
            }
            
            .user-icon i {
                font-size: 32px;
            }
            
            .right-side {
                padding: 30px 25px;
            }
            
            .form-title {
                font-size: 24px;
            }
        }

        /* Toast customization */
        .toast-success {
            background-color: #10b981 !important;
        }
        
        .toast-error {
            background-color: #ef4444 !important;
        }
        
        .toast-warning {
            background-color: #f59e0b !important;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <!-- Left Side - Illustration -->
        <div class="left-side">
            <div class="illustration">
                <div class="user-icon">
                    <i class="fas fa-user"></i>
                    <div class="shield-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                </div>
                
                <!-- Bus illustration using font awesome -->
                <div class="bus-illustration">
                    <i class="fas fa-bus" style="font-size: 120px; opacity: 0.2; color: white;"></i>
                </div>
            </div>
            
            <h1 class="welcome-title">Bienvenido de vuelta</h1>
            <p class="welcome-subtitle">
                Inicia sesión en tu cuenta para acceder a todas las funcionalidades de YATRAX.
            </p>
        </div>

        <!-- Right Side - Form -->
        <div class="right-side">
            <div class="form-header">
                <h2 class="form-title">Inicio de sesión</h2>
                <p class="form-subtitle">Ingresa tus credenciales para acceder a tu cuenta de forma segura.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="txt_Email" name="email" class="form-input" placeholder="ejemplo@gmail.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" id="txt_Password" name="password" class="form-input" placeholder="••••••••••" required>
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                </div>

                <button type="button" id="btn_Login" class="login-btn">
                    <div class="btn-content">
                        <div class="spinner" id="loginSpinner"></div>
                        <i class="fas fa-sign-in-alt" id="loginIcon"></i>
                        <span id="loginText">Iniciar sesión</span>
                    </div>
                </button>
            </form>

            <div class="forgot-password">
                <a href="{{ url_for('home.cambiarContrasena') }}">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- jQuery -->
    <script src="/Static/js/jquery.min.js"></script>
    <!-- Bootstrap JS -->
    <!-- AdminLTE JS -->
    <script src="/Static/js/adminlte.min.js"></script>

    <!-- Moment.js (para formateo de fechas) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="/Static/plugins/sweetalert2/sweetalert2.min.js"></script>
    <!-- Toastr -->
    <script src="/Static/plugins/toastr/toastr.min.js"></script>
    <!-- Select2 -->
    <script src="/Static/plugins/select2/js/select2.full.min.js"></script>
    <!-- InputMask -->
    <script src="/Static/plugins/inputmask/jquery.inputmask.min.js"></script>
    <!-- Tempusdominus Bootstrap 4 -->
    <script src="/Static/plugins/moment/moment.min.js"></script>
    <script src="/Static/plugins/tempusdominus-bootstrap-4/js/tempusdominus-bootstrap-4.min.js"></script>

    <script>
        // Toastr configuration
        toastr.options = {
            "closeButton": true,
            "debug": false,
            "newestOnTop": true,
            "progressBar": true,
            "positionClass": "toast-top-right",
            "preventDuplicates": false,
            "onclick": null,
            "showDuration": "300",
            "hideDuration": "1000",
            "timeOut": "5000",
            "extendedTimeOut": "1000",
            "showEasing": "swing",
            "hideEasing": "linear",
            "showMethod": "fadeIn",
            "hideMethod": "fadeOut"
        };

        $(document).ready(function () {
            // Enter key support
            $('.form-input').on('keypress', function(e) {
                if (e.which === 13) {
                    $('#btn_Login').click();
                }
            });

            // Input focus effects
            $('.form-input').on('focus', function() {
                $(this).closest('.input-wrapper').addClass('focused');
            }).on('blur', function() {
                $(this).closest('.input-wrapper').removeClass('focused');
            });

            $('#btn_Login').on('click', function () {
                const email = $('#txt_Email').val().trim();
                const password = $('#txt_Password').val().trim();

                if (email === '' || password === '') {
                    toastr.warning('Debe ingresar sus credenciales de acceso', 'MENSAJE DE SISTEMA');
                    return;
                }

                // Email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    toastr.warning('Por favor, ingresa un correo electrónico válido', 'Email inválido');
                    return;
                }

                // Show loading state
                const btn = $(this);
                const spinner = $('#loginSpinner');
                const text = $('#loginText');
                const icon = $('#loginIcon');

                btn.prop('disabled', true);
                spinner.show();
                text.text('Verificando...');
                icon.hide();

                $.ajax({
                    url: '/trabajadores/home/login',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        email: email,
                        password: password
                    }),
                    success: function (response) {
                        if (response.Status === 'success') {
                            $('#btn_Login').prop('disabled', true);
                            toastr.success(response.Msj, 'MENSAJE DE SISTEMA');
                            
                            // Success animation
                            text.text('¡Acceso concedido!');
                            spinner.hide();
                            icon.removeClass('fa-sign-in-alt').addClass('fa-check').show();
                            
                            setTimeout(() => {
                                window.location.href = '/trabajadores/home/inicio';
                            }, 500);
                        } else {
                            toastr.error(response.Msj, 'MENSAJE DE SISTEMA');
                            resetButton();
                        }
                    },
                    error: function (xhr, Status, error) {
                        toastr.error('Error en el servidor', 'MENSAJE DE SISTEMA');
                        console.error('Error en el servidor: ' + error);
                        resetButton();
                    }
                });

                function resetButton() {
                    btn.prop('disabled', false);
                    spinner.hide();
                    text.text('Iniciar sesión');
                    icon.removeClass('fa-check').addClass('fa-sign-in-alt').show();
                }
            });
        });
    </script>
</body>

</html>
