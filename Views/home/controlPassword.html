<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YATRAX - Recuperacion de acceso</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='/img/icono_yatrax.ico') }}">

    <!-- AdminLTE -->
    <link rel="stylesheet" href="/Static/css/adminlte.min.css">
    <link rel="stylesheet" href="/Static/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="/Static/plugins/sweetalert2-theme-bootstrap-4/bootstrap-4.min.css">
    <!-- Toastr -->
    <link rel="stylesheet" href="/Static/plugins/toastr/toastr.min.css">
    <!-- Select2 -->
    <link rel="stylesheet" href="/Static/plugins/select2/css/select2.min.css">
    <link rel="stylesheet" href="/Static/plugins/select2-bootstrap4-theme/select2-bootstrap4.min.css">
    <!-- Tempusdominus Bootstrap 4 -->
    <link rel="stylesheet" href="/Static/plugins/tempusdominus-bootstrap-4/css/tempusdominus-bootstrap-4.min.css">
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700">
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Source Sans Pro', sans-serif;
            min-height: 100vh;
            background-image: url('/Static/img/WallpaperLogin.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            display: flex;
            width: 100%;
            max-width: 900px;
            height: auto;
            min-height: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Left Side - Blue Section */
        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #4F46E5 0%, #06B6D4 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 40px;
            color: white;
            text-align: center;
            position: relative;
        }

        .icon-container {
            width: 100px;
            height: 100px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
        }

        .main-icon {
            font-size: 40px;
            color: white;
        }

        .badge-icon {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 35px;
            height: 35px;
            background: #10B981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
        }

        .badge-icon i {
            font-size: 16px;
            color: white;
        }

        .main-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .main-subtitle {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.5;
            max-width: 280px;
        }

        /* Right Side - Form */
        .right-side {
            flex: 1;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 40px;
            margin: initial;
            text-align: center;
        }

        .form-title {
            font-size: 24px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: #6B7280;
            font-size: 14px;
            line-height: 1.5;
            margin: revert;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            color: #9CA3AF;
            z-index: 2;
            font-size: 16px;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px 16px 45px;
            border: 1px solid #D1D5DB;
            border-radius: 12px;
            font-size: 16px;
            background: #F9FAFB;
            color: #1F2937;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #4F46E5;
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-input::placeholder {
            color: #9CA3AF;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #4F46E5;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover {
            background: #4338CA;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-link {
            text-align: center;
        }

        .back-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .back-link a:hover {
            color: #307bf5; 
            text-decoration: underline;
        }

        /* .back-to-recovery {
            text-align: center;
        }

        .back-to-recovery a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-to-recovery a:hover {
            color: #5b21b6;
            text-decoration: underline;
        } */

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .login-container {
                flex-direction: column;
                max-width: 400px;
                min-height: auto;
            }
            
            .left-side {
                padding: 40px 30px 30px;
            }
            
            .main-title {
                font-size: 24px;
            }
            
            .main-subtitle {
                font-size: 14px;
            }
            
            .icon-container {
                width: 80px;
                height: 80px;
                margin-bottom: 20px;
            }
            
            .main-icon {
                font-size: 32px;
            }
            
            .badge-icon {
                width: 28px;
                height: 28px;
            }
            
            .badge-icon i {
                font-size: 14px;
            }
            
            .right-side {
                padding: 30px 25px;
            }
            
            .form-title {
                font-size: 20px;
            }
        }

        /* Toast customization */
        .toast-success {
            background-color: #10b981 !important;
        }
        
        .toast-error {
            background-color: #ef4444 !important;
        }
        
        .toast-warning {
            background-color: #f59e0b !important;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <!-- Left Side - Blue Section -->
        <div class="left-side">
            <div class="icon-container">
                <i class="fas fa-shield-alt main-icon"></i>
                <div class="badge-icon">
                    <i class="fas fa-check"></i>
                </div>
            </div>
            
            <h1 class="main-title">Código de verificación</h1>
            <p class="main-subtitle">
                Ingresa el código enviado a tu correo electrónico para verificar tu identidad.
            </p>
        </div>

        <!-- Right Side - Form -->
        <div class="right-side">
            <div class="form-header">
                <h2 class="form-title">Verificar código</h2>
                <p class="form-subtitle">Introduce el código de verificación que enviamos a tu correo electrónico.</p>
            </div>

            <form id="verificationForm">
                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-key input-icon"></i>
                        <input type="text" id="txt_codigoVerificacion" name="codigo" class="form-input" placeholder="Introduzca la clave enviada" required maxlength="6">
                    </div>
                </div>

                <button type="button" id="btn_VerificarCodigo" class="submit-btn">
                    <div class="spinner" id="verifySpinner"></div>
                    <i class="fas fa-unlock-alt" id="verifyIcon"></i>
                    <span id="verifyText">Recuperar contraseña</span>
                </button>

                <!-- <div class="back-to-recovery">
                <a href="{{ url_for('home.cambiarContrasena') if url_for else '/trabajadores/home/cambiarContrasena' }}">
                    <i class="fas fa-arrow-left"></i>
                    Volver a solicitar código
                </a>
                </div> -->
            </form>

            <div class="back-link">
                <a href="{{ url_for('home.login') if url_for else '/trabajadores/home/login' }}">
                    <i class="fas fa-arrow-left"></i>
                    Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="/Static/js/jquery.min.js"></script>
    <!-- Bootstrap JS -->
    <!-- AdminLTE JS -->
    <script src="/Static/js/adminlte.min.js"></script>

    <!-- Moment.js (para formateo de fechas) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="/Static/plugins/sweetalert2/sweetalert2.min.js"></script>
    <!-- Toastr -->
    <script src="/Static/plugins/toastr/toastr.min.js"></script>
    <!-- Select2 -->
    <script src="/Static/plugins/select2/js/select2.full.min.js"></script>
    <!-- InputMask -->
    <script src="/Static/plugins/inputmask/jquery.inputmask.min.js"></script>
    <!-- Tempusdominus Bootstrap 4 -->
    <script src="/Static/plugins/moment/moment.min.js"></script>
    <script src="/Static/plugins/tempusdominus-bootstrap-4/js/tempusdominus-bootstrap-4.min.js"></script>

    <script>
        // Toastr configuration
        toastr.options = {
            "closeButton": true,
            "debug": false,
            "newestOnTop": true,
            "progressBar": true,
            "positionClass": "toast-top-right",
            "preventDuplicates": false,
            "onclick": null,
            "showDuration": "300",
            "hideDuration": "1000",
            "timeOut": "5000",
            "extendedTimeOut": "1000",
            "showEasing": "swing",
            "hideEasing": "linear",
            "showMethod": "fadeIn",
            "hideMethod": "fadeOut"
        };

        $(document).ready(function () {
            // Enter key support
            $('#txt_codigoVerificacion').on('keypress', function(e) {
                if (e.which === 13) {
                    $('#btn_VerificarCodigo').click();
                }
            });

            // Auto format code input (only numbers)
            $('#txt_codigoVerificacion').on('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '');
            });

            $("#btn_VerificarCodigo").click(function(){
                const codigo = $("#txt_codigoVerificacion").val().trim();

                if (codigo === "") {
                    toastr.warning('Ingrese el código de verificación para continuar', 'MENSAJE DE SISTEMA');
                    return;
                }

                if (codigo.length < 4) {
                    toastr.warning('El código debe tener al menos 4 dígitos', 'Código incompleto');
                    return;
                }

                // Show loading state
                const btn = $(this);
                const spinner = $('#verifySpinner');
                const text = $('#verifyText');
                const icon = $('#verifyIcon');

                btn.prop('disabled', true);
                spinner.show();
                text.text('Verificando...');
                icon.hide();

                $.ajax({
                    url: "/trabajadores/home/codigoAcceso",
                    method: "POST",
                    data: {
                        codigo: codigo
                    },
                    success: function(response) {
                        if (response.redirect) {
                            // Success animation
                            text.text('¡Código válido!');
                            spinner.hide();
                            icon.removeClass('fa-unlock-alt').addClass('fa-check').show();
                            
                            toastr.success('Código verificado correctamente', 'MENSAJE DE SISTEMA');
                            
                            setTimeout(() => {
                                window.location.href = response.redirect;
                            }, 500);
                        } else {
                            toastr.error('Código incorrecto', 'MENSAJE DE SISTEMA');
                            resetButton();
                        }
                    },
                    error: function(xhr) {
                        toastr.error('Código incorrecto', 'MENSAJE DE SISTEMA');
                        resetButton();
                    }
                });

                function resetButton() {
                    btn.prop('disabled', false);
                    spinner.hide();
                    text.text('Recuperar contraseña');
                    icon.removeClass('fa-check').addClass('fa-unlock-alt').show();
                }
            });
        });
    </script>
</body>

</html>
