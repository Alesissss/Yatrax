<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YATRAX - Recuperar contraseña</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='/img/icono_yatrax.ico') }}">

    <!-- AdminLTE -->
    <link rel="stylesheet" href="/Static/css/adminlte.min.css">
    <link rel="stylesheet" href="/Static/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="/Static/plugins/sweetalert2-theme-bootstrap-4/bootstrap-4.min.css">
    <!-- Toastr -->
    <link rel="stylesheet" href="/Static/plugins/toastr/toastr.min.css">
    <!-- Select2 -->
    <link rel="stylesheet" href="/Static/plugins/select2/css/select2.min.css">
    <link rel="stylesheet" href="/Static/plugins/select2-bootstrap4-theme/select2-bootstrap4.min.css">
    <!-- Tempusdominus Bootstrap 4 -->
    <link rel="stylesheet" href="/Static/plugins/tempusdominus-bootstrap-4/css/tempusdominus-bootstrap-4.min.css">
    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700">
    
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Source Sans Pro', sans-serif;
            min-height: 100vh;
            background-image: url('/Static/img/WallpaperLogin.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .recovery-container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            height: auto;
            min-height: 600px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            animation: slideIn 0.8s ease-out;
            margin: auto;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Left Side - Illustration */
        .left-side {
            flex: 1;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 50%, #06b6d4 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            color: white;
            text-align: center;
        }

        .left-side::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(30, 64, 175, 0.9) 0%, rgba(59, 130, 246, 0.8) 50%, rgba(6, 182, 212, 0.7) 100%);
            z-index: 1;
        }

        .illustration {
            position: relative;
            z-index: 2;
            margin-bottom: 30px;
        }

        .lock-icon {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .lock-icon i {
            font-size: 48px;
            color: white;
        }

        .key-icon {
            position: absolute;
            bottom: -10px;
            right: -10px;
            width: 40px;
            height: 40px;
            background: #f59e0b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
        }

        .key-icon i {
            font-size: 18px;
            color: white;
        }

        .password-illustration {
            width: 100%;
            max-width: 300px;
            margin: 20px 0;
            opacity: 0.3;
        }

        .welcome-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
            position: relative;
            z-index: 2;
        }

        .welcome-subtitle {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.5;
            position: relative;
            z-index: 2;
        }

        /* Right Side - Form */
        .right-side {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 40px;
            margin: initial;
            text-align: center;
        }

        .form-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .form-subtitle {
            color: #64748b;
            font-size: 15px;
            line-height: 1.5;
            margin: revert;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8fafc;
            color: #1e293b;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: white;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
            transform: translateY(-1px);
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            transition: color 0.3s ease;
            font-size: 16px;
        }

        .form-input:focus ~ .input-icon {
            color: #dc2626;
        }

        .recovery-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1e40af, #3b82f6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
            margin-bottom: 24px;
        }

        .recovery-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.4);
        }

        .recovery-btn:active {
            transform: translateY(0);
        }

        .recovery-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-to-login {
            text-align: center;
        }

        .back-to-login a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-to-login a:hover {
            color: #307bf5;            
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .recovery-container {
                flex-direction: column;
                width: 100%;
                max-width: 500px;
                height: auto;
                min-height: auto;
            }
            
            .left-side {
                padding: 30px 20px;
                min-height: 250px;
            }
            
            .welcome-title {
                font-size: 24px;
            }
            
            .welcome-subtitle {
                font-size: 14px;
            }
            
            .lock-icon {
                width: 80px;
                height: 80px;
            }
            
            .lock-icon i {
                font-size: 32px;
            }
            
            .right-side {
                padding: 30px 25px;
            }
            
            .form-title {
                font-size: 24px;
            }
        }

        /* Toast customization */
        .toast-success {
            background-color: #10b981 !important;
        }
        
        .toast-error {
            background-color: #ef4444 !important;
        }
        
        .toast-warning {
            background-color: #f59e0b !important;
        }
    </style>
</head>

<body>
    <div class="recovery-container">
        <!-- Left Side - Illustration -->
        <div class="left-side">
            <div class="illustration">
                <div class="lock-icon">
                    <i class="fas fa-lock"></i>
                    <div class="key-icon">
                        <i class="fas fa-key"></i>
                    </div>
                </div>
                
                <!-- Password illustration using font awesome -->
                <div class="password-illustration">
                    <i class="fas fa-shield-alt" style="font-size: 120px; opacity: 0.2; color: white;"></i>
                </div>
            </div>
            
            <h1 class="welcome-title">Recuperar Contraseña</h1>
            <p class="welcome-subtitle">
                Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña de forma segura.
            </p>
        </div>

        <!-- Right Side - Form -->
        <div class="right-side">
            <div class="form-header">
                <h2 class="form-title">Cambiar contraseña</h2>
                <p class="form-subtitle">Proporciona tu dirección de correo electrónico registrada y te ayudaremos a recuperar el acceso a tu cuenta.</p>
            </div>

            <form id="recoveryForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" id="correo" name="email" class="form-input" placeholder="ejemplo@gmail.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <button type="button" id="btnValidar" class="recovery-btn">
                    <div class="btn-content">
                        <div class="spinner" id="recoverySpinner"></div>
                        <i class="fas fa-paper-plane" id="recoveryIcon"></i>
                        <span id="recoveryText">Restaurar contraseña</span>
                    </div>
                </button>
            </form>

            <div class="back-to-login">
                <a href="{{ url_for('home.login') if url_for else '/trabajadores/home/login' }}">
                    <i class="fas fa-arrow-left"></i>
                    Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- jQuery -->
    <script src="/Static/js/jquery.min.js"></script>
    <!-- Bootstrap JS -->
    <!-- AdminLTE JS -->
    <script src="/Static/js/adminlte.min.js"></script>

    <!-- Moment.js (para formateo de fechas) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="/Static/plugins/sweetalert2/sweetalert2.min.js"></script>
    <!-- Toastr -->
    <script src="/Static/plugins/toastr/toastr.min.js"></script>
    <!-- Select2 -->
    <script src="/Static/plugins/select2/js/select2.full.min.js"></script>
    <!-- InputMask -->
    <script src="/Static/plugins/inputmask/jquery.inputmask.min.js"></script>
    <!-- Tempusdominus Bootstrap 4 -->
    <script src="/Static/plugins/moment/moment.min.js"></script>
    <script src="/Static/plugins/tempusdominus-bootstrap-4/js/tempusdominus-bootstrap-4.min.js"></script>

    <script>
        // Toastr configuration
        toastr.options = {
            "closeButton": true,
            "debug": false,
            "newestOnTop": true,
            "progressBar": true,
            "positionClass": "toast-top-right",
            "preventDuplicates": false,
            "onclick": null,
            "showDuration": "300",
            "hideDuration": "1000",
            "timeOut": "5000",
            "extendedTimeOut": "1000",
            "showEasing": "swing",
            "hideEasing": "linear",
            "showMethod": "fadeIn",
            "hideMethod": "fadeOut"
        };

        $(document).ready(function () {
            // Enter key support
            $('.form-input').on('keypress', function(e) {
                if (e.which === 13) {
                    $('#btnValidar').click();
                }
            });

            // Input focus effects
            $('.form-input').on('focus', function() {
                $(this).closest('.input-wrapper').addClass('focused');
            }).on('blur', function() {
                $(this).closest('.input-wrapper').removeClass('focused');
            });

            $("#btnValidar").click(function () {
                const correo = $("#correo").val().trim();

                if (correo === "") {
                    toastr.warning('Ingrese un correo para continuar', 'MENSAJE DE SISTEMA');
                    return;
                }

                // Email validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(correo)) {
                    toastr.warning('Por favor, ingresa un correo electrónico válido', 'Email inválido');
                    return;
                }

                // Show loading state
                const btn = $(this);
                const spinner = $('#recoverySpinner');
                const text = $('#recoveryText');
                const icon = $('#recoveryIcon');

                btn.prop('disabled', true);
                spinner.show();
                text.text('Validando...');
                icon.hide();

                $.ajax({
                    url: `/trabajadores/home/validarCorreo/${correo}`,
                    method: "GET",
                    success: function (response) {
                        if (response.Status === 1) {
                            toastr.success('Correo validado con éxito', 'MENSAJE DE SISTEMA');
                            
                            // Success animation
                            text.text('¡Correo válido!');
                            spinner.hide();
                            icon.removeClass('fa-paper-plane').addClass('fa-check').show();
                            
                            setTimeout(() => {
                                window.location.href = "/trabajadores/home/codigoAcceso";
                            }, 500);
                        } else {
                            toastr.error('Ocurrió un error inesperado', 'MENSAJE DE SISTEMA');
                            resetButton();
                        }
                    },
                    error: function (error) {
                        toastr.error('Ocurrió un error al validar el correo', 'MENSAJE DE SISTEMA');
                        console.log("Error:", error);
                        resetButton();
                    }
                });

                function resetButton() {
                    btn.prop('disabled', false);
                    spinner.hide();
                    text.text('Restaurar contraseña');
                    icon.removeClass('fa-check').addClass('fa-paper-plane').show();
                }
            });
        });
    </script>
</body>

</html>
