{% extends "index.html" %}
{% block title %}YATRAX - {{ tittle }}{% endblock %}
{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div id="formTipoReclamo">
                        <div class="mb-3">
                            <label for="txt_Id">ID</label>
                            <input type="text" id="txt_Id" name="id" class="form-control" placeholder="ID del tipo de reclamo" value="" {% if btnId == "btn_Registrar" %}disabled{% endif %}>
                        </div>
                        <div class="mb-3">
                            <label for="txt_Nombre">Nombre</label>
                            <input type="text" id="txt_Nombre" name="nombre" class="form-control" placeholder="Nombre" value="">
                        </div>
                        <div class="mb-3">
                            <label for="txt_Estado">Estado</label>
                            <select id="txt_Estado" name="estado" class="form-control" {% if btnId == "btn_Registrar" %}disabled{% endif %}>
                                <option value="1">Activo</option>
                                <option value="0">Inactivo</option>
                            </select>
                        </div>
                        <div class="text-center">
                            <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de plantillas</button>
                            <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
$("#btn_Volver").click(function(){
    window.location.href="/trabajadores/atencion/GestionarTipoReclamo"
});
$("#btn_Registrar").click(function(){
    var nombre = $("#txt_Nombre").val().trim();
    if(!nombre){
        toastr.warning("El nombre es obligatorio","MENSAJE DE SISTEMA");
        return;
    }
    Swal.fire({
        title:"¿Estás seguro?",
        text:"Esta acción registrará el tipo de reclamo. ¿Deseas continuar?",
        icon:"warning",
        showCancelButton:true,
        confirmButtonColor:"#3085d6",
        cancelButtonColor:"#d33",
        confirmButtonText:"Sí, registrar tipo de reclamo",
        cancelButtonText:"Cancelar",
        reverseButtons:true
    }).then(function(result){
        if(result.isConfirmed){
            var formData = new FormData();
            formData.append("nombre", nombre);
            $.ajax({
                url:"/trabajadores/atencion/RegistrarTipoReclamo",
                type:"POST",
                processData:false,
                contentType:false,
                data:formData,
                success:function(response){
                    if(response.Status==="success"){
                        if(response.Msj2){
                            toastr.warning(response.Msj2,"MENSAJE DE SISTEMA");
                            return;
                        }
                        toastr.success(response.Msj,"MENSAJE DE SISTEMA");
                        setTimeout(function(){
                            window.location.href="/trabajadores/atencion/GestionarTipoReclamo";
                        },500);
                    } else {
                        toastr.error(response.Msj,"MENSAJE DE SISTEMA");
                        console.error("Error: "+response.Msj);
                    }
                },
                error:function(xhr){
                    toastr.error("Error en el servidor","MENSAJE DE SISTEMA");
                    console.error("Error: "+xhr.responseText);
                }
            });
        }
    });
});
</script>
{% endblock %}
