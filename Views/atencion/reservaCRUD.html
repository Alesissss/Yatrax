{% extends "index.html" %}

{% block title %}YATRAX - {{ title }}{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h4 class="text-center mb-0">{{ tittle }}</h4>
        </div>
        <div class="card-body">
          <div class="row">
            <!-- ID (solo lectura en edición/visualización) -->
            <div class="col-md-12 mb-3">
              <label for="txt_Id">ID</label>
              <div class="input-group">
                <input type="text"
                       id="txt_Id"
                       class="form-control"
                       value="{{ reserva.id if reserva is defined else '' }}"
                       readonly>
                <div class="input-group-append">
                  <div class="input-group-text"><i class="fas fa-hashtag"></i></div>
                </div>
              </div>
            </div>

            <!-- Método de Pago -->
            <div class="col-md-12 mb-3">
              <label for="txt_MetodoPago">Método de Pago</label>
              <div class="input-group">
                <input type="number"
                       id="txt_MetodoPago"
                       class="form-control"
                       placeholder="ID Método de Pago"
                       value="{{ reserva.id_metodo_pago if reserva is defined else '' }}"
                       {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                <div class="input-group-append">
                  <div class="input-group-text"><i class="fas fa-credit-card"></i></div>
                </div>
              </div>
            </div>

            <!-- Tipo de Comprobante -->
            <div class="col-md-12 mb-3">
              <label for="txt_TipoComprobante">Tipo de Comprobante</label>
              <div class="input-group">
                <input type="number"
                       id="txt_TipoComprobante"
                       class="form-control"
                       placeholder="ID Tipo de Comprobante"
                       value="{{ reserva.id_tipo_comprobante if reserva is defined else '' }}"
                       {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                <div class="input-group-append">
                  <div class="input-group-text"><i class="fas fa-file-invoice"></i></div>
                </div>
              </div>
            </div>

            <!-- Cliente -->
            <div class="col-md-12 mb-3">
              <label for="txt_Cliente">Cliente</label>
              <div class="input-group">
                <input type="number"
                       id="txt_Cliente"
                       class="form-control"
                       placeholder="ID Cliente"
                       value="{{ reserva.id_cliente if reserva is defined else '' }}"
                       {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                <div class="input-group-append">
                  <div class="input-group-text"><i class="fas fa-user"></i></div>
                </div>
              </div>
            </div>

            <!-- Promoción -->
            <div class="col-md-12 mb-3">
              <label for="txt_Promocion">Promoción</label>
              <div class="input-group">
                <input type="number"
                       id="txt_Promocion"
                       class="form-control"
                       placeholder="ID Promoción"
                       value="{{ reserva.id_promocion if reserva is defined else '' }}"
                       {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                <div class="input-group-append">
                  <div class="input-group-text"><i class="fas fa-tags"></i></div>
                </div>
              </div>
            </div>

            <!-- Viaje -->
            <div class="col-md-12 mb-3">
              <label for="txt_Viaje">Viaje</label>
              <div class="input-group">
                <input type="number"
                       id="txt_Viaje"
                       class="form-control"
                       placeholder="ID Viaje"
                       value="{{ reserva.id_viaje if reserva is defined else '' }}"
                       {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                <div class="input-group-append">
                  <div class="input-group-text"><i class="fas fa-plane"></i></div>
                </div>
              </div>
            </div>

            <!-- Código -->
            <div class="col-md-12 mb-3">
              <label for="txt_Codigo">Código</label>
              <div class="input-group">
                <input type="text"
                       id="txt_Codigo"
                       class="form-control"
                       placeholder="Código de Reserva"
                       value="{{ reserva.codigo if reserva is defined else '' }}"
                       oninput="this.value = this.value.toUpperCase();"
                       {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                <div class="input-group-append">
                  <div class="input-group-text"><i class="fas fa-barcode"></i></div>
                </div>
              </div>
            </div>

            <!-- Estado -->
            <div class="col-md-12 mb-3">
              <label for="cbx_Estado">Estado</label>
              <div class="input-group">
                <select id="cbx_Estado"
                        class="form-control"
                        {% if btnId=='btn_Aceptar' %}disabled{% endif %}>
                  <option disabled value="">--SELECCIONAR--</option>
                  <option value="R"
                    {% if reserva is defined and reserva.estado == 'R' %}selected{% endif %}>
                    En proceso
                  </option>
                  <option value="P"
                    {% if reserva is defined and reserva.estado == 'P' %}selected{% endif %}>
                    Reserva pagada
                  </option>
                </select>
              </div>
            </div>

            <!-- Botones -->
            <div class="col-md-12 text-center">
              <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de reservas</button>
              <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  $(document).ready(function () {
    // Botón Registrar
    $("#btn_Registrar").click(function () {
      // Captura valores
      let metodoPago      = $("#txt_MetodoPago").val().trim();
      let tipoComprobante = $("#txt_TipoComprobante").val().trim();
      let cliente         = $("#txt_Cliente").val().trim();
      let promocion       = $("#txt_Promocion").val().trim();
      let viaje           = $("#txt_Viaje").val().trim();
      let codigo          = $("#txt_Codigo").val().trim();
      let estado          = $("#cbx_Estado").val();

      if (!metodoPago || !tipoComprobante || !cliente || !viaje || !codigo || !estado) {
        toastr.warning("Todos los campos obligatorios", "MENSAJE DE SISTEMA");
        return;
      }

      Swal.fire({
        title: "¿Estás seguro?",
        text: "Esta acción registrará la reserva. ¿Deseas continuar?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#3085d6",
        cancelButtonColor: "#d33",
        confirmButtonText: "Sí, registrar reserva",
        cancelButtonText: "Cancelar",
        reverseButtons: true
      }).then((result) => {
        if (result.isConfirmed) {
          let formData = new FormData();
          formData.append("id_metodo_pago", metodoPago);
          formData.append("id_tipo_comprobante", tipoComprobante);
          formData.append("id_cliente", cliente);
          formData.append("id_promocion", promocion);
          formData.append("id_viaje", viaje);
          formData.append("codigo", codigo);
          formData.append("estado", estado);

          $.ajax({
            url: "/trabajadores/atencion/RegistrarReserva",
            method: "POST",
            processData: false,
            contentType: false,
            data: formData,
            success: function (response) {
              if (response.Status === "success") {
                if (response.Msj2) {
                  toastr.warning(response.Msj2, "MENSAJE DE SISTEMA");
                  return;
                }
                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                setTimeout(function () {
                  window.location.href = "/trabajadores/atencion/GestionarReservas";
                }, 500);
              } else {
                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                console.error("Error: " + response.Msj);
              }
            },
            error: function (xhr, status, error) {
              toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
              console.error("Error: " + error);
            }
          });
        }
      });
    });

    // Botón Editar
    $("#btn_Editar").click(function () {
      const id = Number("{{ reserva.id if reserva is defined else 0 }}");
      let metodoPago      = $("#txt_MetodoPago").val().trim();
      let tipoComprobante = $("#txt_TipoComprobante").val().trim();
      let cliente         = $("#txt_Cliente").val().trim();
      let promocion       = $("#txt_Promocion").val().trim();
      let viaje           = $("#txt_Viaje").val().trim();
      let codigo          = $("#txt_Codigo").val().trim();
      let estado          = $("#cbx_Estado").val();

      if (!metodoPago || !tipoComprobante || !cliente || !viaje || !codigo || !estado) {
        toastr.warning("Todos los campos obligatorios", "MENSAJE DE SISTEMA");
        return;
      }

      Swal.fire({
        title: "¿Estás seguro?",
        text: "Esta acción modificará la reserva. ¿Deseas continuar?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonColor: "#3085d6",
        cancelButtonColor: "#d33",
        confirmButtonText: "Sí, editar reserva",
        cancelButtonText: "Cancelar",
        reverseButtons: true
      }).then((result) => {
        if (result.isConfirmed) {
          let formData = new FormData();
          formData.append("id_metodo_pago", metodoPago);
          formData.append("id_tipo_comprobante", tipoComprobante);
          formData.append("id_cliente", cliente);
          formData.append("id_promocion", promocion);
          formData.append("id_viaje", viaje);
          formData.append("codigo", codigo);
          formData.append("estado", estado);

          $.ajax({
            url: `/trabajadores/atencion/EditarReserva/${id}`,
            method: "POST",
            processData: false,
            contentType: false,
            data: formData,
            success: function (response) {
              if (response.Status === "success") {
                if (response.Msj2) {
                  toastr.warning(response.Msj2, "MENSAJE DE SISTEMA");
                  return;
                }
                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                setTimeout(function () {
                  window.location.href = "/trabajadores/atencion/GestionarReservas";
                }, 500);
              } else {
                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                console.error("Error: " + response.Msj);
              }
            },
            error: function (xhr, status, error) {
              toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
              console.error("Error: " + error);
            }
          });
        }
      });
    });

    // Botón Aceptar / Ver
    $("#btn_Aceptar").click(function () {
      window.location.href = "/trabajadores/atencion/GestionarReservas";
    });

    // Botón Volver
    $("#btn_Volver").click(function () {
      window.location.href = "/trabajadores/atencion/GestionarReservas";
    });
  });
</script>
{% endblock %}
