{% extends "index.html" %}

{% block title %}YATRAX - Editar usuario{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">Editar usuario</h4>
                </div>
                <div class="card-body">
                    <div id="data-usuario" class="container-fluid" type="hidden"
                        data-usuario='{{ usuario | tojson | safe }}'></div>
                    <!-- si prefieres usar toda la data en un solo objeto escondido -->
                    <input type="hidden" id="idUsuario" value="{{ usuario.id }}"> <!-- ID oculto -->
                    <div class="mb-3">
                        <label for="txt_Nombre">Nombre completo</label>
                        <div class="input-group">
                            <input type="text" id="txt_Nombre" class="form-control" placeholder="Nombre completo"
                                value="{{ usuario.nombre }}">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-user"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="txt_Email">Correo electrónico</label>
                        <div class="input-group">
                            <input type="email" id="txt_Email" class="form-control" placeholder="Correo electrónico"
                                value="{{ usuario.email }}">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="txt_Password">Contraseña</label>
                        <div class="input-group">
                            <input disabled type="password" id="txt_Password" class="form-control"
                                placeholder="Contraseña" value="********">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-lock"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="cbx_TipoUsuario">Tipo de usuario</label>
                        <div class="input-group">
                            <select id="cbx_TipoUsuario" class="form-control">
                            </select>
                            <!-- <div class="input-group-append">
                                <button id="btn_TipoUsuario" type="button" class="btn btn-info"><i
                                        class="bi bi-plus"></i></button>
                            </div> -->
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="file_Imagen">Imagen de perfil</label>
                        <div class="col-12 text-left">
                            <!-- <img id="preview_Imagen" src="{{ usuario.imagen }}" alt="Imagen de perfil" class="img-thumbnail mb-2 mx-1" width="150"> -->
                            <label class="btn btn-warning" for="file_Imagen">
                                <i class="bi bi-file-earmark-arrow-up-fill"></i> Subir archivo
                            </label>
                            <input type="file" class="d-none" id="file_Imagen" accept=".jpg, .jpeg, .png">
                            <span id="checkIcon" class="d-none text-success ml-2">
                                <i class="bi bi-check-circle-fill"></i> Archivo subido
                            </span>
                        </div>
                    </div>
                    <div class="text-center">
                        <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de
                            usuarios</button>
                        <button id="btn_Editar" type="button" class="btn btn-primary">Guardar cambios</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    const usuario = JSON.parse($('#data-usuario').attr('data-usuario'));

    function fct_GetTiposUsuarios() {
        $.getJSON('/trabajadores/usuarios/GetTiposUsuarios', function (response) {
            if (response.Status === 'success') {
                let items = '<option disabled>--SELECCIONAR--</option>';

                $.each(response.data, function (index, item) {
                    if (item.id === usuario.id_tipousuario) {
                        items += `<option selected value="${item.id}">${item.nombre}</option>`;
                    } else {
                        items += `<option value="${item.id}">${item.nombre}</option>`;
                    }
                });

                $('#cbx_TipoUsuario').html(items);
            } else {
                console.error('Error al obtener los tipos de usuario:', response.Msj);
            }
        });
    }

    $(document).ready(function () {
        fct_GetTiposUsuarios();

        $('#file_Imagen').on('change', function () {
            if (this.files.length > 0) {
                $('#checkIcon').removeClass('d-none');
                const fileType = this.files[0].type;
                const validTypes = ["image/jpeg", "image/png", "image/jpg"];

                if (!validTypes.includes(fileType)) {
                    this.value = "";
                    toastr.warning('Solo puede subir archivos que sean imágenes (JPG, PNG, JPEG)', 'MENSAJE DE SISTEMA');
                    $('#checkIcon').addClass('d-none');
                }
            } else {
                $('#checkIcon').addClass('d-none');
            }
        });

        $('#btn_TipoUsuario').click(function () {
            loadMediumModal('/trabajadores/usuarios/TipoUsuarioNuevo', 'Registrar Tipo Usuario');
        });

        $("#btn_Editar").click(function () {
            const id = usuario['id'];

            let nombre = $("#txt_Nombre").val().trim();
            let email = $("#txt_Email").val().trim();
            let tipoUsuario = $('#cbx_TipoUsuario').val();
            let imagen = $("#file_Imagen")[0].files[0];

            if (!nombre || !email || !tipoUsuario) {
                toastr.warning("Todos los campos son obligatorios, excepto la imagen.", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará al usuario. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar usuario",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("email", email);
                    formData.append("idTipoUsuario", tipoUsuario);

                    if (imagen) {
                        formData.append("imagen", imagen);
                    }

                    $.ajax({
                        url: `/trabajadores/usuarios/EditarUsuario/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                setTimeout(() => {
                                    window.location.href = "/trabajadores/usuarios/GestionarUsuarios";
                                }, 500);
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $("#btn_Volver").click(function () {
            window.location.href = "/trabajadores/usuarios/GestionarUsuarios";
        });
    });
</script>
{% endblock %}
