{% extends "index.html" %}

{% block title %}YATRAX - Gestión de Usuarios{% endblock %}

{% block content %}
<div class="container-fluid m-1">
    <div class="panel-heading">
        <div class="row">
            <div class="col-md-12">
                <h1>Hola, bienvenido al Menú Gestionar Usuarios</h1>
            </div>
        </div>
    </div>
    <div class="panel-body">
        <div class="row">
            <div class="col-12">
                <table id="tbl_Usuarios" class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>NOMBRE</th>
                            <th>EMAIL</th>
                            <th>TIPO USUARIO</th>
                            <th>ACCIÓN</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    var dtUsuarios;

    $(document).ready(function () {
        // $('body').addClass('sidebar-collapse');
        var windowHeight = $('body > div.os-padding.menu-open > div > div > div > div.content-wrapper').height() / 2;
        //CONFIGURACION POR DEFECTO DATATABLES
        $.extend($.fn.dataTable.defaults, {
            dom: "<'row pb-1'<'col-sm-10'B><'col-sm-2 c1 d-flex justify-content-end'>>" + "<'row'<'col-sm-11'l><'col-sm-1'f>>" + "<'row'<'col-sm-10'i><'col-sm-2'p>>" + "rt" + "<'row'<'col-sm-10'i><'col-sm-2'p>>",
            paging: true,
            select: true,
            scroller: true,
            deferRender: true,
            scrollY: windowHeight,
            scrollX: true,
            fixedHeader: true,
            scrollCollapse: true,
            ordering: true,
            destroy: true,
            responsive: true,
            autoWidth: false,
            processing: true,
            filter: true,
            orderMulti: true,
            stateSave: false,
            serverSide: false,
            language: {
                processing: "Procesando...",
                search: "Buscar:",
                lengthMenu: "Mostrar _MENU_ registros",
                info: "Mostrando del _START_ al _END_ de un total de _TOTAL_ registros",
                infoEmpty: "Sin registros encontrados.",
                infoFiltered: "(Total de _MAX_ registros filtrados)",
                loadingRecords: "Cargando...",
                zeroRecords: "No se encontraron registros",
                emptyTable: "No hay datos disponibles en la tabla",
                paginate: {
                    previous: "Atras",
                    next: "Siguiente",
                    first: "Primero",
                    last: "Último",
                },
                aria: {
                    sortAscending: ": Activar para ordenar la columna de manera ascendente",
                    sortDescending: ": Activar para ordenar la columna de manera descendente"
                },
                select: {
                    rows: {
                        _: "%d filas seleccionadas",
                        0: "Haz clic en una fila para seleccionarla",
                        1: "1 fila seleccionada"
                    }
                },
                buttons: {
                    copyTitle: 'Copiado en el portapapeles',
                    copyKeys: 'Presiona <i>ctrl</i> o <i>\u2318</i> + <i>C</i> para copiar los datos de la tabla a tu portapapeles. <br><br>Para cancelar, haga clic en este mensaje o presione Esc.',
                    copySuccess: {
                        _: '%d registros copiados correctamente',
                        1: '1 registro copiado correctamente'
                    }
                }
            },
        });

        fct_IniciarTablaUsuarios('#tbl_Usuarios');
    });

    function fct_IniciarTablaUsuarios(IdTabla) {
        // Inicializar DataTables con botones
        dtUsuarios = $(IdTabla).DataTable({
            buttons: [
                {
                    extend: 'copy',
                    text: '<i class="bi bi-back"></i>',
                    titleAttr: 'Copiar en portapapeles',
                    className: 'btn btn-primary',
                },
                {
                    extend: 'excel',
                    text: '<i class="bi bi-file-earmark-excel"></i>',
                    titleAttr: 'Exportar a Excel',
                    className: 'btn btn-success',
                    filename: 'Usuarios' + ' ' + moment().format('DD-MM-YYYY HH_mm'),
                    footer: true,
                    exportOptions:
                    {
                        stripHtml: true,
                        columns: ':not(:last-child)'
                    },
                },
                {
                    extend: 'pdf',
                    text: '<i class="bi bi-file-earmark-pdf"></i>',
                    titleAttr: 'Exportar a PDF',
                    className: 'btn btn-danger',
                    filename: 'Usuarios' + ' ' + moment().format('DD-MM-YYYY HH_mm'),
                    exportOptions:
                    {
                        stripHtml: true,
                        columns: ':not(:last-child)'
                    },
                    orientation: 'landscape',
                    pageSize: 'LEGAL',
                },
                {
                    extend: 'print',
                    text: '<i class="bi bi-printer-fill"></i>',
                    titleAttr: 'Imprimir',
                    className: 'btn btn-info',
                },
                {
                    extend: 'colvis',
                    text: '<i class="bi bi-ui-checks"></i>',
                    titleAttr: 'Seleccionar',
                    className: 'btn btn-warning',
                    columns: ':not(.noVis)',
                },
                {
                    text: '<i class= "bi bi-plus-circle" style="margin-right: 5px;"></i>NUEVO',
                    className: 'btn bg-success m-1',
                    titleAttr: 'Nuevo',
                    action: function (e, dt, node, config) {
                        fct_UsuarioNuevo();
                    },
                },
            ],
            ajax: {
                url: "/trabajadores/usuarios/GetData_Usuarios",
                type: "GET",
                datatype: "json",
                data: function (d) {
                },
                dataSrc: function (json) {
                    if (json.Status === "error") {
                        toastr.error('Ocurrió un error inesperado al intentar listar la tabla');
                        console.error(json.Msj);
                        return [];
                    }
                    return json.data;
                },
                error: function (xhr, error, thrown) {
                    toastr.error('Ocurrió un error inesperado al intentar listar la tabla');
                    console.error('Error en la solicitud Ajax: ' + error + xhr.Msj + thrown);
                },
            },
            columns: [
                { data: "id", name: "id" },
                { data: "nombre", name: "nombre" },
                { data: "email", name: "email" },
                { data: "tipousuario", name: "tipousuario" },
                {
                    data: null,
                    render: function (data, type, row) {
                        return `</button> <button class="btn btn-xs btn-primary" onclick="fct_UsuarioEditar('${data.id}')"><i class="bi bi-pencil-square"></i></button>
                           <button class="btn btn-xs btn-danger" onclick = "fct_UsuarioEliminar('${data.id}')" > <i class="bi bi-trash" > </i></button>`;
                        //Todos los permisos comentados para reutilizarlos
                        //return `</button> <button class="btn btn-xs btn-info" onclick="fct_ProyectoVer('${data.id}')"><i class="bi bi-eye"></i></button>
                        //</button> <button class="btn btn-xs btn-success" onclick="fct_ProyectoEditar('${data.id}')"><i class="bi bi-pencil-square"></i></button>
                        //    <button class="btn btn-xs btn-danger" onclick = "fct_ProyectoEliminar('${data.id}')" > <i class="bi bi-trash" > </i></button>`;
                    },
                    className: 'text-center',
                }
            ],
            columnDefs: [
                {
                    targets: [0],
                    className: "text-center",
                },
            ],
            lengthMenu: [[100, 200, 500, -1], [100, 200, 500, 'Todos']],
            initComplete: function (data, row, cell, start, end, display) {
                $('.dt-buttons button').addClass('m-1');
                $('.dt-button-collection').appendTo('.dt-buttons');
                $('.btn.btn-success').removeClass('dt-button buttons-excel buttons-html5');
                $('.btn.btn-danger').removeClass('dt-button buttons-pdf buttons-html5');
                $('.btn.btn-primary').removeClass('dt-button buttons-copy buttons-html5 ');
                $('.btn.btn-info').removeClass('dt-button buttons-print');
                $('.btn.btn-warning').removeClass('dt-button buttons-collection buttons-colvis');
                //Botón Nuevo
                $('button[title="Nuevo"]').attr('id', 'btn_Nuevo');
                $('#btn_Nuevo').removeClass('dt-button');
                $('#btn_Nuevo').appendTo('div.col-sm-2.c1.d-flex.justify-content-end');
            },
        });
    }

    function fct_UsuarioNuevo() {
        window.location.href = '/trabajadores/usuarios/UsuarioNuevo';
    }

    function fct_UsuarioEditar(Id) {
        window.location.href = `/trabajadores/usuarios/EditarUsuario/${Id}`;
    }

    function fct_UsuarioEliminar(Id) {
        Swal.fire({
            title: "¿Estás seguro?",
            text: "Esta acción eliminará al usuario. ¿Deseas continuar?",
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#3085d6",
            cancelButtonColor: "#d33",
            confirmButtonText: "Sí, eliminar",
            cancelButtonText: "Cancelar",
            reverseButtons: true // Invertir el orden de los botones
        }).then((result) => {
            if (result.isConfirmed) {
                $.ajax({
                    url: `/trabajadores/usuarios/EliminarUsuario/${Id}`,  // Pasamos el ID en la URL
                    type: "POST",
                    contentType: "application/json",
                    success: function (response) {
                        if (response.Status === "success") {
                            if (response.Msj2 !== '' && response.Msj2 !== null) {
                                toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                return;
                            }
                            fct_IniciarTablaUsuarios('#tbl_Usuarios');
                            toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                        } else {
                            toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            console.error('Error: ' + response.Msj);
                        }
                    },
                    error: function (xhr, Status, error) {
                        toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        console.error('Error:' + error);
                    }
                });
            }
        });
    }

    function newexportaction(e, dt, button, config) {
        // Guardar el contenido original del botón
        var originalText = $(button).html();
        // Cambiar el contenido del botón para incluir un spinner
        $(button).html('<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>');

        var self = this;
        var oldStart = dt.settings()[0]._iDisplayStart;
        dt.one('preXhr', function (e, s, data) {
            // Just this once, load all data from the server...
            data.start = 0;
            data.length = 2147483647;
            dt.one('preDraw', function (e, settings) {
                // Call the original action function
                if (button[0].className.indexOf('buttons-copy') >= 0 || button[0].className.indexOf('btn btn-primary') >= 0) {
                    $.fn.dataTable.ext.buttons.copyHtml5.action.call(self, e, dt, button, config);
                }
                else if (button[0].className.indexOf('btn btn-success') >= 0 || button[0].className.indexOf('btn btn-success') >= 0) {
                    $.fn.dataTable.ext.buttons.excelHtml5.available(dt, config) ?
                        $.fn.dataTable.ext.buttons.excelHtml5.action.call(self, e, dt, button, config) :
                        $.fn.dataTable.ext.buttons.excelFlash.action.call(self, e, dt, button, config);
                }
                else if (button[0].className.indexOf('buttons-csv') >= 0) {
                    $.fn.dataTable.ext.buttons.csvHtml5.available(dt, config) ?
                        $.fn.dataTable.ext.buttons.csvHtml5.action.call(self, e, dt, button, config) :
                        $.fn.dataTable.ext.buttons.csvFlash.action.call(self, e, dt, button, config);
                }
                else if (button[0].className.indexOf('buttons-pdf') >= 0 || button[0].className.indexOf('btn btn-danger') >= 0) {
                    $.fn.dataTable.ext.buttons.pdfHtml5.available(dt, config) ?
                        $.fn.dataTable.ext.buttons.pdfHtml5.action.call(self, e, dt, button, config) :
                        $.fn.dataTable.ext.buttons.pdfFlash.action.call(self, e, dt, button, config);
                }
                else if (button[0].className.indexOf('buttons-print') >= 0 || button[0].className.indexOf('btn btn-info') >= 0) {
                    $.fn.dataTable.ext.buttons.print.action(e, dt, button, config);
                }
                // Restaurar el contenido original del botón después de que la exportación ha concluido
                $(button).html(originalText);

                dt.one('preXhr', function (e, s, data) {
                    // DataTables thinks the first item displayed is index 0, but we're not drawing that.
                    // Set the property to what it was before exporting.
                    settings._iDisplayStart = oldStart;
                    data.start = oldStart;
                });
                // Reload the grid with the original page. Otherwise, API functions like table.cell(this) don't work properly.
                setTimeout(dt.ajax.reload, 0);
                // Prevent rendering of the full data to the DOM
                return false;
            });
        });
        // Requery the server with the new one-time export settings
        dt.ajax.reload();
    };
</script>
{% endblock %}
