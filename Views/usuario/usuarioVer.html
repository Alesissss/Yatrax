{% extends "index.html" %}

{% block title %}YATRAX - Ver usuario{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">Ver usuario</h4>
                </div>
                <div class="card-body">
                    <div id= "data-usuario" class="container-fluid" type="hidden" data-usuario='{{ usuario | tojson | safe }}'></div>  <!-- si prefieres usar toda la data en un solo objeto escondido -->
                    <input type="hidden" id="idUsuario" value="{{ usuario.id }}"> <!-- ID oculto -->
                    <div class="mb-3">
                        <label for="txt_Nombre">Nombre completo</label>
                        <div class="input-group">
                            <input type="text" id="txt_Nombre" class="form-control" placeholder="Nombre completo" disabled
                                value="{{ usuario.nombre }}">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-user"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="txt_Email">Correo electrónico</label>
                        <div class="input-group">
                            <input type="email" id="txt_Email" class="form-control" placeholder="Correo electrónico" disabled
                                value="{{ usuario.email }}">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="txt_Password">Contraseña</label>
                        <div class="input-group">
                            <input disabled type="password" id="txt_Password" class="form-control" placeholder="Contraseña" value="********">
                            <div class="input-group-append">
                                <div class="input-group-text"><i class="fas fa-lock"></i></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="cbx_TipoUsuario">Tipo de usuario</label>
                        <div class="input-group">
                            <select id="cbx_TipoUsuario" class="form-control" disabled>
                            </select>
                            <!-- <div class="input-group-append">
                                <button id="btn_TipoUsuario" type="button" class="btn btn-info"><i
                                        class="bi bi-plus"></i></button>
                            </div> -->
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="file_Imagen">Imagen de perfil</label>
                        <div class="col-12 text-left">
                            <label class="btn btn-warning disabled">
                                <i class="bi bi-file-earmark-arrow-up-fill"></i> Subir archivo
                            </label>
                            <input disabled type="file" class="d-none" id="file_Imagen">
                            <span id="checkIcon" class="d-none text-success ml-2">
                                <i class="bi bi-check-circle-fill"></i> Archivo subido
                            </span>
                        </div>
                    </div>
                    <div class="text-center">
                        <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de usuarios</button>
                        <button id="btn_Aceptar" type="button" class="btn btn-primary">Aceptar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    const usuario = JSON.parse($('#data-usuario').attr('data-usuario'));

    function fct_GetTiposUsuarios() {
        $.getJSON('/trabajadores/usuarios/GetTiposUsuarios', function (response) {
            if (response.Status === 'success') {
                let items = '<option disabled>--SELECCIONAR--</option>';

                $.each(response.data, function (index, item) {
                    if (item.id === usuario.id_tipousuario) {
                        items += `<option selected value="${item.id}">${item.nombre}</option>`;
                    } else {
                        items += `<option value="${item.id}">${item.nombre}</option>`;
                    }
                });

                $('#cbx_TipoUsuario').html(items);
            } else {
                console.error('Error al obtener los tipos de usuario:', response.Msj);
            }
        });
    }

    $(document).ready(function () {
        fct_GetTiposUsuarios();

        $('#btn_TipoUsuario').click(function () {
            loadMediumModal('/trabajadores/usuarios/TipoUsuarioNuevo', 'Registrar Tipo Usuario');
        });

        $("#btn_Aceptar").click(function () {
            window.location.href = "/trabajadores/usuarios/GestionarUsuarios";
        });

        $("#btn_Volver").click(function () {
            window.location.href = "/trabajadores/usuarios/GestionarUsuarios";
        });
    });
</script>
{% endblock %}
