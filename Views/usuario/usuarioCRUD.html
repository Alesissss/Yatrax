{% extends "index.html" %}

{% block title %}YATRAX - {{ tittle }}{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="text-center mb-0">{{ tittle }}</h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="txt_Nombre">Nombre completo</label>
                            <div class="input-group">
                                <input type="text" id="txt_Nombre" class="form-control" placeholder="Nombre completo" {%
                                    if btnId=='btn_Aceptar' %}disabled{% endif %} value="{{ usuario.nombre }}">
                                <div class="input-group-append">
                                    <div class="input-group-text"><i class="fas fa-user"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="txt_Email">Correo electrónico</label>
                            <div class="input-group">
                                <input type="email" id="txt_Email" class="form-control" placeholder="Correo electrónico"
                                    {% if btnId=='btn_Aceptar' %}disabled{% endif %} value="{{ usuario.email }}">
                                <div class="input-group-append">
                                    <div class="input-group-text"><i class="fas fa-envelope"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="txt_Password">Contraseña</label>
                            <div class="input-group">
                                <input type="password" id="txt_Password" class="form-control" {% if btnId
                                    !='btn_Registrar' %}disabled{% endif %} placeholder="Contraseña" value="********">
                                <div class="input-group-append">
                                    <div class="input-group-text"><i class="fas fa-lock"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="cbx_Estado">Estado</label>
                            <div class="input-group">
                                <select id="cbx_Estado" class="form-control" {% if btnId=='btn_Aceptar' %}disabled{%
                                    endif %}>
                                    <option disabled>--SELECCIONAR--</option>
                                    <option {% if usuario.estado==1 %}selected{% endif %} value="1">Vigente</option>
                                    <option {% if usuario.estado==0 %}selected{% endif %} value="0">No vigente</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="cbx_TipoUsuario">Tipo de usuario</label>
                            <div class="input-group">
                                <select id="cbx_TipoUsuario" class="form-control" {% if btnId=='btn_Aceptar'
                                    %}disabled{% endif %}>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-12 mb-3">
                            <label for="file_Imagen">Imagen de perfil</label>
                            <div class="col-12 text-left">
                                <label class="btn btn-warning {% if btnId == 'btn_Aceptar' %}disabled{% endif %}"
                                    for="file_Imagen">
                                    <i class="bi bi-file-earmark-arrow-up-fill"></i> Subir archivo
                                </label>
                                <input type="file" class="d-none" id="file_Imagen" accept=".jpg, .jpeg, .png" {% if
                                    btnId=='btn_Aceptar' %}disabled{% endif %}>
                                <span id="checkIcon" class="d-none text-success ml-2">
                                    <i class="bi bi-check-circle-fill"></i> Archivo subido
                                </span>
                            </div>

                            <div id="logoPreview" class="mt-3" style="display: none;">
                                <label>Vista previa:</label>
                                <img id="logoPreviewImage" class="img-thumbnail" style="width: 100px;">
                            </div>

                            {% if usuario.imagen %}
                            <div class="mt-3">
                                <label>Imagen actual:</label>
                                <img src="{{ usuario.imagen }}" class="img-thumbnail mt-2" style="width: 100px;">
                            </div>
                            {% endif %}
                        </div>
                        <div class="col-md-12 text-center">
                            <button id="btn_Volver" type="button" class="btn btn-danger">Volver al listado de
                                usuarios</button>
                            <button id="{{ btnId }}" type="button" class="btn btn-primary">Aceptar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    function fct_GetTiposUsuarios() {
        $.getJSON('/trabajadores/usuarios/GetTiposUsuarios', function (response) {
            if (response.Status === 'success') {
                let items = '<option disabled selected>--SELECCIONAR--</option>';

                $.each(response.data, function (index, item) {
                    if (item.id === Number("{{ usuario.id_tipousuario }}")) {
                        items += `<option selected value="${item.id}">${item.nombre}</option>`;
                    } else {
                        items += `<option value="${item.id}">${item.nombre}</option>`;
                    }
                });

                $('#cbx_TipoUsuario').html(items);
            } else {
                console.error('Error al obtener los tipos de usuario:', response.Msj);
            }
        });
    }

    $(document).ready(function () {
        fct_GetTiposUsuarios();

        $('#file_Imagen').on('change', function () {
            if (this.files.length > 0) {
                $('#checkIcon').removeClass('d-none');
                const fileType = this.files[0].type;
                const validTypes = ["image/jpeg", "image/png", "image/jpg"];

                // Mostrar la vista previa de la imagen
                var reader = new FileReader();
                reader.onload = function (e) {
                    // Mostrar la imagen seleccionada
                    $('#logoPreview').show();  // Mostrar la vista previa
                    $('#logoPreviewImage').attr('src', e.target.result);  // Establecer la imagen en la vista previa
                };

                reader.readAsDataURL(this.files[0]);  // Leer el archivo como una URL de datos

                if (!validTypes.includes(fileType)) {
                    this.value = "";
                    toastr.warning('Solo puede subir archivos que sean imágenes (JPG, PNG, JPEG)', 'MENSAJE DE SISTEMA');
                    $('#checkIcon').addClass('d-none');
                }
            } else {
                $('#checkIcon').addClass('d-none');
            }
        });

        $("#btn_Registrar").click(function () {
            let nombre = $("#txt_Nombre").val().trim();
            let email = $("#txt_Email").val().trim();
            let password = $("#txt_Password").val().trim();
            let estado = $('#cbx_Estado').val();
            let tipoUsuario = $('#cbx_TipoUsuario').val();
            let imagen = $("#file_Imagen")[0].files[0];

            if (!nombre || !email || !password || !estado || !tipoUsuario || !imagen) {
                toastr.warning("Todos los campos son obligatorios", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción registrará al usuario. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, registrar usuario",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("email", email);
                    formData.append("password", password);
                    formData.append("estado", estado);
                    formData.append("idTipoUsuario", tipoUsuario);
                    formData.append("imagen", imagen);
                    $.ajax({
                        url: "/trabajadores/usuarios/RegistrarUsuario",
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/usuarios/GestionarUsuarios";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                                console.error('Error: ' + response.Msj);
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                            console.error('Error:' + error);
                        }
                    });
                }
            });
        });

        $("#btn_Editar").click(function () {
            const id = Number("{{ usuario.id }}");

            let nombre = $("#txt_Nombre").val().trim();
            let email = $("#txt_Email").val().trim();
            let estado = $('#cbx_Estado').val();
            let tipoUsuario = $('#cbx_TipoUsuario').val();
            let imagen = $("#file_Imagen")[0].files[0];

            if (!nombre || !email || !estado || !tipoUsuario) {
                toastr.warning("Todos los campos son obligatorios, excepto la imagen.", "MENSAJE DE SISTEMA");
                return;
            }

            Swal.fire({
                title: "¿Estás seguro?",
                text: "Esta acción modificará al usuario. ¿Deseas continuar?",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#3085d6",
                cancelButtonColor: "#d33",
                confirmButtonText: "Sí, editar usuario",
                cancelButtonText: "Cancelar",
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    let formData = new FormData();
                    formData.append("nombre", nombre);
                    formData.append("email", email);
                    formData.append("estado", estado);
                    formData.append("idTipoUsuario", tipoUsuario);

                    if (imagen) {
                        formData.append("imagen", imagen);
                    }

                    $.ajax({
                        url: `/trabajadores/usuarios/EditarUsuario/${id}`,
                        type: "POST",
                        processData: false,
                        contentType: false,
                        data: formData,
                        success: function (response) {
                            if (response.Status === "success") {
                                if (response.Msj2 !== '' && response.Msj2 !== null) {
                                    toastr.warning(response.Msj2, 'MENSAJE DE SISTEMA');
                                    return;
                                } else {
                                    toastr.success(response.Msj, "MENSAJE DE SISTEMA");
                                    setTimeout(() => {
                                        window.location.href = "/trabajadores/usuarios/GestionarUsuarios";
                                    }, 500);
                                }
                            } else {
                                toastr.error(response.Msj, "MENSAJE DE SISTEMA");
                            }
                        },
                        error: function (xhr, Status, error) {
                            toastr.error("Error en el servidor", "MENSAJE DE SISTEMA");
                        }
                    });
                }
            });
        });

        $("#btn_Aceptar").click(function () {
            window.location.href = "/trabajadores/usuarios/GestionarUsuarios";
        });

        $("#btn_Volver").click(function () {
            window.location.href = "/trabajadores/usuarios/GestionarUsuarios";
        });
    });
</script>
{% endblock %}
