{% extends "index.html" %}

{% block title %}YATRAX - Error{% endblock %}

{% block content %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - YATRAX</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid vh-100 d-flex align-items-center">
        <div class="container">
            <div class="row align-items-center">
                <!-- Contenido - Izquierda -->
                <div class="col-12 col-lg-6 mb-4 mb-lg-0">
                    <!-- Brand -->
                    <h1 class="display-4 fw-bold text-dark mb-4">YATRAX</h1>
                    
                    <!-- Error Code -->
                    <div class="display-1 fw-bold text-primary mb-3">404.</div>
                    
                    <!-- Error Title -->
                    <h2 class="h4 text-dark mb-3">Eso es un error.</h2>
                    
                    <!-- Error Description -->
                    <p class="text-muted mb-3">
                        La URL solicitada no se encontró en este servidor.
                    </p>
                    
                    <p class="text-muted mb-4">
                        Tal vez el bus se desvió de la ruta. Eso es todo lo que sabemos.
                    </p>
                    
                    <!-- Action Buttons -->
                    <div class="d-flex flex-column flex-sm-row gap-2">
                        <button class="btn btn-primary" onclick="window.history.back()">
                            <i class="fas fa-arrow-left me-2"></i>
                            Volver Atrás
                        </button>
                        <button class="btn btn-outline-secondary" onclick="window.location.href='/'">
                            <i class="fas fa-home me-2"></i>
                            Ir al Inicio
                        </button>
                    </div>
                    
                    <!-- Brand Footer -->
                    <div class="mt-5 pt-4 border-top">
                        <h5 class="fw-bold text-dark mb-0">YATRAX</h5>
                    </div>
                </div>
                
                <!-- Imagen - Derecha (Solo visible en desktop) -->
                <div class="col-lg-6 d-none d-lg-flex justify-content-center">
                    <div class="text-center">
                        <!-- Bus Icon -->
                        <i class="fas fa-bus text-primary mb-3" style="font-size: 8rem;"></i>
                        
                        <!-- Tools debajo del bus -->
                        <div class="d-flex justify-content-center gap-4 mt-4">
                            <i class="fas fa-wrench text-secondary" style="font-size: 2rem;"></i>
                            <i class="fas fa-screwdriver text-secondary" style="font-size: 2rem;"></i>
                            <i class="fas fa-hammer text-secondary" style="font-size: 2rem;"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
