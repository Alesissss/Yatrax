<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static',filename='css/main.css')}}">
    <link rel="stylesheet" href="https://unpkg.com/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/bs-brain@2.0.4/utilities/font-size/font-size.css">
    <link rel="stylesheet" href="https://unpkg.com/bs-brain@2.0.4/utilities/margin/margin.css">
    <link rel="stylesheet" href="https://unpkg.com/bs-brain@2.0.4/utilities/padding/padding.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="{{url_for('static',filename='img/yatrax_icon.ico')}}">
    {% block estilos %}{% endblock %}
    <title>{% block titulo %}{% endblock %}</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <div class="col-md-3 d-flex justify-content-center">
                <img class="col-md-3 float-start" src="" alt="logo_yatrax">
            </div>
            <div class="col-md-6 d-flex justify-content-center align-items-center h-100">
                <a class="navbar-brand" href="#">Inicio</a>
                <a class="navbar-brand" href="#">Servicios</a>
                <a class="navbar-brand" href="#">Sucurusales</a>
                <a class="navbar-brand" href="#">Nosotros</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
            </div>
            </button>
            <div class="col-md-3 d-flex justify-content-center">
                <img src="" alt="logo_sesion">
            </div>
        </div>
    </nav>
    {% block contenido %}{% endblock %}
    <footer>
        <div class="container-fluid bg-info">
            <div class="row">
                <div class="col-md-6">
                    <span>gola</span>
                </div>
                <div class="col-md-6">
                    <span>a</span>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
